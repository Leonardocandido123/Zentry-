<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Ativar Cartão ZT</title>
    <style>
        :root { --bg: #000; --card: #111; --accent: #22c55e; --border: #222; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; 
            height: 100vh; overflow: hidden; 
        }

        .container { 
            padding: 20px; max-width: 450px; margin: 0 auto; 
            display: flex; flex-direction: column; height: 100%; 
        }

        /* HEADER */
        .app-header { width: 100%; padding: 10px 0; display: flex; align-items: center; justify-content: space-between; }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }

        /* MENSAGEM DE SUCESSO */
        .success-badge {
            background: rgba(34, 197, 94, 0.1); color: var(--accent);
            padding: 8px 16px; border-radius: 100px; font-size: 12px;
            font-weight: 800; margin: 10px auto; border: 1px solid rgba(34, 197, 94, 0.2);
        }

        /* CARD PREVIEW REDUZIDO */
        .card-mini {
            width: 100%; height: 160px; border-radius: 20px;
            background: linear-gradient(135deg, #111, #1a1a1a);
            border: 1px solid var(--accent);
            position: relative; margin: 15px 0;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(34, 197, 94, 0.1);
        }

        /* INPUT DE NOME (VISUAL) */
        .user-data-box {
            width: 100%; background: var(--card); border: 1px solid var(--border);
            border-radius: 18px; padding: 15px; margin-bottom: 15px;
        }
        .user-data-box label { font-size: 11px; color: #666; display: block; margin-bottom: 5px; }
        .user-data-box b { font-size: 15px; letter-spacing: 1px; color: #fff; }

        /* LISTA DE OPÇÕES (MAIS COMPACTA) */
        .setup-list { width: 100%; background: var(--card); border-radius: 20px; border: 1px solid var(--border); flex: 1; overflow-y: auto; margin-bottom: 20px; }
        .setup-item { display: flex; align-items: center; justify-content: space-between; padding: 15px 20px; border-bottom: 1px solid var(--border); }
        .setup-info b { display: block; font-size: 13px; }
        .setup-info span { font-size: 10px; color: #666; }

        /* SWITCH */
        .switch { position: relative; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #333; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(18px); }

        /* BOTÃO FIXO NO RODAPÉ */
        .footer-btn { padding-bottom: 20px; }
        .btn-finish { 
            width: 100%; padding: 18px; border-radius: 18px; border: none; 
            background: #fff; color: #000; font-weight: 800; font-size: 15px; 
            cursor: pointer; box-shadow: 0 10px 20px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="container">
        <header class="app-header">
            <div class="back-btn" onclick="history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
            <b style="font-size: 14px; letter-spacing: 1px;">ATIVAÇÃO</b>
            <div style="width: 40px;"></div>
        </header>

        <div class="success-badge">✅ PRONTO PARA USO</div>

        <div class="card-mini">
            <div style="position: absolute; top: 20px; left: 20px; font-weight: 800; font-size: 14px; color: var(--accent);">ZENTRY</div>
            <img src="https://cdn-icons-png.flaticon.com/512/93/93461.png" style="width: 40px; opacity: 0.5; filter: invert(1);">
            <div style="position: absolute; bottom: 20px; left: 20px; font-family: monospace; letter-spacing: 2px; font-size: 12px;">•••• 8842</div>
        </div>

        <div class="user-data-box">
            <label>TITULAR DO CARTÃO</label>
            <b id="displayNome">CARREGANDO...</b>
        </div>

        <div class="setup-list">
            <div class="setup-item">
                <div class="setup-info"><b>Compras Online</b><span>Ecommerce e Apps</span></div>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
            <div class="setup-item">
                <div class="setup-info"><b>Aproximação (NFC)</b><span>Pagamento físico</span></div>
                <label class="switch"><input type="checkbox" checked><span class="slider"></span></label>
            </div>
            <div class="setup-item">
                <div class="setup-info"><b>Avisos SMS</b><span>Notificar gastos</span></div>
                <label class="switch"><input type="checkbox"><span class="slider"></span></label>
            </div>
        </div>

        <div class="footer-btn">
            <button class="btn-finish" onclick="finalizar()">Confirmar e Ativar</button>
        </div>
    </div>

    <script>
        // Pega o nome do usuário para mostrar na tela
        window.onload = function() {
            const nome = localStorage.getItem('nomeUsuario') || 'LEONARDO S.';
            document.getElementById('displayNome').innerText = nome.toUpperCase();
        };

        function finalizar() {
            const btn = document.querySelector('.btn-finish');
            btn.innerHTML = "CARTÃO ATIVADO!";
            btn.style.background = "#22c55e";
            btn.style.color = "#fff";

            localStorage.setItem('cartaoStatus', 'ativo');
            
            setTimeout(() => {
                location.href = 'home.html';
            }, 1800);
        }
    </script>
</body>
</html>
