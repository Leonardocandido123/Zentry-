<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZENTRY Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="./logo-192.png">
  
<style>
  :root { 
    --accent: #22c55e; 
    --bg: #05070A;
    --border: #2A3441;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

  html, body {
    width: 100vw;
    height: 100vh;
    overflow: hidden; 
    position: fixed; 
  }

  body { 
    background: radial-gradient(circle at top, #0f172a, #000); 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    padding: 30px; 
    color: #fff;
  }

  .title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(to right, #fff, #9CA3AF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 15px;
    color: #9CA3AF;
    margin-bottom: 40px;
    line-height: 1.4;
  }

  .password-container {
    position: relative;
    border-bottom: 1.5px solid var(--border);
    display: flex;
    align-items: center;
    height: 60px;
    transition: 0.3s;
  }

  .password-container:focus-within { border-bottom-color: var(--accent); }

  input {
    flex: 1;
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    outline: none;
    padding-right: 100px;
    letter-spacing: 4px; /* Mais espaço para os pontos da senha */
    width: 100%;
  }

  .actions {
    position: absolute;
    right: 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .eye { width: 24px; height: 24px; opacity: 0.4; cursor: pointer; }

  .enter-btn {
    width: 44px;
    height: 44px;
    border-radius: 12px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0.1;
    transform: scale(0.8);
    pointer-events: none;
    transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
  }

  .enter-btn.active { opacity: 1; transform: scale(1); pointer-events: all; }

  .links {
    display: flex;
    justify-content: space-between;
    width: 100%;
    padding-top: 20px;
  }

  .links a { color: #9CA3AF; text-decoration: none; font-size: 13px; }
  .links .create-acc { color: var(--accent); font-weight: 700; }

  /* MODAL DE BLINDAGEM */
  #zModalGlobal { 
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); 
    z-index:9999; align-items:center; justify-content:center; padding:20px; 
    backdrop-filter: blur(6px); 
  }
  .modal-content { 
    background:#121826; border:1px solid #2A3441; border-radius:28px; 
    width:100%; max-width:340px; padding:30px; text-align:center; 
    animation: pop 0.3s ease;
  }
  @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  
  .spinner {
    width: 20px;
    height: 20px;
    border: 3px solid rgba(0,0,0,0.1);
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

  <div id="zModalGlobal">
    <div class="modal-content">
      <div id="zIcon" style="font-size:45px; margin-bottom:15px;">🔒</div>
      <h3 id="zTitle" style="margin-bottom:10px; font-size:18px;">Erro de Acesso</h3>
      <p id="zText" style="color:#9CA3AF; font-size:14px; margin-bottom:25px; line-height:1.5;"></p>
      <button id="zBtnClose" style="width:100%; padding:16px; border-radius:14px; background:var(--accent); border:none; color:#000; font-weight:700; font-size:15px;">Entendido</button>
    </div>
  </div>

  <div class="title">Acesse sua conta</div>
  <div class="subtitle">Digite sua senha ZENTRY de 6 dígitos para acessar sua conta com segurança</div>

  <div class="field-wrapper">
    <div class="password-container">
      <input type="password" id="senha" placeholder="••••••" inputmode="numeric" autocomplete="current-password" maxlength="6">
      
      <div class="actions">
        <svg class="eye" id="eyeIcon" onclick="window.toggleSenha()" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/>
          <circle cx="12" cy="12" r="3"/>
          <line id="eyeSlash" x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="2" style="opacity:1; transition: 0.2s;"/>
        </svg>

        <div class="enter-btn" id="btnEntrar" onclick="window.entrar()">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
            <polyline points="9 18 15 12 9 6"></polyline>
          </svg>
        </div>
      </div>
    </div>

    <div class="links">
      <a href="reset.html">Esqueci a senha</a>
      <a href="cadastro_unificado.html" class="create-acc">Criar conta</a>
    </div>
  </div>

<script type="module">
// ✅ Integrado com o seu core
import { db, ZentryUI } from './zentry-core.js';
import { collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

function showZModal(titulo, texto, icon) {
  document.getElementById('zModalGlobal').style.display = 'flex';
  document.getElementById('zTitle').innerText = titulo;
  document.getElementById('zText').innerText = texto;
  document.getElementById('zIcon').innerText = icon;
}

document.getElementById('zBtnClose').onclick = () => {
  document.getElementById('zModalGlobal').style.display = 'none';
};

window.addEventListener("DOMContentLoaded", () => {
  const input = document.getElementById("senha");
  const btn = document.getElementById("btnEntrar");

  // ✅ CORREÇÃO: Seta só fica verde com EXATAMENTE 6 dígitos
  input.addEventListener("input", () => {
    // Impede digitar mais de 6
    if (input.value.length > 6) input.value = input.value.slice(0, 6);

    if(input.value.length === 6) {
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });

  window.toggleSenha = function(){
    const slash = document.getElementById("eyeSlash");
    if(input.type === "password"){
      input.type = "text";
      slash.style.opacity = "0";
    } else {
      input.type = "password";
      slash.style.opacity = "1";
    }
  };

  window.entrar = async function(){
    const senhaDigitada = input.value;
    const emailSalvo = localStorage.getItem("usuarioEmail"); // Certifique-se que o cadastro salva isso
    
    if(!emailSalvo){
      showZModal("E-mail ausente", "Não encontramos seu e-mail pré-registrado. Faça o cadastro primeiro.", "👤");
      return;
    }

    // Feedback visual de carregamento
    btn.innerHTML = `<div class="spinner"></div>`;
    btn.style.pointerEvents = "none";
    
    try {
      const res = await fetch("/.netlify/functions/login", {
  method: "POST",
  body: JSON.stringify({
    email: emailSalvo,
    senha: senhaDigitada
  })
});

if (!res.ok) {
  throw new Error("senha-incorreta");
}

const data = await res.json();

localStorage.setItem("idUsuarioLogado", data.id);
window.location.href = "home.html";
      if (querySnapshot.empty) {
        throw new Error("usuario-nao-encontrado");
      }

      let dadosUsuario = null;
      let idDocumento = "";

      querySnapshot.forEach((doc) => {
        dadosUsuario = doc.data();
        idDocumento = doc.id; 
      });

      // ✅ Validação de senha integrada
      if (String(dadosUsuario.senha) === String(senhaDigitada)) {
        
        // Salva os dados essenciais para as outras telas (Home, Pix, Maquininha)
        localStorage.setItem("idUsuarioLogado", idDocumento);
        localStorage.setItem("dadosUsuario", JSON.stringify(dadosUsuario));

        document.body.style.opacity = "0";
        document.body.style.transition = "0.4s";
        setTimeout(() => { window.location.href = "home.html"; }, 400);
      } else {
        throw new Error("senha-incorreta");
      }

    } catch (error) {
      console.error(error);
      // Volta o ícone da seta se der erro
      btn.innerHTML = `<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><polyline points="9 18 15 12 9 6"></polyline></svg>`;
      btn.style.pointerEvents = "all";
      
      let msg = "Erro na conexão.";
      if(error.message === 'senha-incorreta') msg = "Senha de 6 dígitos inválida.";
      if(error.message === 'usuario-nao-encontrado') msg = "Cadastro não localizado.";
      
      showZModal("Acesso Negado", msg, "🔒");
      input.value = ""; 
      btn.classList.remove("active");
    }
  };

  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter" && input.value.length === 6) window.entrar();
  });
});
</script>
</body>
</html>
