<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>ZENTRY Login</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
  :root { 
    --accent: #22c55e; 
    --bg: #05070A;
    --card: #111827;
    --border: #2A3441;
  }

  /* RESET E FUNDO */
  * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }

  body { 
    height: 100vh; 
    background: radial-gradient(circle at top, #0f172a, #000); 
    display: flex; 
    flex-direction: column; 
    justify-content: center; 
    padding: 30px; 
    color: #fff;
    overflow: hidden;
    transition: opacity 0.4s;
  }

  /* TEXTOS */
  .title {
    font-size: 26px;
    font-weight: 700;
    margin-bottom: 8px;
    background: linear-gradient(to right, #fff, #9CA3AF);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  
  .subtitle {
    font-size: 15px;
    color: #9CA3AF;
    margin-bottom: 40px;
    line-height: 1.4;
  }

  /* CAMPO DE SENHA */
    /* CAMPO DE SENHA: ESTILO SÓ O TRAÇO */
  .password-field {
    position: relative;
    background: none; /* Remove o fundo cinza */
    border: none; /* Remove as bordas laterais e topo */
    border-bottom: 1.5px solid var(--border); /* Mantém apenas o traço de baixo */
    border-radius: 0; /* Remove o arredondamento das quinas */
    padding: 10px 0;
    height: 60px;
    display: flex;
    align-items: center;
    transition: 0.3s;
  }

  /* Quando clica no campo, o traço fica verde */
  .password-field:focus-within {
    border-bottom-color: var(--accent);
    background: none; /* Garante que não apareça fundo ao clicar */
    box-shadow: none; /* Remove o brilho ao redor para focar só na linha */
  }

  .password-field input {
    flex: 1;
    background: none;
    border: none;
    color: #fff;
    font-size: 20px;
    outline: none;
    letter-spacing: 4px; /* Senha com pontos mais afastados */
    width: 100%;
    padding-right: 85px; /* Espaço para o olho e a seta */
  }


  /* BOTÃO ENTRAR */
  .enter-btn {
    position: absolute;
    right: 8px;
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transform: scale(0.7);
    transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    cursor: pointer;
    box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
  }

  .enter-btn.active {
    opacity: 1;
    transform: scale(1);
  }

  /* ÍCONE OLHO */
  .eye {
    position: absolute;
    right: 60px;
    width: 24px;
    height: 24px;
    opacity: 0.4;
    cursor: pointer;
    transition: 0.2s;
    -webkit-tap-highlight-color: transparent;
  }
  
  .eye.active { opacity: 1; }

  /* LINKS ABAIXO */
  .links {
    display: flex;
    justify-content: space-between;
    margin-top: 30px;
    font-size: 14px;
  }

  .links a {
    color: #9CA3AF;
    text-decoration: none;
    transition: 0.2s;
  }

  .links a:active { opacity: 0.5; }
</style>
</head>

<body>

  <div class="title">Acesse sua conta</div>
  <div class="subtitle">Digite sua senha TechPay para acessar sua conta com segurança</div>

  <div class="password-field">
    <input type="password" id="senha" placeholder="Sua senha" autocomplete="off">

<svg class="eye" id="eyeIcon" onclick="window.toggleSenha()" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
  <path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/>
  <circle cx="12" cy="12" r="3"/>
  <line id="eyeSlash" x1="3" y1="3" x2="21" y2="21" stroke="white" stroke-width="2" style="opacity:1; transition: 0.2s;"/>
</svg>

<div class="enter-btn" id="btnEntrar" onclick="window.entrar()">
  <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3">
    <line x1="5" y1="12" x2="19" y2="12"></line>
    <polyline points="12 5 19 12 12 19"></polyline>
  </svg>
</div>
  <div class="links">
    <a href="reset.html">Esqueci a senha</a>
    <a href="cadastro_nome.html" style="color: var(--accent); font-weight: 600;">Criar conta </a>
  </div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275",
  storageBucket: "zentry-app-74275.appspot.com",
  messagingSenderId: "571422826071",
  appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

window.addEventListener("DOMContentLoaded", () => {

  const input = document.getElementById("senha");
  const btn = document.getElementById("btnEntrar");
  const eye = document.getElementById("eyeIcon");

  // MOSTRAR BOTÃO
  input.addEventListener("input", () => {
    if(input.value.length >= 6){
      btn.classList.add("active");
    } else {
      btn.classList.remove("active");
    }
  });

  // 👁️ TOGGLE SENHA
  window.toggleSenha = function(){
    const slash = document.getElementById("eyeSlash");
    if(input.type === "password"){
      input.type = "text";
      slash.style.opacity = "0";
      eye.classList.add("active");
    } else {
      input.type = "password";
      slash.style.opacity = "1";
      eye.classList.remove("active");
    }
  };

  // 🔐 LOGIN
  window.entrar = function(){
    if(input.value.length < 6) return;

    const email = localStorage.getItem("usuarioEmail");

    if(!email){
      alert("Email não encontrado. Faça login novamente.");
      return;
    }

    signInWithEmailAndPassword(auth, email, input.value)
      .then(() => {
        document.body.style.opacity = "0";
        setTimeout(() => {
          window.location.href = "home.html";
        }, 400);
      })
      .catch(() => {
        alert("Senha incorreta ou usuário não existe");
      });
  };

  // ENTER
  input.addEventListener("keypress", (e) => {
    if (e.key === "Enter") window.entrar();
  });

});
</script>
</body>
</html>
