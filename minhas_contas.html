
<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #22C55E; 
            --danger: #EF4444; 
            --bg: #000; 
            --card: #111827; 
            --text-secondary: #9CA3AF;
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            height: 100vh; 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
        }
        
        .header { 
            padding: 25px 20px; 
            display: flex; 
            align-items: center; 
            gap: 15px; 
            border-bottom: 1px solid #1F2937; 
        }

        .scroll-content { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 40px;
        }

        .info-box {
            background: rgba(34, 197, 94, 0.1); 
            border: 1px solid rgba(34, 197, 94, 0.2);
            padding: 15px; 
            border-radius: 12px; 
            color: var(--primary); 
            font-size: 13px; 
            margin-bottom: 25px;
            line-height: 1.5;
        }

        .label { 
            color: var(--text-secondary); 
            font-size: 13px; 
            display: block; 
            margin-bottom: 8px; 
            margin-top: 20px; 
            font-weight: 500;
        }
        
        input { 
            width: 100%; 
            background: #111827; 
            border: 1px solid #374151; 
            border-radius: 12px; 
            color: white; 
            font-size: 16px; 
            padding: 15px; 
            outline: none; 
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus { border-color: var(--primary); background: #1f2937; }

        /* Estilo para o campo de data (ajuste para mobile) */
        input[type="date"] {
            color-scheme: dark;
        }

        .row-reminder { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            background: #111827; 
            padding: 18px; 
            border-radius: 12px; 
            margin-top: 30px;
            border: 1px solid #374151;
        }

        .row-reminder span { font-weight: 600; font-size: 15px; }

        /* Rodapé Fixo */
        .fixed-footer { 
            padding: 20px 20px 30px 20px; 
            background: #000; 
            border-top: 1px solid #1F2937; 
        }

        .btn-save { 
            width: 100%; 
            background: var(--primary); 
            color: #000; 
            border: none; 
            padding: 18px; 
            border-radius: 15px; 
            font-weight: 700; 
            font-size: 16px; 
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-save:active { transform: scale(0.98); opacity: 0.9; }

    </style>
</head>
<body>

    <div class="header">
        <svg onclick="location.href='home.html'" style="cursor:pointer" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        <h2 style="margin:0; font-size:18px;">Agendar Lembrete</h2>
    </div>

    <div class="scroll-content">
        <div class="info-box">
            <b>Organize suas finanças:</b> Cadastre suas contas mensais e o TechPay avisará você na tela inicial quando o vencimento estiver próximo.
        </div>

        <span class="label">O que você vai pagar?</span>
        <input type="text" id="descConta" placeholder="Ex: Aluguel, Internet, Cartão">

        <span class="label">Qual o valor total?</span>
        <input type="text" id="valorConta" placeholder="R$ 0,00" oninput="maskMoney(this)">

        <span class="label">Data de Vencimento</span>
        <input type="date" id="dataConta">

        <div class="row-reminder">
            <span>Ativar Notificação</span>
            <input type="checkbox" id="lembrarAtivo" checked style="width: 22px; height: 22px; accent-color: var(--primary);">
        </div>
    </div>

    <div class="fixed-footer">
        <button class="btn-save" onclick="salvarLembrete()">Salvar Conta</button>
    </div>

    <script>
        // Máscara simples para dinheiro
        function maskMoney(i) {
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2).replace(".", ",");
            v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
            i.value = "R$ " + v;
        }

        function salvarLembrete() {
            const desc = document.getElementById('descConta').value;
            const valor = document.getElementById('valorConta').value;
            const data = document.getElementById('dataConta').value;
            const ativo = document.getElementById('lembrarAtivo').checked;

            if(!desc || !data) {
                alert("Por favor, preencha o nome da conta e a data!");
                return;
            }

            // Cria o objeto da conta
            const novaConta = {
                descricao: desc,
                valor: valor,
                data: data,
                lembrete: ativo,
                status: 'pendente'
            };

            // Salva no LocalStorage (Array de contas)
            let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");
            contas.push(novaConta);
            localStorage.setItem("minhasContas", JSON.stringify(contas));

            // Feedback visual e volta para home
            alert("Lembrete salvo! O TechPay avisará você.");
            window.location.href = 'home.html';
        }
    </script>
</body>
</html>
