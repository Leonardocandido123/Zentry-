<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRY</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    height: 100vh;
    overflow: hidden;
    background-color: #000; 
  }

  /* SPLASH CONTAINER */
  .splash {
    position: fixed;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 10;
  }

  /* FUNDO COM ZOOM */
  .splash::before {
    content: "";
    position: absolute;
    inset: 0;
    background: url('splash.jpg') center/cover no-repeat;
    filter: brightness(1.1) contrast(1.1); 
    animation: zoom 6s ease-out forwards;
    z-index: -2;
  }

  /* OVERLAY PARA DAR FOCO NA LOGO */
  .splash::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.8) 100%);
    z-index: -1;
  }

  /* LOGO ÚNICA E CENTRALIZADA */
  .logo {
    font-family: 'Inter', sans-serif;
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    display: flex; /* Garante que ZEN e TRY fiquem alinhados */
    gap: 0;
    pointer-events: none;
    user-select: none;
  }

  .white {
    color: #ffffff;
    text-shadow: 0 0 15px rgba(255,255,255,0.3);
  }

  .green {
    color: #22c55e;
    text-shadow: 0 0 20px rgba(34, 197, 94, 0.6); 
  }

  @keyframes zoom {
    from { transform: scale(1); }
    to { transform: scale(1.1); }
  }

  /* FADE OUT SUAVE */
  .fade-out {
    animation: fadeOut 0.6s ease-in forwards;
  }

  @keyframes fadeOut {
    to { opacity: 0; transform: scale(1.05); filter: blur(8px); }
  }
</style>
</head>
<body>

<div class="splash" id="splash">
  <div class="logo">
    <span class="white">ZEN</span><span class="green">TRY</span>
  </div>
</div>

<script>
// Aguarda 2.5s e redireciona
setTimeout(() => {
  const splash = document.getElementById("splash");
  splash.classList.add("fade-out");

  setTimeout(() => {
    window.location.href = "login.html";
  }, 600);
}, 2500);
</script>

</body>
</html>
