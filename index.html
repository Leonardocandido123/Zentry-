<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Techpay - Carregando</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<link rel="icon" type="image/png" href="icon.png">
    
<style>
/* RESET */
*{
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter', sans-serif;
  background: radial-gradient(circle at 20% 0%, #0f172a, #000 70%);
  color:#FFFFFF;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  overflow:hidden;
}

/* CONTAINER */
.splash-container{
  text-align:center;
}

/* LOGO */
.logo-main{
  font-size:48px; 
  font-weight:700;
  color:#ffffff;
  opacity:0;
  letter-spacing: -1.5px;
  animation: logoEntrada 1.2s cubic-bezier(0.4, 0, 0.2, 1) forwards;
}

/* VERDE IDENTIDADE (AGORA PREMIUM) */
.accent-color {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  font-weight: 600;
}

/* ANIMAÇÃO */
@keyframes logoEntrada{
  0%{
    opacity:0;
    transform:translateY(25px) scale(0.95);
    filter: blur(8px);
  }
  100%{
    opacity:1;
    transform:translateY(0) scale(1);
    filter: blur(0);
  }
}

/* LOADER */
.loader-bar{
  margin: 35px auto 0;
  width:140px;
  height:3px; 
  background:rgba(255,255,255,0.08);
  border-radius:10px;
  overflow:hidden;
}

.loader-fill{
  height:100%;
  width:0%;
  background: linear-gradient(90deg, #22c55e, #4ade80);
  box-shadow: 0 0 20px rgba(34, 197, 94, 0.6);
  animation:loadAnim 2.6s cubic-bezier(0.65, 0, 0.35, 1) forwards;
}

@keyframes loadAnim{
  0% { width: 0%; }
  30% { width: 40%; }
  60% { width: 75%; }
  100%{ width: 100%; }
}
</style>
</head>
<body>

<div class="splash-container">
  <div class="logo-main">
    TECH<span class="accent-color">PAY</span>
  </div>
  
  <div class="loader-bar">
    <div class="loader-fill"></div>
  </div>
</div>

<script>
// Redireciona para a sua tela de Login (com biometria)
setTimeout(()=>{
  // Se o seu login for o arquivo index.html, mude aqui:
  window.location.href = "login.html";
}, 3500);
</script>

</body>
</html>
