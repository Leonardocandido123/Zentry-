<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Recarga Premium - ZENTRY</title>
    <style>
        :root { 
            --primary: #22c55e; 
            --bg-card: rgba(17, 24, 39, 0.6); 
            --border: rgba(255, 255, 255, 0.1); 
            --text-secondary: #9CA3AF; 
        }

        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%); 
            background-attachment: fixed;
            color: #fff; 
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .container { padding: 20px; max-width: 450px; margin: 0 auto; padding-bottom: 50px; }

        /* HEADER PREMIUM */
        .app-header { 
            padding: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            position: sticky; 
            top: 0; 
            background: rgba(15, 23, 42, 0.4); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            z-index: 100; 
            border-bottom: 1px solid var(--border); 
        }

        .back-btn { 
            width: 40px; height: 40px; border-radius: 12px; 
            background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
            transition: 0.2s;
        }
        .back-btn:active { transform: scale(0.9); }

        .balance-chip { 
            background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); 
            padding: 8px 15px; border-radius: 100px; display: flex; align-items: center; gap: 8px; 
        }
        .balance-chip span { color: var(--primary); font-weight: 700; font-size: 14px; }

        /* INPUTS COM EFEITO VIDRO */
        .section-label { font-size: 11px; font-weight: 700; color: var(--primary); text-transform: uppercase; letter-spacing: 1.2px; margin: 25px 0 12px 5px; display: block; }
        
        .input-group { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 15px 20px; margin-bottom: 15px; backdrop-filter: blur(10px);
            transition: 0.3s ease;
        }
        .input-group:focus-within { border-color: var(--primary); background: rgba(17, 24, 39, 0.8); }
        .input-group label { font-size: 11px; color: var(--text-secondary); font-weight: 600; display: block; margin-bottom: 4px; }
        .input-group input { background: transparent; border: none; color: white; font-size: 18px; font-weight: 600; width: 100%; outline: none; }

        /* OPERADORAS */
        .operator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .op-card { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; 
            padding: 15px 10px; text-align: center; transition: 0.3s; backdrop-filter: blur(5px);
        }
        .op-card img { width: 32px; height: 32px; object-fit: contain; filter: grayscale(0.3); transition: 0.3s; }
        .op-card.selected { border-color: var(--primary); background: rgba(34, 197, 94, 0.1); transform: translateY(-3px); }
        .op-card.selected img { filter: grayscale(0); }

        /* CHIPS DE VALOR */
        .value-chips { display: flex; gap: 10px; overflow-x: auto; padding: 5px 0; scrollbar-width: none; }
        .value-chips::-webkit-scrollbar { display: none; }
        .chip { 
            padding: 12px 22px; background: var(--bg-card); border: 1px solid var(--border); 
            border-radius: 100px; font-size: 14px; font-weight: 600; white-space: nowrap; transition: 0.2s;
        }
        .chip.active { background: var(--primary); color: #000; border-color: var(--primary); box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }

        /* BOTÃO FINAL */
        .btn-confirm { 
            width: 100%; padding: 20px; border-radius: 20px; border: none; 
            background: var(--primary); color: #000; font-weight: 700; font-size: 16px; 
            margin-top: 30px; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2); transition: 0.2s;
        }
        .btn-confirm:active { transform: scale(0.96); opacity: 0.8; }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="back-btn" onclick="window.history.back()"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="balance-chip">
            <small style="color: #fff; opacity: 0.6; font-size: 10px; font-weight: 800;">SALDO</small>
            <span>R$ 850,00</span>
        </div>
    </header>

    <div class="container">
        <h1 style="font-size: 26px; margin: 10px 0 5px; font-weight: 700;">Recarga de Celular</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin: 0 0 30px;">Informe os dados para colocar créditos.</p>

        <div class="input-group">
            <label>NÚMERO COM DDD</label>
            <input type="tel" id="phone" placeholder="(00) 00000-0000" oninput="maskPhone(this)">
        </div>

        <span class="section-label">Operadora</span>
        <div class="operator-grid">
            <div class="op-card" onclick="selectOp(this, 'Vivo')"><img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Vivo_logo.svg"></div>
            <div class="op-card" onclick="selectOp(this, 'Tim')"><img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/TIM_logo.svg"></div>
            <div class="op-card" onclick="selectOp(this, 'Claro')"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Claro_logo.svg"></div>
            <div class="op-card" onclick="selectOp(this, 'Oi')"><img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Oi_logo_2016.svg"></div>
        </div>

        <span class="section-label">Valores sugeridos</span>
        <div class="value-chips">
            <div class="chip" onclick="selectChip(this, '15,00')">R$ 15</div>
            <div class="chip active" onclick="selectChip(this, '20,00')">R$ 20</div>
            <div class="chip" onclick="selectChip(this, '30,00')">R$ 30</div>
            <div class="chip" onclick="selectChip(this, '50,00')">R$ 50</div>
        </div>

        <div class="input-group" style="margin-top: 20px;">
            <label>OU DIGITE OUTRO VALOR</label>
            <input type="tel" id="customValue" placeholder="R$ 0,00" oninput="maskMoney(this)">
        </div>

        <button class="btn-confirm" onclick="processar()">Confirmar Recarga</button>
    </div>

    <script>
        let selectedOperator = "";
        let finalValue = "R$ 20,00";

        function selectOp(el, name) {
            document.querySelectorAll('.op-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedOperator = name;
        }

        function selectChip(el, val) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('customValue').value = ""; 
            finalValue = "R$ " + val;
        }

        function maskPhone(i) {
            let v = i.value.replace(/\D/g,'');
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
            v = v.replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        }

        function maskMoney(i) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            let v = i.value.replace(/\D/g,'');
            if(v === "") return;
            v = (v/100).toFixed(2).replace(".", ",");
            i.value = "R$ " + v;
            finalValue = i.value;
        }

        function processar() {
            const phone = document.getElementById('phone').value;
            const btn = document.querySelector('.btn-confirm');
            
            if(!phone || phone.length < 14) return alert("Digite o telefone completo!");
            if(!selectedOperator) return alert("Escolha a operadora!");

            btn.innerText = "Processando...";
            btn.disabled = true;

            setTimeout(() => { 
                localStorage.setItem("tipoOperacao", "Recarga");
                localStorage.setItem("ultimoValor", finalValue);
                localStorage.setItem("operadora", selectedOperator);
                localStorage.setItem("telefone", phone);
                window.location.href = 'revisao.html'; 
            }, 1000);
        }
    </script>
</body>
</html>
