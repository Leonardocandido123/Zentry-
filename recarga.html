<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>ZENTRY - Recarga</title>
<style>
    :root {
        --accent: #22c55e; 
        --bg-gradient: radial-gradient(circle at top, #0f172a, #000);
        --card: rgba(255, 255, 255, 0.03); 
        --card-active: rgba(34, 197, 94, 0.1);
        --border: rgba(255, 255, 255, 0.1);
        --text: #fff; 
        --text-muted: #9CA3AF;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
    body { 
        font-family: 'Sora', sans-serif; 
        background: var(--bg-gradient); 
        background-attachment: fixed;
        color: var(--text); 
        height: 100vh; 
        overflow: hidden; 
        display: flex; 
        flex-direction: column; 
    }
    .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
    .back-btn { width: 44px; height: 44px; background: var(--card); border-radius: 14px; border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; cursor: pointer; color: #fff; }
    .saldo-pill { background: rgba(34,197,94,0.1); border: 1px solid rgba(34,197,94,0.2); color: var(--accent); font-weight: 700; font-size: 13px; padding: 8px 14px; border-radius: 20px; }
    .steps { display: flex; gap: 8px; padding: 10px 20px; flex-shrink: 0; }
    .step-dot { height: 4px; border-radius: 4px; background: rgba(255,255,255,0.1); flex: 1; transition: 0.4s; }
    .step-dot.active { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
    .step-dot.done { background: var(--accent); opacity: 0.5; }
    .content { flex: 1; overflow-y: auto; padding: 0 20px 140px; }
    .tela { display: none; animation: fadeUp 0.4s ease; }
    .tela.ativa { display: block; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(15px); } to { opacity:1; transform:translateY(0); } }
    .tela-titulo { font-size: 24px; font-weight: 800; margin: 25px 0 8px; letter-spacing: -0.5px; }
    .tela-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 30px; }
    .num-box { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 20px; display: flex; align-items: center; gap: 15px; transition: 0.3s; }
    .num-box:focus-within { border-color: var(--accent); }
    .num-box input { background: transparent; border: none; color: #fff; font-size: 22px; font-weight: 700; width: 100%; }
    .op-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 20px; }
    .op-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 12px; transition: 0.3s; cursor: pointer; }
    .op-card.active { border-color: var(--accent); background: var(--card-active); }
    .op-icon { width: 35px; height: 35px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 800; color: #fff; }
    .plano-card { background: var(--card); border: 1.5px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 12px; transition: 0.3s; cursor: pointer; }
    .plano-card.active { border-color: var(--accent); background: var(--card-active); }
    .plano-valor { font-size: 24px; font-weight: 800; color: #fff; }
    .plano-tag { background: rgba(255,255,255,0.05); padding: 4px 10px; border-radius: 8px; font-size: 11px; color: var(--text-muted); margin-top: 10px; display: inline-block; }
    .confirm-hero { background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 20px; }
    .confirm-row { display: flex; justify-content: space-between; padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .confirm-total { font-size: 20px; font-weight: 800; color: var(--accent); border: none; }
    .sucesso-wrap { text-align: center; padding-top: 40px; }
    .sucesso-circle { width: 80px; height: 80px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 40px; color: #000; }
    .footer-action { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px 20px 40px; background: linear-gradient(transparent, #000 70%); }
    .btn-main { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--accent); color: #000; font-weight: 800; font-size: 16px; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2); cursor: pointer; }
    .btn-sec { width: 100%; margin-top: 10px; background: transparent; border: 1px solid var(--border); color: #fff; padding: 15px; border-radius: 15px; font-weight: 600; cursor: pointer; }
</style>
</head>
<body>

<div class="app-bar">
    <div class="back-btn" id="btnVoltar"><</div>
    <span class="bar-title" id="barTitle">Recarga</span>
    <div class="saldo-pill" id="displaySaldo">R$ 0,00</div>
</div>

<div class="steps">
    <div class="step-dot active" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
</div>

<div class="content">
    <div class="tela ativa" id="tela0">
        <p class="tela-titulo">Qual é o número?</p>
        <p class="tela-sub">Digite o número que vai receber a recarga.</p>
        <div class="num-box">
            <span style="font-size:22px;">🇧🇷</span>
            <input type="text" id="numTel" placeholder="(00) 00000-0000" maxlength="15" inputmode="numeric">
        </div>
        <p class="tela-titulo" style="margin-top:28px;">Escolha a operadora</p>
        <div class="op-grid" id="opGrid">
            <div class="op-card" data-op="Vivo">
                <div class="op-icon" style="background:#662d91;">VI</div>
                <div class="op-name">Vivo</div>
            </div>
            <div class="op-card" data-op="Tim">
                <div class="op-icon" style="background:#0038a8;">TM</div>
                <div class="op-name">TIM</div>
            </div>
            <div class="op-card" data-op="Claro">
                <div class="op-icon" style="background:#ee1d23;">CL</div>
                <div class="op-name">Claro</div>
            </div>
            <div class="op-card" data-op="Oi">
                <div class="op-icon" style="background:#f7941d;">OI</div>
                <div class="op-name">Oi</div>
            </div>
        </div>
    </div>

    <div class="tela" id="tela1">
        <p class="tela-titulo">Planos</p>
        <p class="tela-sub">Escolha o pacote ideal para recarregar.</p>
        <div id="listaPlanos"></div>
    </div>

    <div class="tela" id="tela2">
        <p class="tela-titulo">Confirmação</p>
        <div class="confirm-hero">
            <div class="confirm-row"><span>Número</span><b id="confirmNum"></b></div>
            <div class="confirm-row"><span>Operadora</span><b id="confirmOp"></b></div>
            <div class="confirm-row"><span>Plano</span><b id="confirmPlano"></b></div>
            <div class="confirm-row confirm-total"><span>Total</span><b id="confirmTotal"></b></div>
        </div>
    </div>

    <div class="tela" id="tela3">
        <div class="sucesso-wrap">
            <div class="sucesso-circle">✓</div>
            <p class="tela-titulo">Recarga Realizada!</p>
            <p class="tela-sub">Seus créditos estarão disponíveis em instantes.</p>
            <button class="btn-sec" onclick="window.location.href='home.html'">Voltar ao início</button>
        </div>
    </div>
</div>

<div class="footer-action">
    <button class="btn-main" id="btnMain">Continuar</button>
</div>
<script type="module">
    // Importamos o seu core para manter o padrão de moeda e banco
    import { db, ZentryUI } from './zentry-core.js';
    import { doc, setDoc, updateDoc, getDocs, collection, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    let userEmail = localStorage.getItem("usuarioEmail");
    let userDocId = "";
    let saldoAtual = 0;
    let etapa = 0;
    let operadora = "";
    let planoSel = null;

    const PLANOS = {
        Vivo: [{v:15, d:"2GB"}, {v:30, d:"5GB"}, {v:50, d:"15GB"}],
        Tim: [{v:15, d:"3GB"}, {v:25, d:"6GB"}, {v:40, d:"12GB"}],
        Claro: [{v:12, d:"2GB"}, {v:20, d:"5GB"}, {v:35, d:"10GB"}],
        Oi: [{v:10, d:"1GB"}, {v:20, d:"4GB"}]
    };

    async function init() {
        if (!userEmail) { window.location.href = "login.html"; return; }
        
        // Busca o ID do documento pelo e-mail salvo
        const q = query(collection(db, "usuarios"), where("email", "==", userEmail));
        const snap = await getDocs(q);
        
        if (snap.empty) {
            console.error("Usuário não encontrado no banco.");
            return;
        }

        snap.forEach(d => {
            userDocId = d.id;
            saldoAtual = d.data().saldo || 0;
            // Usando o formatador do seu CORE
            document.getElementById('displaySaldo').innerText = ZentryUI.formatarMoeda(saldoAtual);
        });
    }
    init();

    // Máscara Telefone
    document.getElementById('numTel').oninput = (e) => {
        let v = e.target.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2").replace(/(\d)(\d{4})$/,"$1-$2");
        e.target.value = v;
    };

    // Seleção de Operadora
    document.getElementById('opGrid').addEventListener('click', (e) => {
        const card = e.target.closest('.op-card');
        if (!card) return;
        document.querySelectorAll('.op-card').forEach(c => c.classList.remove('active'));
        card.classList.add('active');
        operadora = card.dataset.op;
    });

    // Seleção de Plano (Global para o onclick do HTML funcionar)
    window.selecionarPlanoNoJS = (idx, valor, dados) => {
        planoSel = { v: valor, d: dados };
        document.querySelectorAll('.plano-card').forEach(c => c.classList.remove('active'));
        const cards = document.querySelectorAll('.plano-card');
        if(cards[idx]) cards[idx].classList.add('active');
    };

    function irPara(n) {
        document.getElementById(`tela${etapa}`).classList.remove('ativa');
        document.getElementById(`dot${etapa}`).classList.remove('active');
        document.getElementById(`dot${etapa}`).classList.add('done');
        etapa = n;
        document.getElementById(`tela${etapa}`).classList.add('ativa');
        document.getElementById(`dot${etapa}`).classList.add('active');
    }

    document.getElementById('btnMain').onclick = async () => {
        const btn = document.getElementById('btnMain');

        if (etapa === 0) {
            const num = document.getElementById('numTel').value;
            if (!operadora || num.length < 14) return alert("Selecione a operadora e o número!");
            
            const lista = document.getElementById('listaPlanos');
            lista.innerHTML = PLANOS[operadora].map((p, i) => `
                <div class="plano-card" onclick="window.selecionarPlanoNoJS(${i}, ${p.v}, '${p.d}')">
                    <div class="plano-valor">${ZentryUI.formatarMoeda(p.v)}</div>
                    <div class="plano-tag">${p.d} de Internet</div>
                </div>
            `).join('');
            irPara(1);

        } else if (etapa === 1) {
            if (!planoSel) return alert("Escolha um plano!");
            if (planoSel.v > saldoAtual) return alert("Saldo insuficiente!");
            
            document.getElementById('confirmNum').innerText = document.getElementById('numTel').value;
            document.getElementById('confirmOp').innerText = operadora;
            document.getElementById('confirmPlano').innerText = planoSel.d;
            document.getElementById('confirmTotal').innerText = ZentryUI.formatarMoeda(planoSel.v);
            irPara(2);
            btn.innerText = "Confirmar Pagamento";

        } else if (etapa === 2) {
            btn.disabled = true; btn.innerText = "Processando...";
            try {
                // Geramos um ID único para a transação
                const txId = "REC" + Date.now();
                
                // 1. Grava a transação para aparecer no EXTRATO
                await setDoc(doc(db, "usuarios", userDocId, "transacoes", txId), {
                    tipo: "saida", 
                    valor: planoSel.v, 
                    descricao: `Recarga ${operadora}`, 
                    timestamp: serverTimestamp() // Importante: seu extrato usa esse campo!
                });

                // 2. Atualiza o saldo do usuário
                await updateDoc(doc(db, "usuarios", userDocId), { 
                    saldo: saldoAtual - planoSel.v 
                });

                irPara(3);
                btn.style.display = 'none';
                document.getElementById('barTitle').innerText = "Sucesso";
            } catch (e) {
                console.error(e);
                alert("Erro ao processar recarga.");
                btn.disabled = false; btn.innerText = "Confirmar Pagamento";
            }
        }
    };

    document.getElementById('btnVoltar').onclick = () => {
        if (etapa === 0) window.location.href = 'home.html';
        else if (etapa === 3) window.location.href = 'home.html';
        else {
            document.getElementById(`tela${etapa}`).classList.remove('ativa');
            etapa--;
            document.getElementById(`tela${etapa}`).classList.add('ativa');
            document.getElementById('btnMain').innerText = "Continuar";
            document.getElementById('btnMain').disabled = false;
        }
    };
</script>
    
</body>
                </html>
