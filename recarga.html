<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Recarga Premium - ZENTRY</title>
    <style>
        :root { 
            --primary: #22c55e; 
            --bg-card: rgba(17, 24, 39, 0.7); 
            --border: rgba(255, 255, 255, 0.1); 
            --text-secondary: #9CA3AF; 
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body { 
            margin: 0; font-family: 'Inter', sans-serif; 
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 70%) no-repeat fixed;
            color: #fff; overflow: hidden; position: fixed; width: 100%; height: 100%;
        }

        .container { 
            padding: 20px; max-width: 450px; margin: 0 auto; 
            height: 100%; display: flex; flex-direction: column;
            overflow-y: auto; padding-bottom: 40px;
        }

        /* HEADER PREMIUM */
        .app-header { 
            padding: 15px 20px; display: flex; align-items: center; justify-content: space-between; 
            background: rgba(15, 23, 42, 0.5); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            z-index: 100; border-bottom: 1px solid var(--border); 
        }

        .back-btn { 
            width: 42px; height: 42px; border-radius: 14px; 
            background: var(--bg-card); border: 1px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
        }

        .balance-chip { 
            background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); 
            padding: 10px 18px; border-radius: 100px; text-align: right;
        }
        .balance-chip span { color: var(--primary); font-weight: 800; font-size: 15px; }

        /* ESTILO DOS INPUTS BLINDADOS */
        .section-label { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; letter-spacing: 1.2px; margin: 25px 0 12px 5px; display: block; }
        
        .input-group { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 20px; 
            padding: 15px 20px; margin-bottom: 15px; transition: 0.3s;
        }
        .input-group label { font-size: 11px; color: var(--text-secondary); font-weight: 700; display: block; margin-bottom: 5px; }
        .input-group input { 
            background: transparent; border: none; color: white; 
            font-size: 18px; font-weight: 600; width: 100%; outline: none; 
        }

        /* OPERADORAS */
        .operator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .op-card { 
            background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; 
            padding: 12px; text-align: center; cursor: pointer; transition: 0.3s;
        }
        .op-card img { width: 35px; height: 35px; border-radius: 8px; filter: grayscale(1); opacity: 0.6; }
        .op-card.selected { border-color: var(--primary); background: rgba(34, 197, 94, 0.15); }
        .op-card.selected img { filter: grayscale(0); opacity: 1; }

        /* CHIPS */
        .value-chips { display: flex; gap: 10px; overflow-x: auto; padding: 10px 0; scrollbar-width: none; }
        .value-chips::-webkit-scrollbar { display: none; }
        .chip { 
            padding: 14px 24px; background: var(--bg-card); border: 1px solid var(--border); 
            border-radius: 100px; font-size: 14px; font-weight: 700; white-space: nowrap;
        }
        .chip.active { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.4); }

        .btn-confirm { 
            width: 100%; padding: 20px; border-radius: 22px; border: none; 
            background: var(--primary); color: #052e16; font-weight: 800; font-size: 16px; 
            margin-top: 30px; box-shadow: 0 10px 25px rgba(34, 197, 94, 0.2);
        }
        .btn-confirm:disabled { opacity: 0.5; filter: grayscale(1); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="back-btn" onclick="location.href='home.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="balance-chip">
            <small style="color: #fff; opacity: 0.6; font-size: 9px; display: block;">SALDO ATUAL</small>
            <span id="txtSaldo">R$ 0,00</span>
        </div>
    </header>

    <div class="container">
        <h1 style="font-size: 24px; margin: 15px 0 5px; font-weight: 800;">Recarga Celular</h1>
        <p style="color: var(--text-secondary); font-size: 14px; margin-bottom: 25px;">Insira os dados para recarregar.</p>

        <div class="input-group">
            <label>NÚMERO COM DDD</label>
            <input type="tel" id="phone" placeholder="(00) 00000-0000" maxlength="15">
        </div>

        <span class="section-label">Operadora</span>
        <div class="operator-grid">
            <div class="op-card" onclick="selectOp(this, 'Vivo')"><img src="https://logodownload.org/wp-content/uploads/2014/04/vivo-logo-0.png"></div>
            <div class="op-card" onclick="selectOp(this, 'Tim')"><img src="https://logodownload.org/wp-content/uploads/2014/05/tim-logo-0.png"></div>
            <div class="op-card" onclick="selectOp(this, 'Claro')"><img src="https://logodownload.org/wp-content/uploads/2014/02/claro-logo-0.png"></div>
            <div class="op-card" onclick="selectOp(this, 'Oi')"><img src="https://logodownload.org/wp-content/uploads/2014/05/oi-logo-0.png"></div>
        </div>

        <span class="section-label">Valores</span>
        <div class="value-chips">
            <div class="chip" onclick="setVal(this, 15)">R$ 15</div>
            <div class="chip active" onclick="setVal(this, 20)">R$ 20</div>
            <div class="chip" onclick="setVal(this, 30)">R$ 30</div>
            <div class="chip" onclick="setVal(this, 50)">R$ 50</div>
            <div class="chip" onclick="setVal(this, 100)">R$ 100</div>
        </div>

        <div class="input-group" style="margin-top: 20px;">
            <label>VALOR PERSONALIZADO</label>
            <input type="tel" id="customValue" placeholder="R$ 0,00">
        </div>

        <button class="btn-confirm" id="btnMain" onclick="processar()">Confirmar Recarga</button>
    </div>
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userUid = "";
    let saldoAtual = 0;
    let totalSaidaAcumulada = 0; // Para não bugar o gráfico
    let operadora = "";
    let valorFinal = 20;

    // --- MÁSCARAS NATIVAS ---
    const phoneInput = document.getElementById('phone');
    phoneInput.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g,'');
        v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
        v = v.replace(/(\d)(\d{4})$/,"$1-$2");
        e.target.value = v;
    });

    // --- CARREGAR DADOS REAIS ---
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            const docRef = doc(db, "usuarios", user.uid);
            const snap = await getDoc(docRef);
            if(snap.exists()){
                const data = snap.data();
                saldoAtual = data.saldo || 0;
                totalSaidaAcumulada = data.saida || 0;
                document.getElementById('txtSaldo').innerText = saldoAtual.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
        } else {
            window.location.href='login.html';
        }
    });

    window.selectOp = (el, name) => {
        document.querySelectorAll('.op-card').forEach(c => c.classList.remove('selected'));
        el.classList.add('selected');
        operadora = name;
    };

    window.setVal = (el, val) => {
        document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
        el.classList.add('active');
        document.getElementById('customValue').value = "";
        valorFinal = val;
    };

    // --- FUNÇÃO DE PROCESSAR CORRIGIDA ---
    window.processar = async () => {
        const phone = document.getElementById('phone').value;
        const btn = document.getElementById('btnMain');

        if(phone.length < 14) return alert("Número inválido!");
        if(!operadora) return alert("Selecione uma operadora!");
        if(valorFinal > saldoAtual) return alert("Saldo insuficiente!");

        btn.innerText = "PROCESSANDO...";
        btn.disabled = true;

        try {
            const transacaoId = "TX" + Math.floor(Math.random() * 999999);
            const dataAgora = new Date().toISOString();

            // 1. REGISTRA A RECARGA (Controle Asaas)
            await setDoc(doc(db, "recargas", transacaoId), {
                userId: userUid,
                telefone: phone,
                operadora: operadora,
                valor: valorFinal,
                status: "Concluído",
                data: dataAgora
            });

            // 2. REGISTRA A TRANSAÇÃO (O QUE O GRAFICO LÊ)
            // IMPORTANTE: Aqui garantimos que o userId e os campos batem com o dashboard.js
            await setDoc(doc(db, "transacoes", transacaoId), {
                userId: userUid,
                tipo: "saida",
                valor: valorFinal,
                descricao: `Recarga ${operadora}`,
                data: dataAgora // dashboard.js usa esse campo para o eixo X
            });

            // 3. ATUALIZA O SALDO E O CONTADOR DE SAÍDA NO PERFIL
            const novoSaldo = saldoAtual - valorFinal;
            const novaSaidaTotal = totalSaidaAcumulada + valorFinal;

            await updateDoc(doc(db, "usuarios", userUid), { 
                saldo: novoSaldo,
                saida: novaSaidaTotal
            });

            // Salva dados locais para a revisão
            localStorage.setItem("tipoOperacao", "Recarga");
            localStorage.setItem("ultimoValor", valorFinal);
            localStorage.setItem("operadora", operadora);
            localStorage.setItem("telefone", phone);
            
            // Pequeno delay para garantir que o Firebase salvou antes de mudar de página
            setTimeout(() => {
                window.location.href = 'revisao.html';
            }, 500);

        } catch (e) {
            console.error("Erro no Firebase:", e);
            alert("Erro ao processar. Tente novamente.");
            btn.disabled = false;
        }
    };
</script>
    

</body>
</html>
