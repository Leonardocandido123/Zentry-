<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Recarga Premium - TECH Pay </title>
    <style>
        :root { 
            --bg: #000000; --card: #111; --accent: #22c55e; --border: #222; --text-muted: #888;
        }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; -webkit-font-smoothing: antialiased; }
        .container { padding: 20px; max-width: 450px; margin: 0 auto; padding-bottom: 50px; }

        /* HEADER & SALDO */
        .app-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); z-index: 100; border-bottom: 1px solid var(--border); }
        .back-btn { width: 40px; height: 40px; border-radius: 12px; background: var(--card); border: 1px solid var(--border); display: flex; align-items: center; justify-content: center; }
        .balance-chip { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); padding: 8px 15px; border-radius: 100px; display: flex; align-items: center; gap: 8px; }
        .balance-chip span { color: var(--accent); font-weight: 700; font-size: 14px; }

        /* INPUTS ESTILIZADOS */
        .section-label { font-size: 12px; font-weight: 700; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; margin: 25px 0 15px; display: block; }
        .input-group { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 15px 20px; margin-bottom: 15px; }
        .input-group label { font-size: 11px; color: var(--text-muted); font-weight: 600; display: block; }
        .input-group input { background: transparent; border: none; color: white; font-size: 18px; font-weight: 600; width: 100%; padding-top: 5px; outline: none; }

        /* OPERADORAS */
        .operator-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .op-card { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 12px; text-align: center; transition: 0.2s; }
        .op-card.selected { border-color: var(--accent); background: rgba(34, 197, 94, 0.05); }
        .op-card img { width: 30px; height: 30px; border-radius: 8px; }

        /* CHIPS DE VALOR */
        .value-chips { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 5px; scrollbar-width: none; }
        .chip { padding: 12px 20px; background: var(--card); border: 1px solid var(--border); border-radius: 100px; font-size: 14px; font-weight: 600; white-space: nowrap; }
        .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .btn-confirm { width: 100%; padding: 20px; border-radius: 20px; border: none; background: var(--accent); color: #000; font-weight: 700; font-size: 16px; margin-top: 30px; box-shadow: 0 10px 30px rgba(34, 197, 94, 0.2); }
    </style>
</head>
<body>

    <header class="app-header">
        <div class="back-btn" onclick="location.href='home.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg></div>
        <div class="balance-chip">
            <small style="color: #fff; opacity: 0.6; font-size: 10px;">SALDO</small>
            <span>R$ 850,00</span>
        </div>
    </header>

    <div class="container">
        <h1 style="font-size: 24px; margin-bottom: 5px;">Recarga de Celular</h1>
        <p style="color: var(--text-muted); font-size: 14px; margin: 0 0 30px;">Prático, rápido e seguro.</p>

        <div class="input-group">
            <label>NÚMERO COM DDD</label>
            <input type="tel" id="phone" placeholder="(00) 00000-0000" oninput="maskPhone(this)">
        </div>

        <span class="section-label">Operadora</span>
        <div class="operator-grid">
            <div class="op-card" onclick="selectOp(this, 'Vivo')"><img src="https://upload.wikimedia.org/wikipedia/commons/a/af/Vivo_logo.svg"></div>
            <div class="op-card" onclick="selectOp(this, 'Tim')"><img src="https://upload.wikimedia.org/wikipedia/commons/c/ca/TIM_logo.svg"></div>
            <div class="op-card" onclick="selectOp(this, 'Claro')"><img src="https://upload.wikimedia.org/wikipedia/commons/d/d9/Claro_logo.svg"></div>
            <div class="op-card" onclick="selectOp(this, 'Oi')"><img src="https://upload.wikimedia.org/wikipedia/commons/3/30/Oi_logo_2016.svg"></div>
        </div>

        <span class="section-label">Quanto quer recarregar?</span>
        <div class="value-chips">
            <div class="chip" onclick="selectChip(this, '15,00')">R$ 15</div>
            <div class="chip active" onclick="selectChip(this, '20,00')">R$ 20</div>
            <div class="chip" onclick="selectChip(this, '30,00')">R$ 30</div>
            <div class="chip" onclick="selectChip(this, '50,00')">R$ 50</div>
        </div>

        <div class="input-group" style="margin-top: 15px;">
            <label>OU DIGITE OUTRO VALOR</label>
            <input type="tel" id="customValue" placeholder="R$ 0,00" oninput="maskMoney(this)">
        </div>

        <button class="btn-confirm" onclick="processar()">Confirmar Recarga</button>
    </div>

    <script>
        let selectedOperator = "";
        let finalValue = "R$ 20,00";

        function selectOp(el, name) {
            document.querySelectorAll('.op-card').forEach(c => c.classList.remove('selected'));
            el.classList.add('selected');
            selectedOperator = name;
        }

        function selectChip(el, val) {
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('customValue').value = ""; // Limpa o outro campo
            finalValue = "R$ " + val;
        }

        function maskPhone(i) {
            let v = i.value.replace(/\D/g,'');
            v = v.replace(/^(\d{2})(\d)/g,"($1) $2");
            v = v.replace(/(\d)(\d{4})$/,"$1-$2");
            i.value = v;
        }

        function maskMoney(i) {
            // Se digitar aqui, desmarca os chips
            document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
            let v = i.value.replace(/\D/g,'');
            v = (v/100).toFixed(2).replace(".", ",");
            i.value = "R$ " + v;
            finalValue = i.value;
        }
        function processar() {
    const phone = document.getElementById('phone').value;
    if(!phone || phone.length < 14) return alert("Digite o telefone!");
    if(!selectedOperator) return alert("Escolha a operadora!");

    // 1. Salva os dados para o cupom (o que você já tinha)
    const dadosRecarga = {
        telefone: phone,
        valor: finalValue,
        operadora: selectedOperator,
        data: new Date().toLocaleDateString(),
        hora: new Date().toLocaleTimeString()
    };
    localStorage.setItem('ultimaRecarga', JSON.stringify(dadosRecarga));

    // 2. Salva no Extrato (Padronizado para aparecer junto com o Pix)
    let extrato = JSON.parse(localStorage.getItem("transacoes")) || [];
    extrato.unshift({
        nome: `Recarga ${selectedOperator}`, // Ex: Recarga Vivo
        tipo: "saida",
        categoria: "recarga",
        valor: finalValue,
        data: new Date().toLocaleDateString('pt-BR')
    });
    localStorage.setItem("transacoes", JSON.stringify(extrato));

    // 3. Atualiza o saldo global (importante!)
    let saldoAtual = parseFloat(localStorage.getItem("saldo")) || 1250.00;
    let valorRecarga = parseFloat(finalValue.replace("R$ ", "").replace(".", "").replace(",", "."));
    localStorage.setItem("saldo", (saldoAtual - valorRecarga));

    const btn = document.querySelector('.btn-confirm');
    btn.innerText = "Validando saldo...";
    setTimeout(() => { location.href = 'comprovante_recarga.html'; }, 1500);
        }
        

    </script>
</body>
</html>
