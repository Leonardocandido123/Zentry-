<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <title>ZENTRY</title>
    <style>
        :root { --primary: #22c55e; --bg: #000; --card: #111827; --border: rgba(255,255,255,0.1); }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: #fff; height: 100vh; display: flex; flex-direction: column; }
        .app-bar { padding: 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        .content { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        .section-title { font-size: 11px; font-weight: 800; color: var(--primary); text-transform: uppercase; margin: 20px 0 10px; }
        .input-box { background: var(--card); border: 1px solid var(--border); border-radius: 16px; padding: 15px; margin-bottom: 10px; }
        .input-box input { background: transparent; border: none; color: #fff; font-size: 18px; width: 100%; }
        
        /* Grid Operadoras */
        .op-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .op-item { background: var(--card); border: 2px solid transparent; border-radius: 16px; padding: 12px 5px; text-align: center; }
        .op-item img { width: 30px; height: 30px; object-fit: contain; }
        .op-item.active { border-color: var(--primary); background: rgba(34, 197, 94, 0.1); }
        
        .value-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .v-chip { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 15px; text-align: center; font-weight: 800; }
        .v-chip.active { background: var(--primary); color: #000; }
        
        .footer-action { position: fixed; bottom: 0; left: 0; right: 0; padding: 20px; background: #000; }
        .btn-pay { width: 100%; padding: 18px; border-radius: 16px; border: none; background: var(--primary); color: #052e16; font-weight: 800; font-size: 16px; }
    </style>
</head>
<body>

    <div class="app-bar">
        <div onclick="window.location.href='home.html'" style="padding: 10px; background: var(--card); border-radius: 10px;">Voltar</div>
        <div id="displaySaldo" style="color: var(--primary); font-weight: 800;">R$ ---</div>
    </div>

    <div class="content">
        <h2 style="margin: 0;">Recarga Celular</h2>
        
        <div class="section-title">Número</div>
        <div class="input-box">
            <input type="tel" id="numTel" placeholder="(00) 00000-0000">
        </div>

        <div class="section-title">Operadora</div>
        <div class="op-grid">
            <div class="op-item" onclick="escolherOp(this, 'Vivo')"><img src="https://img.icons8.com/color/96/vivo.png"><br><small>VIVO</small></div>
            <div class="op-item" onclick="escolherOp(this, 'Tim')"><img src="https://img.icons8.com/color/96/tim.png"><br><small>TIM</small></div>
            <div class="op-item" onclick="escolherOp(this, 'Claro')"><img src="https://img.icons8.com/color/96/claro.png"><br><small>CLARO</small></div>
            <div class="op-item" onclick="escolherOp(this, 'Oi')"><img src="https://img.icons8.com/color/96/oi.png"><br><small>OI</small></div>
        </div>

        <div class="section-title">Valor</div>
        <div class="value-grid">
            <div class="v-chip" onclick="escolherVal(this, 15)">R$ 15</div>
            <div class="v-chip active" onclick="escolherVal(this, 20)">R$ 20</div>
            <div class="v-chip" onclick="escolherVal(this, 30)">R$ 30</div>
        </div>
    </div>

    <div class="footer-action">
        <button id="btnFinish" class="btn-pay" onclick="finalizarAgora()">Confirmar</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let userUid = "";
    let saldoAtual = 0;
    let operadora = "";
    let valor = 20;

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            userUid = user.uid;
            const snap = await getDoc(doc(db, "usuarios", user.uid));
            if(snap.exists()){
                saldoAtual = snap.data().saldo || 0;
                document.getElementById('displaySaldo').innerText = "R$ " + saldoAtual.toFixed(2);
            }
        }
    });

    window.escolherOp = (el, nome) => {
        document.querySelectorAll('.op-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        operadora = nome;
    };

    window.escolherVal = (el, v) => {
        document.querySelectorAll('.v-chip').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        valor = v;
    };

    window.finalizarAgora = async () => {
        const tel = document.getElementById('numTel').value;
        if(tel.length < 5 || !operadora) return alert("Preencha tudo!");
        
        document.getElementById('btnFinish').innerText = "Processando...";
        
        try {
            const id = "TX" + Date.now();
            const data = new Date().toISOString().split('T')[0];

            // Grava transação (pro gráfico)
            await setDoc(doc(db, "transacoes", id), {
                userId: userUid,
                tipo: "saida",
                valor: valor,
                data: data,
                descricao: "Recarga " + operadora
            });

            // Atualiza saldo
            await updateDoc(doc(db, "usuarios", userUid), {
                saldo: saldoAtual - valor
            });

            alert("Sucesso!");
            window.location.href = "home.html";
        } catch(e) { alert("Erro!"); }
    };
</script>
</body>
</html>
