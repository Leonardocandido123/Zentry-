<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="manifest" href="manifest.json">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ZENTRY - Home Premium</title>
  <style>
    :root { 
        --primary: #22c55e; 
        --bg-card: #111827;
        --border: rgba(255, 255, 255, 0.15); 
        --text-secondary: #9CA3AF; 
    }

    body { 
        margin:0; 
        font-family:'Inter',sans-serif; 
        background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%); 
        -webkit-tap-highlight-color: transparent; 
        overflow-x: hidden; 
        color: #fff; 
    }

    .container { padding: 20px 20px 100px 20px; }

    /* HEADER */
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:10px; padding-top: 10px; }
    .user-info h2 { font-size: 20px; margin: 2px 0 0 0; color: #FFF; font-weight: 700; }
    .avatar { width:42px; height:42px; background: var(--bg-card); border-radius:50%; display:flex; align-items:center; justify-content:center; border: 1px solid var(--border); }

    /* SALDO CIRCULAR - O CORAÇÃO DO APP */
    .balance-circle { display: flex; justify-content: center; margin: 40px 0; cursor: pointer; }
    .circle {
        width: 210px; height: 210px; border-radius: 50%;
        border: 5px solid var(--primary); display: flex; flex-direction: column; 
        align-items: center; justify-content: center; background: radial-gradient(circle, #0a0a0a, #000);
        box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        transition: transform 0.2s;
    }
    .circle:active { transform: scale(0.95); }
    .circle span { font-size: 26px; font-weight: 800; color: #fff; }
    .circle small { color: var(--text-secondary); margin-top: 5px; font-size: 12px; }

    /* GRID DE AÇÕES */
    .actions-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; margin-top: 20px; }
    .action-item { text-decoration: none; display: flex; flex-direction: column; align-items: center; }
    .action-icon { width: 60px; height: 60px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 18px; display: flex; align-items: center; justify-content: center; color: #FFF; }
    .action-icon svg { width: 24px; height: 24px; stroke: #fff; stroke-width: 2; fill: none; }
    .action-item span { font-size: 12px; font-weight: 500; color: #FFF; margin-top: 8px; opacity: 0.9; }

    /* CARDS COLORIDOS */
    .pix-card { display:flex; justify-content:space-between; align-items:center; background: linear-gradient(135deg, #22c55e, #16a34a); border-radius:20px; padding:18px; margin: 25px 0; }
    .pix-btn { background:#fff; color:#16a34a; padding:10px 16px; border-radius:12px; font-size:12px; font-weight:700; text-decoration:none; }

    /* NAV BAR */
    .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(10px); border-top: 1px solid var(--border); display: flex; justify-content: space-around; padding: 15px 0 30px; z-index: 1000; }
    .nav-btn { background: none; border: none; color: #9CA3AF; display: flex; flex-direction: column; align-items: center; font-size: 10px; }
    .nav-btn.active { color: var(--primary); }
    .nav-btn svg { width: 24px; height: 24px; stroke: currentColor; fill: none; }
  </style>
</head>
<body>

<div class="container">
  <header class="header">
    <div class="user-info">
      <div id="greeting" style="color: var(--text-secondary); font-size: 14px;">Carregando...</div>
      <h2 id="nome-usuario">...</h2>
    </div>
    <div style="display:flex; gap:12px; align-items:center;">
      <div onclick="toggleSaldoHome()" style="cursor:pointer; color: #FFF; padding: 5px;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-6 11-6 11 6 11 6-4 6-11 6S1 12 1 12z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
      <div class="avatar" onclick="location.href='perfil.html'" style="cursor:pointer;">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
      </div>
    </div>
  </header>

  <div class="balance-circle" onclick="location.href='extrato.html'">
    <div class="circle">
        <span id="saldo-home">R$ 0,00</span>
        <small>Saldo disponível</small>
    </div>
  </div>
  
  <div class="pix-card">
    <div class="pix-info"><b>Pix Express ⚡</b><br><span style="font-size: 11px; opacity: 0.9;">Envie e receba agora</span></div>
    <a href="pix.html" class="pix-btn">Acessar</a>
  </div>

  <section class="actions-grid">
    <a href="extrato.html" class="action-item"><div class="action-icon"><svg viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2M9 5a2 2 0 0 0 2 2h2a2 2 0 0 0 2-2"/></svg></div><span>Extrato</span></a>
    <a href="cobrar.html" class="action-item"><div class="action-icon"><svg viewBox="0 0 24 24"><path d="M12 1v22M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg></div><span>Cobrar</span></a>
    <a href="recarga.html" class="action-item"><div class="action-icon"><svg viewBox="0 0 24 24"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18"/></svg></div><span>Recarga</span></a>
    <a href="contas.html" class="action-item"><div class="action-icon"><svg viewBox="0 0 24 24"><path d="M20 12V8H4v4M2 4h20v16H2V4zm2 4h16v10H4V8z"/></svg></div><span>Contas</span></a>
    <a href="cartao.html" class="action-item"><div class="action-icon"><svg viewBox="0 0 24 24"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg></div><span>Cartão</span></a>
    <a href="pdv.html" class="action-item"><div class="action-icon"><svg viewBox="0 0 24 24"><path d="M3 3h18v18H3zM3 9h18M9 3v18"/></svg></div><span>Vender</span></a>
  </section>

  <nav class="nav-bar">
    <button class="nav-btn active" onclick="location.href='home.html'"><svg viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/></svg>Início</button>
    <button class="nav-btn" onclick="location.href='metas.html'"><svg viewBox="0 0 24 24"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>Metas</button>
    <button class="nav-btn" onclick="logout()"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9"/></svg>Sair</button>
  </nav>
</div> 

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let saldoOculto = false;
    window.currentSaldo = 0;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
                if (docSnap.exists()) {
                    const d = docSnap.data();
                    document.getElementById("nome-usuario").innerText = (d.nome || "Usuário") + "!";
                    window.currentSaldo = parseFloat(d.saldo || 0);
                    renderSaldo();
                    atualizarSaudacao();
                }
            });
        } else {
            window.location.href = "login.html";
        }
    });

    function renderSaldo() {
        const el = document.getElementById("saldo-home");
        if(el) el.innerText = saldoOculto ? "••••••••" : window.currentSaldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    }

    window.toggleSaldoHome = () => { saldoOculto = !saldoOculto; renderSaldo(); };
    window.logout = () => { signOut(auth).then(() => { window.location.href = 'login.html'; }); };

    function atualizarSaudacao() {
        const hora = new Date().getHours();
        const el = document.getElementById("greeting");
        if (hora >= 5 && hora < 12) el.innerText = "Bom dia,";
        else if (hora >= 12 && hora < 18) el.innerText = "Boa tarde,";
        else el.innerText = "Boa noite,";
    }
</script>
</body>
</html>
