<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Suporte</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #22c55e; 
            --card-bg: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            background-attachment: fixed;
            color: #fff;
            min-height: 100vh;
        }
        .container { padding: 25px; max-width: 450px; margin: auto; }
        .back-nav {
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; background: var(--card-bg);
            border-radius: 50%; color: #fff; text-decoration: none;
            margin-bottom: 20px; border: 1px solid var(--border);
        }
        h1 { font-size: 28px; font-weight: 800; margin-bottom: 30px; color: var(--primary); letter-spacing: -1px; }

        .support-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 25px;
            border: 1px solid var(--border);
            text-align: center;
            margin-bottom: 20px;
        }
        .support-card svg { color: var(--primary); margin-bottom: 15px; }
        .support-card h3 { margin: 0 0 10px 0; font-size: 18px; }
        .support-card p { font-size: 13px; color: var(--text-sec); margin-bottom: 20px; }
        
        .btn-support {
            display: flex; align-items: center; justify-content: center; gap: 10px;
            width: 100%; padding: 18px; border-radius: 16px;
            background: #fff; color: #000; text-decoration: none;
            font-weight: 800; font-size: 15px; transition: 0.2s;
        }
        .btn-support:active { transform: scale(0.98); }

        .faq-item {
            background: var(--card-bg);
            padding: 18px 20px;
            border-radius: 18px;
            border: 1px solid var(--border);
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .faq-item span { font-size: 14px; font-weight: 500; }
    </style>
</head>
<body>
    <div class="container">
        <a href="perfil.html" class="back-nav">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        </a>
        <h1>Ajuda</h1>

        <div class="support-card">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
            <h3>Atendimento Zentry</h3>
            <p>Precisa de ajuda com alguma transação ou dúvida sobre sua conta?</p>
            <a href="https://wa.me/seunumeroaqui" class="btn-support">
                Falar com consultor
            </a>
        </div>

        <div style="margin: 30px 0 15px 5px; font-size: 11px; text-transform: uppercase; color: var(--text-sec); letter-spacing: 1px; font-weight: 700;">Dúvidas comuns</div>
        
        <div class="faq-item"><span>Esqueci minha senha Pix</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
        <div class="faq-item"><span>Prazos de transferência</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>
        <div class="faq-item"><span>Taxas e Limites</span><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></div>

    </div>
</body>
</html>
