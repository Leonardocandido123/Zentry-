<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pagamento</title>

<style>
:root {
  --primary: #22c55e;
  --bg: #05070A;
  --card: #111827;
  --text: #fff;
  --sub: #9CA3AF;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Inter', sans-serif;
}

body {
  background: var(--bg);
  color: var(--text);
  padding: 20px;
}

/* HEADER */
.header {
  margin-bottom: 30px;
}

.header h2 {
  font-size: 22px;
}

/* CARD */
.card {
  background: var(--card);
  border-radius: 20px;
  padding: 20px;
  margin-bottom: 25px;
}

/* INFO */
.label {
  color: var(--sub);
  font-size: 13px;
}

.value {
  font-size: 18px;
  margin-top: 5px;
  word-break: break-all;
}

/* VALOR GRANDE */
.valor {
  font-size: 32px;
  font-weight: bold;
  margin: 20px 0;
}

/* BOTÃO */
.pay-btn {
  width: 100%;
  background: var(--primary);
  border: none;
  padding: 16px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: bold;
  color: black;
  cursor: pointer;
  transition: 0.2s;
}

.pay-btn:active {
  transform: scale(0.97);
}

/* ANIMAÇÃO SUCESSO */
.success {
  position: fixed;
  inset: 0;
  background: black;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  opacity: 0;
  pointer-events: none;
  transition: 0.4s;
}

.success.active {
  opacity: 1;
  pointer-events: all;
}

.check {
  width: 80px;
  height: 80px;
  border-radius: 50%;
  background: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 40px;
  color: black;
  margin-bottom: 20px;
}
</style>
</head>

<body>

<div class="header">
  <h2>Confirmar pagamento</h2>
</div>

<div class="card">
  <div class="label">Código</div>
  <div class="value" id="linha"></div>

  <div class="valor" id="valor"></div>

  <div class="label">Vencimento</div>
  <div class="value" id="vencimento"></div>
</div>

<button class="pay-btn" onclick="pagar()">Pagar agora</button>

<!-- TELA SUCESSO -->
<div class="success" id="success">
  <div class="check">✓</div>
  <h2>Pagamento realizado</h2>
</div>

<script>
const boleto = JSON.parse(localStorage.getItem("boletoAtual"));

if(!boleto){
  alert("Nenhum boleto encontrado");
  window.location.href = "home.html";
}

// preencher tela
document.getElementById("linha").innerText = boleto.linha;
document.getElementById("valor").innerText = "R$ " + boleto.valor;
document.getElementById("vencimento").innerText = boleto.vencimento;

// PAGAR
function pagar(){
  // simulação banco
  document.getElementById("success").classList.add("active");

  // salvar histórico
  let historico = JSON.parse(localStorage.getItem("historicoPagamentos")) || [];
  
  historico.unshift({
    ...boleto,
    dataPagamento: new Date().toLocaleString()
  });

  localStorage.setItem("historicoPagamentos", JSON.stringify(historico));

  // voltar home
  setTimeout(() => {
    window.location.href = "home.html";
  }, 2000);
}
</script>

</body>
</html>
