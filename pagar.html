<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
  <title>ZENTRY - Scanner</title>
  <style>
    :root { --primary: #22C55E; --bg: #000; }
    * { box-sizing: border-box; }
    
    body { 
        margin: 0; background: #000; color: white; 
        height: 100vh; width: 100vw; overflow: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* CONTAINER DO SCANNER OCUPANDO TUDO */
    .full-scanner {
        position: fixed; inset: 0;
        background: #000;
        display: flex; align-items: center; justify-content: center;
        z-index: 1;
    }

    /* O SEGREDO: Rotaciona o vídeo se o celular estiver em pé */
    #reader { width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }

    /* MOLDURA DE LEITURA (ESTILO NUBANK) */
    .overlay {
        position: absolute; inset: 0;
        border: 40px solid rgba(0,0,0,0.6); /* Escurece as bordas */
        display: flex; align-items: center; justify-content: center;
        z-index: 10; pointer-events: none;
    }

    .focus-area {
        width: 85%; height: 35%; /* Formato retangular de boleto */
        border: 2px solid var(--primary);
        border-radius: 15px;
        position: relative;
        box-shadow: 0 0 0 1000px rgba(0,0,0,0.4); /* Sombra que cobre o resto */
    }

    .scanner-line {
        position: absolute; inset: 0;
        width: 100%; height: 2px; background: var(--primary);
        box-shadow: 0 0 15px var(--primary);
        animation: scan 2s infinite ease-in-out;
    }

    @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }

    /* BOTÃO VOLTAR POR CIMA */
    .back-btn {
        position: absolute; top: 20px; left: 20px;
        z-index: 20; background: rgba(255,255,255,0.1);
        border: none; color: white; padding: 12px;
        border-radius: 50%; backdrop-filter: blur(10px);
    }

    .tip-msg {
        position: absolute; bottom: 40px; width: 100%;
        text-align: center; z-index: 20; font-size: 14px;
        font-weight: 500; text-shadow: 0 2px 4px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>

  <button class="back-btn" onclick="window.history.back()">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
  </button>

  <div class="full-scanner">
    <div id="reader"></div>
    <div class="overlay">
        <div class="focus-area">
            <div class="scanner-line"></div>
        </div>
    </div>
  </div>

  <div class="tip-msg">Posicione o código de barras na linha verde</div>
<script src="https://unpkg.com/@ericblade/quagga2/dist/quagga.min.js"></script>

<script>
function startScanner() {
  Quagga.init({
    inputStream: {
      type: "LiveStream",
      target: document.querySelector('#reader'),
      constraints: {
        facingMode: "environment"
      }
    },
    decoder: {
      readers: [
        "ean_reader",
        "ean_13_reader",
        "code_128_reader",
        "code_39_reader"
      ]
    },
    locate: true
  }, function(err) {
    if (err) {
      console.error(err);
      return;
    }
    Quagga.start();
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;

    if (navigator.vibrate) navigator.vibrate(200);

    Quagga.stop();
    alert("Código detectado: " + code);
  });
}

window.onload = startScanner;
</script>
</body>
</html>
