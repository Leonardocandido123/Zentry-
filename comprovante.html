<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<title>Comprovante Pix - Techpay</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:'Inter', sans-serif;
  background:#F3F4F6;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:20px;
}

/* CARD */
.receipt-container{
  width:100%;
  max-width:400px;
  background:#FFFFFF;
  border-radius:20px;
  padding:28px;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* STATUS */
.status-icon{
  width:60px;
  height:60px;
  background:#22C55E;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}
.status-icon svg{
  width:30px;
  stroke:#fff;
  fill:none;
  stroke-width:3;
}

.title{
  text-align:center;
  font-size:20px;
  font-weight:700;
  margin-bottom:6px;
  color:#111;
}

.subtitle{
  text-align:center;
  font-size:14px;
  color:#6B7280;
  margin-bottom:30px;
}

/* INFO */
.info-group{ margin-bottom:20px; }

.label{
  font-size:12px;
  color:#6B7280;
  margin-bottom:3px;
  display:block;
}

.value{
  font-size:15px;
  font-weight:600;
  color:#111;
}

.sub-value{
  font-size:13px;
  color:#6B7280;
}

.divider{
  height:1px;
  background:#E5E7EB;
  margin:18px 0;
}

/* BOTÕES */
.btn-share{
  width:100%;
  max-width:400px;
  padding:16px;
  border-radius:12px;
  border:none;
  background:#111;
  color:#fff;
  font-weight:600;
  font-size:15px;
  margin-top:20px;
}

.btn-close{
  background:transparent;
  border:none;
  color:#6B7280;
  margin-top:15px;
}
</style>
</head>

<body>

<div class="receipt-container" id="comprovanteConteudo">

<div class="status-icon">
<svg viewBox="0 0 24 24">
<path d="M20 6L9 17l-5-5"/>
</svg>
</div>

<h1 class="title">Pix enviado</h1>
<p class="subtitle">Transferência realizada com sucesso</p>

<div class="info-group">
<span class="label">Valor</span>
<span class="value" id="valorFinal" style="font-size:26px;color:#22C55E;">R$ 0,00</span>
</div>

<div class="divider"></div>

<div class="info-group">
<span class="label">Para</span>
<span class="value" id="destinoNome">---</span>
<span class="sub-value" id="destinoBanco">---</span>
</div>

<div class="info-group">
<span class="label">Origem</span>
<span class="value" id="nomeOrigem">---</span>
<span class="sub-value">Techpay</span>
</div>

<div class="divider"></div>

<div class="info-group">
<span class="label">Tipo</span>
<span class="value">Pix</span>
</div>

<div class="info-group">
<span class="label">Data e hora</span>
<span class="value" id="dataHora"></span>
</div>

<div class="info-group">
<span class="label">ID da transação</span>
<span class="value" id="idTransacao" style="font-family:monospace;font-size:12px;"></span>
</div>

</div>

<button class="btn-share" onclick="compartilharNativo()">
Compartilhar comprovante
</button>

<button class="btn-close" onclick="location.href='home.html'">
Concluir
</button>

<script>

// DADOS
const valor = localStorage.getItem("ultimoValor") || "R$ 0,00";
const nomeUsuario = localStorage.getItem("usuarioNome") || "Você";
const destino = localStorage.getItem("destinoNome") || "Destinatário";
const banco = localStorage.getItem("destinoBanco") || "Banco desconhecido";

// DATA BONITA
const agora = new Date();
const dataFormatada = agora.toLocaleDateString('pt-BR', {
  day:'2-digit', month:'long', year:'numeric'
}) + " às " + agora.toLocaleTimeString('pt-BR', {
  hour:'2-digit', minute:'2-digit'
});

// ID BONITO
const idTrans = "E" + Date.now() + Math.random().toString(36).substring(2,8).toUpperCase();

// MOSTRAR
document.getElementById("valorFinal").innerText = valor;
document.getElementById("nomeOrigem").innerText = nomeUsuario;
document.getElementById("destinoNome").innerText = destino;
document.getElementById("destinoBanco").innerText = banco;
document.getElementById("dataHora").innerText = dataFormatada;
document.getElementById("idTransacao").innerText = idTrans;

// SALVAR TRANSAÇÃO (CORRETO)
const transacao = {
  id: idTrans,
  tipo: "enviado",
  valor: valor,
  nome: destino,
  banco: banco,
  data: dataFormatada
};

let historico = JSON.parse(localStorage.getItem("transacoes")) || [];
historico.unshift(transacao);
localStorage.setItem("transacoes", JSON.stringify(historico));

// COMPARTILHAR
async function compartilharNativo(){

  const canvas = await html2canvas(document.getElementById("comprovanteConteudo"), {
    backgroundColor:"#FFFFFF",
    scale:3
  });

  const blob = await (await fetch(canvas.toDataURL())).blob();
  const file = new File([blob], "comprovante.png", {type:"image/png"});

  if(navigator.canShare && navigator.canShare({files:[file]})){
    navigator.share({files:[file]});
  }
}

</script>

</body>
</html>
