<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<title>Comprovante Zentry</title>
<style>
  :root {
    --primary: #22c55e; 
    --red: #ef4444; 
    --bg: #f8fafc; 
    --text: #0f172a; 
    --muted: #64748b;
    --border: #e2e8f0;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; }
  body { 
    font-family: 'Sora', sans-serif; 
    background: var(--bg); 
    color: var(--text); 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    padding: 20px;
    min-height: 100vh;
  }

  /* CARD ESTILO COMPROVANTE BANCÁRIO */
  .card-export {
    width: 100%; 
    max-width: 400px; 
    background: #fff; 
    border-radius: 28px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.03); 
    overflow: hidden; 
    border: 1px solid var(--border);
  }

  /* CABEÇALHO DINÂMICO */
  .top-info { 
    padding: 32px 24px; 
    text-align: center; 
    border-bottom: 1px solid #f1f5f9; 
  }
  .top-info.entrada { background: linear-gradient(180deg, #f0fdf4 0%, #fff 100%); }
  .top-info.saida { background: linear-gradient(180deg, #fef2f2 0%, #fff 100%); }

  .status-label { font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.2px; margin-bottom: 8px; }
  .status-label.entrada { color: var(--primary); }
  .status-label.saida { color: var(--red); }

  .valor-principal { font-size: 40px; font-weight: 800; letter-spacing: -1.5px; margin-bottom: 6px; }
  .valor-principal.entrada { color: var(--primary); }
  .valor-principal.saida { color: var(--red); }

  .data-hora { font-size: 13px; color: var(--muted); }

  /* CORPO DO COMPROVANTE */
  .section { padding: 20px 24px; border-bottom: 1px solid #f1f5f9; }
  .section:last-child { border-bottom: none; }
  
  .row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; font-size: 14px; }
  .label { color: var(--muted); font-weight: 400; }
  .value { color: var(--text); font-weight: 600; text-align: right; }
  
  .tx-id { 
    font-family: monospace; 
    background: #f1f5f9; 
    padding: 3px 8px; 
    border-radius: 6px; 
    font-size: 11px; 
    color: var(--muted);
  }

  /* BOTÕES DE AÇÃO */
  .actions { width: 100%; max-width: 400px; margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
  .btn { 
    width: 100%; 
    padding: 16px; 
    border-radius: 16px; 
    border: none; 
    font-family: 'Sora', sans-serif; 
    font-weight: 700; 
    font-size: 15px;
    cursor: pointer; 
    transition: 0.2s; 
  }
  .btn-share { background: var(--primary); color: #052e16; box-shadow: 0 4px 15px rgba(34,197,94,0.2); }
  .btn-back { background: #fff; color: var(--text); border: 1px solid var(--border); }
  .btn:active { transform: scale(0.97); }

  .footer-auth { padding: 16px; text-align: center; background: #fafafa; border-top: 1px dashed var(--border); }
  .auth-text { font-size: 9px; color: #94a3b8; text-transform: uppercase; letter-spacing: 0.5px; }
</style>
</head>
<body>

<div id="cardComprovante" class="card-export">
    <div style="padding:50px; text-align:center; color:var(--muted)">Buscando transação...</div>
</div>

<div class="actions">
  <button class="btn btn-share" onclick="compartilhar()">📤 Compartilhar Comprovante</button>
  <button class="btn btn-back" onclick="window.history.back()">Voltar</button>
</div>
  <script type="module">
import { db, ZentryUI, ZentryUser } from "./zentry-core.js";
import { doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

async function renderizar() {
    const params = new URLSearchParams(window.location.search);
    const txId = params.get("id");

    // 1. Usamos a função do core para achar o ID do documento pelo e-mail salvo
    const userDocId = await ZentryUser.obterIdPorEmail();

    if (!userDocId || !txId) {
        document.getElementById('cardComprovante').innerHTML = `
            <div style="padding:40px; text-align:center;">
                <p>Sessão expirada ou Transação inválida.</p>
                <button class="btn btn-back" style="margin-top:20px" onclick="window.location.href='home.html'">Voltar ao Início</button>
            </div>`;
        return;
    }

    try {
        // 2. Busca a transação dentro da subcoleção do usuário correto
        const snap = await getDoc(doc(db, "usuarios", userDocId, "transacoes", txId));
        
        if (!snap.exists()) {
            document.getElementById('cardComprovante').innerHTML = "<p style='padding:40px; text-align:center;'>Transação não encontrada no banco.</p>";
            return;
        }

        const d = snap.data();
        
        // Define cores (Vermelho para saída/recarga, Verde para entrada)
        const tiposSaida = ['saida', 'recarga', 'pagamento', 'cartao'];
        const isSaida = tiposSaida.includes(d.tipo);
        
        // Título baseado no que foi salvo na Recarga ou Pix
        let tituloHeader = "Transação Realizada";
        if (d.tipo === 'entrada') tituloHeader = "Pix Recebido";
        if (d.tipo === 'saida')   tituloHeader = "Pix Enviado";
        if (d.tipo === 'recarga') tituloHeader = "Recarga Celular";

        const container = document.getElementById('cardComprovante');
        container.innerHTML = `
            <div class="top-info ${isSaida ? 'saida' : 'entrada'}">
                <div class="status-label ${isSaida ? 'saida' : 'entrada'}">${tituloHeader}</div>
                <div class="valor-principal ${isSaida ? 'saida' : 'entrada'}">${ZentryUI.formatarMoeda(d.valor)}</div>
                <div class="data-hora">${ZentryUI.formatarData(d.timestamp)}</div>
            </div>

            <div class="section">
                <div class="row"><span class="label">ID Transação</span><span class="value"><span class="tx-id">${txId}</span></span></div>
                <div class="row"><span class="label">Status</span><span class="value" style="color:var(--primary)">✓ Concluída</span></div>
            </div>

            <div class="section">
                <div class="row"><span class="label">${isSaida ? 'Destino' : 'Origem'}</span><span class="value">${d.descricao || (isSaida ? 'Pagamento' : 'Recebimento')}</span></div>
                <div class="row"><span class="label">Instituição</span><span class="value">${d.instituicao || 'ZENTRY BANK'}</span></div>
            </div>

            ${d.tipo === 'recarga' ? `
            <div class="section">
                <div class="row"><span class="label">Operadora</span><span class="value">${d.descricao.replace('Recarga ', '')}</span></div>
                <div class="row"><span class="label">Canal</span><span class="value">App Mobile</span></div>
            </div>` : ''}

            <div class="footer-auth">
                <div class="auth-text">Autenticação Digital: ${txId.substring(0,18).toUpperCase()}</div>
            </div>
        `;
    } catch (e) {
        console.error("Erro ao buscar comprovante:", e);
        document.getElementById('cardComprovante').innerHTML = "<p style='padding:40px; text-align:center;'>Erro de conexão com o banco.</p>";
    }
}

renderizar();

window.compartilhar = async function() {
    const btn = document.querySelector('.btn-share');
    const textoOriginal = btn.innerHTML;
    btn.innerHTML = "Gerando Imagem...";
    
    try {
        const canvas = await html2canvas(document.getElementById("cardComprovante"), {
            scale: 2,
            backgroundColor: "#ffffff",
            useCORS: true
        });
        
        const blob = await new Promise(r => canvas.toBlob(r, 'image/png'));
        const file = new File([blob], "comprovante_zentry.png", { type: "image/png" });

        if (navigator.share && navigator.canShare({ files: [file] })) {
            await navigator.share({
                files: [file],
                title: 'Comprovante Zentry',
                text: 'Comprovante de transação realizada via Zentry App.'
            });
        } else {
            const link = document.createElement("a");
            link.href = canvas.toDataURL();
            link.download = "comprovante_zentry.png";
            link.click();
        }
    } catch (e) {
        alert("Erro ao compartilhar. Você pode tirar um print da tela!");
    }
    btn.innerHTML = textoOriginal;
};
  </script>
  
  
</body>
</html>
