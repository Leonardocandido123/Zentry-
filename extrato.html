<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Extrato - ZENTRY</title>
<style>
:root {
  --primary: #22C55E;
  --bg: #000;
  --card: #121826;
  --border: #2A3441;
  --text-sec: #9CA3AF;
  --danger: #EF4444;
}
* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
body {
  margin: 0; font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 0%, #0f172a, #000 70%);
  color: white; padding: 20px; min-height: 100vh; overflow-y: auto;
}
  
.header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 0; margin-bottom: 25px; position: sticky; top: 0; z-index: 10;
}

.back {
    width: 44px; height: 44px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; background: var(--card); border: 1px solid var(--border);
}

.back svg { width: 24px; height: 24px; fill: none; stroke: #ffffff; stroke-width: 2.5; }

.header b { font-size: 18px; font-weight: 700; flex: 1; text-align: center; }

.balance {
  background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px;
  border: 1px solid var(--border); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}
.balance h1 { margin: 5px 0; font-size: 32px; letter-spacing: -1px; }
.balance small { color: var(--text-sec); font-weight: 500; text-transform: uppercase; font-size: 11px; letter-spacing: 1px; }

.filters { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
.filter { 
    padding: 10px 20px; border-radius: 14px; border: 1px solid var(--border); 
    font-size: 13px; cursor: pointer; white-space: nowrap; background: var(--card);
    transition: 0.3s; color: var(--text-sec);
}
.filter.active { background: var(--primary); color: black; border-color: var(--primary); font-weight: 700; }

.item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); padding: 18px; border-radius: 20px; margin-bottom: 12px;
  border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
}
.item:active { transform: scale(0.96); opacity: 0.8; }
.left { display: flex; gap: 15px; align-items: center; }
.icon { 
    width: 44px; height: 44px; border-radius: 14px; 
    display: flex; align-items: center; justify-content: center; 
    background: rgba(255,255,255,0.03); font-size: 20px;
}
.right { text-align: right; }
.value-pos { color: var(--primary); font-weight: 700; font-size: 16px; }
.value-neg { color: var(--danger); font-weight: 700; font-size: 16px; }
.small { font-size: 12px; color: var(--text-sec); margin-top: 2px; }

/* MODAL BLINDADO */
#zModalGlobal { 
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); 
    z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px); 
}
.z-content { background:#121826; border:1px solid #2A3441; border-radius:28px; width:100%; max-width:340px; padding:25px; text-align:center; }

.empty { text-align: center; margin-top: 60px; color: var(--text-sec); font-size: 14px; }
</style>
</head>
<body>

<div id="zModalGlobal">
    <div class="z-content">
      <div id="zIcon" style="font-size:40px; margin-bottom:15px;">🔍</div>
      <h3 id="zTitle" style="margin:0; font-size:18px;">Aviso</h3>
      <p id="zText" style="color:#9CA3AF; font-size:14px; margin: 10px 0 20px; line-height: 1.5;"></p>
      <button onclick="document.getElementById('zModalGlobal').style.display='none'" style="width:100%; padding:15px; border-radius:14px; background:var(--primary); border:none; color:#000; font-weight:700;">Fechar</button>
    </div>
</div>

<div class="header">
    <div class="back" onclick="window.location.href='home.html'">
        <svg viewBox="0 0 24 24"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
    </div>
    <b>Extrato</b>
    <div style="width: 44px;"></div>
</div>
  
<div class="balance">
  <small>Saldo em conta</small>
  <h1 id="txt-saldo">R$ 0,00</h1>
</div>

<div class="filters">
  <div class="filter active" data-type="todos">Tudo</div>
  <div class="filter" data-type="entrada">Entradas</div>
  <div class="filter" data-type="saida">Saídas</div>
</div>

<div id="lista">
    <div class="empty">Carregando movimentações...</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, orderBy, onSnapshot, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275",
  storageBucket: "zentry-app-74275.appspot.com",
  messagingSenderId: "571422826071",
  appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allTransacoes = [];
onAuthStateChanged(auth, (user) => {
    if (user) {
        // 1. Monitorar Saldo (Mantém igual)
        onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
            if (docSnap.exists()) {
                const saldo = docSnap.data().saldo || 0;
                document.getElementById('txt-saldo').innerText = saldo.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
            }
        });

        // 2. Consulta Simplificada
        // Removi o 'where' e o 'orderBy' daqui para evitar o erro de índice
        const q = query(collection(db, "transacoes"));

        onSnapshot(q, (snapshot) => {
            allTransacoes = [];
            
            snapshot.forEach(docSnap => {
                const dados = docSnap.data();
                // Filtramos manualmente aqui para garantir que só pegue do usuário logado
                // Usamos trim() para evitar erros de espaços invisíveis no banco
                if (dados.userId && dados.userId.trim() === user.uid.trim()) {
                    allTransacoes.push({ id: docSnap.id, ...dados });
                }
            });

            // Ordenamos por data (mais recente primeiro)
            allTransacoes.sort((a, b) => {
                const dataA = a.timestamp?.seconds || 0;
                const dataB = b.timestamp?.seconds || 0;
                return dataB - dataA;
            });

            render("todos");
        }, (error) => {
            console.error("Erro no Firebase:", error);
            document.getElementById('lista').innerHTML = `<div class="empty">Erro de conexão com o banco.</div>`;
        });
    } else {
        window.location.href = "login.html";
    }
});
  
const q = query(
    collection(db, "transacoes"), 
    where("userId", "==", user.uid),
    orderBy("timestamp", "desc") // Mudei de dataRaw para timestamp
);
  

        onSnapshot(q, (snapshot) => {
            allTransacoes = [];
            snapshot.forEach(doc => {
                allTransacoes.push({ id: doc.id, ...doc.data() });
            });
            render("todos");
        }, (error) => {
            console.error(error);
            document.getElementById('lista').innerHTML = `<div class="empty">Erro ao carregar dados.</div>`;
        });
    } else {
        window.location.href = "login.html";
    }
});

function render(filtro) {
    const container = document.getElementById("lista");
    container.innerHTML = "";

    let filtradas = allTransacoes;
    if (filtro === "entrada") filtradas = allTransacoes.filter(t => t.tipo === "entrada" || t.tipo === "recebido");
    if (filtro === "saida") filtradas = allTransacoes.filter(t => t.tipo === "saida" || t.tipo === "enviado" || t.tipo === "pagamento");

    if (filtradas.length === 0) {
        container.innerHTML = `<div class="empty">Nenhuma movimentação encontrada.</div>`;
        return;
    }

    filtradas.forEach(t => {
        const isNeg = (t.tipo === "saida" || t.tipo === "enviado" || t.tipo === "pagamento");
        const icone = getIcon(t.categoria, isNeg);
        
        const div = document.createElement("div");
        div.className = "item";
        div.innerHTML = `
            <div class="left">
                <div class="icon">${icone}</div>
                <div>
                    <b style="font-size:15px;">${t.nome}</b>
                    <div class="small">${t.data || 'Recentemente'}</div>
                </div>
            </div>
            <div class="right">
                <div class="${isNeg ? 'value-neg' : 'value-pos'}">${isNeg ? '-' : '+'} ${t.valor}</div>
                <div class="small" style="font-size:10px;">${t.categoria.toUpperCase()}</div>
            </div>`;
        
        div.onclick = () => {
            localStorage.setItem("comprovante_atual", JSON.stringify(t));
            window.location.href = "comprovante.html";
        };
        container.appendChild(div);
    });
}

function getIcon(cat, isNeg) {
    if (cat === 'pix') return isNeg ? '💸' : '💰';
    if (cat === 'recarga') return '📱';
    if (cat === 'cartao') return '💳';
    if (cat === 'boleto') return '📄';
    return '🔄';
}

// Lógica de Cliques nos Filtros
document.querySelectorAll('.filter').forEach(btn => {
    btn.onclick = (e) => {
        document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
        e.target.classList.add('active');
        render(e.target.dataset.type);
    };
});
</script>
</body>
</html>
