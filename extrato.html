<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movimentações - Zentry</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: #050505; color: white; padding: 20px; }

        .header { display: flex; align-items: center; margin-bottom: 25px; gap: 15px; }
        .btn-back { background: #131921; border: none; color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; }

        /* Card de Saldo Original */
        .card-saldo { background: #131921; padding: 25px; border-radius: 24px; margin-bottom: 25px; border: 1px solid #1c252e; }
        .card-saldo span { color: #8e97a3; font-size: 13px; text-transform: uppercase; font-weight: 600; }
        .card-saldo h2 { font-size: 32px; margin-top: 8px; font-weight: 700; color: #fff; }

        /* Filtros */
        .filters { display: flex; gap: 10px; margin-bottom: 25px; }
        .filter { flex: 1; padding: 12px; border-radius: 12px; border: none; background: #131921; color: #8e97a3; font-weight: 600; cursor: pointer; }
        .filter.active { background: #22c55e; color: #000; }

        /* Itens da Lista */
        .lista { display: flex; flex-direction: column; gap: 12px; }
        .item { background: #0f141a; padding: 18px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #161c24; cursor: pointer; }
        
        .item-left { display: flex; align-items: center; gap: 15px; }
        .icon-box { width: 48px; height: 48px; background: #1a1f26; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        
        .info b { display: block; font-size: 16px; margin-bottom: 2px; color: #fff; }
        .info span { font-size: 12px; color: #667085; }

        .val { font-size: 16px; font-weight: 700; }
        .pos { color: #22c55e; }
        .neg { color: #f04438; }
    </style>
</head>
<body>

    <div class="header">
        <button class="btn-back" onclick="history.back()">‹</button>
        <h3 style="font-size: 18px;">Movimentações</h3>
    </div>

    <div class="card-saldo">
        <span>Saldo disponível</span>
        <h2 id="txtSaldo">R$ 0,00</h2>
    </div>

    <div class="filters">
        <button class="filter active" data-type="todos">Tudo</button>
        <button class="filter" data-type="entrada">Entradas</button>
        <button class="filter" data-type="saida">Saídas</button>
    </div>

    <div id="listaExtrato" class="lista"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
            authDomain: "zentry-app-74275.firebaseapp.com",
            projectId: "zentry-app-74275",
            storageBucket: "zentry-app-74275.appspot.com",
            messagingSenderId: "571422826071",
            appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let transacoesCache = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                onSnapshot(doc(db, "usuarios", user.uid), (ds) => {
                    if(ds.exists()) {
                        document.getElementById('txtSaldo').innerText = (ds.data().saldo || 0).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }
                });

                onSnapshot(collection(db, "transacoes"), (snap) => {
                    transacoesCache = [];
                    snap.forEach(d => {
                        const t = d.data();
                        if (t.userId === user.uid || t.uidDestino === user.uid) {
                            transacoesCache.push({ id: d.id, ...t });
                        }
                    });
                    transacoesCache.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    const filtroAtivo = document.querySelector('.filter.active').dataset.type;
                    renderizar(filtroAtivo);
                });
            } else { window.location.href = "login.html"; }
        });

        function renderizar(filtro) {
            const lista = document.getElementById('listaExtrato');
            lista.innerHTML = "";
            const me = auth.currentUser.uid;

            let filtradas = transacoesCache.filter(t => {
                const ehEntrada = t.uidDestino === me || t.tipo === "entrada";
                if (filtro === "entrada") return ehEntrada;
                if (filtro === "saida") return !ehEntrada;
                return true;
            });

            filtradas.forEach(t => {
                const souEuRecebendo = t.uidDestino === me || t.tipo === "entrada";
                let val = typeof t.valor === 'number' ? t.valor : parseFloat(String(t.valor).replace(/[^\d,.-]/g, '').replace(',', '.'));
                
                lista.innerHTML += `
                    <div class="item" onclick="abrirComprovante('${t.id}')">
                        <div class="item-left">
                            <div class="icon-box">${souEuRecebendo ? '💰' : '💸'}</div>
                            <div class="info">
                                <b>${souEuRecebendo ? (t.nomeRemetente || "Pix Recebido") : (t.nomeDestino || "Pix Enviado")}</b>
                                <span>${t.data || 'Pix realizado'}</span>
                            </div>
                        </div>
                        <div class="val ${souEuRecebendo ? 'pos' : 'neg'}">
                            ${souEuRecebendo ? '+' : '-'} ${val.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' })}
                        </div>
                    </div>`;
            });
        }

        document.querySelectorAll('.filter').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                renderizar(btn.dataset.type);
            };
        });

        window.abrirComprovante = (id) => {
            const t = transacoesCache.find(x => x.id === id);
            if (t) {
                localStorage.setItem("comprovante_ativo", JSON.stringify(t));
                window.location.href = "comprovante.html";
            }
        };
    </script>
</body>
</html>
