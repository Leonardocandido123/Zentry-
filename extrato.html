<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<title>Extrato - Tech Pay</title>
<style>
:root {
  --primary: #22C55E;
  --bg: radial-gradient(circle at 20% 0%, #0f172a, #000 70%);
  --card: rgba(18,24,38,0.9);
  --border: rgba(255,255,255,0.05);
  --text-sec: #9CA3AF;
}
body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: white;
  padding: 20px;
  min-height: 100vh;
}
  
.balance {/* BALANÇO CORRIGIDO */
  background: var(--card); 
  border-radius: 24px; 
  padding: 25px; 
  margin-bottom: 20px;
  border: 1px solid var(--border); 
  box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}

.balance h1 { margin: 5px 0; font-size: 32px; }
.balance small { color: var(--text-sec); font-weight: 500; }
  /* AJUSTE DO HEADER ESTILO BANCO */
.header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 0;
    margin-bottom: 25px;
    position: sticky;
    top: 0;
    background: var(--bg); /* Garante que o fundo não fique transparente ao rolar */
    z-index: 10;
}

/* Botão da Seta (Área de toque 44px) */
.back {
    width: 44px; 
    height: 44px; 
    border-radius: 50%;
    background: none; /* Tirei o fundo cinza fixo para ficar mais moderno */
    display: flex; 
    align-items: center; 
    justify-content: center;
    cursor: pointer;
    transition: 0.2s;
}

.back:active {
    background: rgba(255, 255, 255, 0.1);
    transform: scale(0.9);
}

/* Ícone da Seta (SVG para não perder qualidade) */
.back svg {
    width: 24px;
    height: 24px;
    fill: none;
    stroke: #ffffff;
    stroke-width: 2.5;
    stroke-linecap: round;
    stroke-linejoin: round;
}

/* Título Centralizado */
.header b {
    font-size: 18px;
    font-weight: 700;
    flex: 1;
    text-align: center;
}
  
  background: var(--card); border-radius: 24px; padding: 25px; margin-bottom: 20px;
  border: 1px solid var(--border); box-shadow: 0 20px 50px rgba(0,0,0,0.4);
}
.balance h1 { margin: 5px 0; }
.filters {
  display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto;
}
.filter { padding: 8px 14px; border-radius: 12px; border: 1px solid var(--border); font-size: 12px; cursor: pointer; white-space: nowrap; }
.active { background: var(--primary); color: black; }
.group-title { margin: 20px 0 10px; font-size: 12px; color: var(--text-sec); font-weight: 700; }
.item {
  display: flex; justify-content: space-between; align-items: center;
  background: var(--card); padding: 16px; border-radius: 18px; margin-bottom: 10px;
  border: 1px solid var(--border); cursor: pointer; transition: 0.2s;
}
.item:active { transform: scale(0.97); }
.left { display: flex; gap: 12px; align-items: center; }
.icon { width: 40px; height: 40px; border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.right { text-align: right; }
.value-pos { color: #22C55E; font-weight: 700; }
.value-neg { color: #EF4444; font-weight: 700; }
.small { font-size: 11px; color: var(--text-sec); }
.empty { text-align: center; margin-top: 50px; color: var(--text-sec); }
</style>
</head>
<body>
<div class="header">
    <div class="back" onclick="window.location.href='home.html'">
        <svg viewBox="0 0 24 24">
            <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
    </div>
    
    <b>Extrato</b>
    
    <div style="width: 44px;"></div>
</div>
  
<div class="balance">
  <small>Saldo disponível</small>
  <h1 id="saldo">R$ 0,00</h1>
</div>

<div class="filters">
  <div class="filter active" onclick="filtrar('todos')">Tudo</div>
  <div class="filter" onclick="filtrar('entrada')">Entradas</div>
  <div class="filter" onclick="filtrar('saida')">Saídas</div>
</div>

<div id="lista"></div>

<script>
const transacoes = [
  {tipo:"enviado", nome:"João", valor:"R$ 50,00", data:"Hoje", categoria:"pix", banco:"Nubank"},
  {tipo:"recebido", nome:"Maria", valor:"R$ 120,00", data:"Hoje", categoria:"pix", banco:"Inter"},
  {tipo:"recarga", nome:"Leo", valor:"R$ 30,00", data:"Ontem", categoria:"recarga", numero:"(18)99999-9999", operadora:"Vivo"}
];

function atualizarSaldo(lista){
  let total=0;
  lista.forEach(t=>{
    const valor=parseFloat(t.valor.replace(/[^\d,]/g,'').replace(',','.'));
    if(t.tipo==="entrada"||t.tipo==="recebido") total+=valor;
    else total-=valor;
  });
  document.getElementById("saldo").innerText=total.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function filtrar(tipo){
  document.querySelectorAll('.filter').forEach(f=>f.classList.remove('active'));
  event.target.classList.add('active');
  let filtradas=transacoes;
  if(tipo==="entrada") filtradas=transacoes.filter(t=>t.tipo==="entrada"||t.tipo==="recebido");
  if(tipo==="saida") filtradas=transacoes.filter(t=>t.tipo==="saida"||t.tipo==="enviado");
  render(filtradas);
}

function render(lista){
  const container=document.getElementById("lista");
  container.innerHTML="";
  if(lista.length===0){container.innerHTML=`<div class="empty">Nenhuma movimentação</div>`; return;}
  atualizarSaldo(lista);
  lista.forEach(t=>{
    const isNeg=t.tipo==="saida"||t.tipo==="enviado";
    const div=document.createElement("div");
    div.className="item";
    div.innerHTML=`
      <div class="left">
        <div class="icon" style="background: rgba(255,255,255,0.05)">
          ${t.categoria==='recarga'?'📱':isNeg?'💸':'💰'}
        </div>
        <div>
          <b>${t.nome}</b>
          <div class="small">${t.data}</div>
        </div>
      </div>
      <div class="right">
        <div class="${isNeg?'value-neg':'value-pos'}">${isNeg?'-':'+'} ${t.valor}</div>
      </div>`;
    div.onclick=()=>abrirComprovante(t);
    container.appendChild(div);
  });
}

function abrirComprovante(t){
  const tipoMap={enviado:"pix",recebido:"pix",recarga:"recarga",saida:"pagamento"};
  const dados={
    tipo:tipoMap[t.tipo]||"pix",
    nome:t.nome,
    valor:t.valor,
    banco:t.banco||"-",
    categoria:t.categoria||"-",
    numero:t.numero||"",
    operadora:t.operadora||"",
    data:t.data||new Date().toLocaleString(),
    id:"TP"+Date.now()
  };
  localStorage.setItem("comprovante",JSON.stringify(dados));
  window.location.href="comprovante.html";
}

// INIT
render(transacoes);
</script>
</body>
</html>
