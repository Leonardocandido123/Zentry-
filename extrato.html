<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&display=swap" rel="stylesheet">
    <title>Extrato - Zentry</title>
    <style>
        :root {
            --primary: #22c55e;
            --bg: #060910;
            --card: #0f1623;
            --card2: #161f2e;
            --border: rgba(255,255,255,0.07);
            --text: #fff;
            --text-muted: #6b7a99;
            --red: #ef4444;
            --green: #22c55e;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; margin: 0; padding: 0; }
        body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; padding-bottom: 40px; }

        .header { padding: 16px 20px; display: flex; align-items: center; gap: 14px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--bg); z-index: 10; }
        .btn-back { width: 40px; height: 40px; background: var(--card2); border: 1px solid var(--border); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; cursor: pointer; color: #fff; }
        
        .card-saldo { margin: 20px; background: var(--card); border: 1px solid var(--border); border-radius: 24px; padding: 24px; }
        .card-saldo span { color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; }
        .card-saldo h2 { font-size: 30px; font-weight: 800; margin-top: 8px; color: var(--primary); }

        .filters { display: flex; gap: 8px; padding: 0 20px 16px; overflow-x: auto; }
        .filters::-webkit-scrollbar { display: none; }
        .filter { flex-shrink: 0; padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border); background: var(--card); color: var(--text-muted); font-weight: 600; font-size: 13px; cursor: pointer; }
        .filter.active { background: var(--primary); color: #052e16; border-color: var(--primary); }

        .lista { display: flex; flex-direction: column; gap: 2px; padding: 0 20px; }
        .item { background: var(--card); padding: 16px; border-radius: 16px; display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; cursor: pointer; transition: opacity 0.15s; }
        .item:active { opacity: 0.7; }
        .icon-box { width: 46px; height: 46px; background: var(--card2); border-radius: 14px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .info b { display: block; font-size: 14px; font-weight: 700; color: #fff; }
        .info span { font-size: 11px; color: var(--text-muted); }
        .val { font-size: 15px; font-weight: 800; }
        .val.pos { color: var(--green); }
        .val.neg { color: var(--red); }

        .loading-wrap { text-align: center; padding: 60px 20px; color: var(--text-muted); }
        .spinner { width: 36px; height: 36px; border-radius: 50%; border: 3px solid var(--border); border-top-color: var(--primary); animation: spin 0.8s linear infinite; margin: 0 auto 16px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="header">
    <button class="btn-back" onclick="history.back()">‹</button>
    <h3>Movimentações</h3>
</div>

<div class="card-saldo">
    <span>Saldo disponível</span>
    <h2 id="txtSaldo">...</h2>
</div>

<div class="filters">
    <button class="filter active" data-type="todos">Tudo</button>
    <button class="filter" data-type="entrada">Entradas</button>
    <button class="filter" data-type="saida">Saídas</button>
</div>

<div id="listaExtrato" class="lista">
    <div class="loading-wrap">
        <div class="spinner"></div>
        Carregando...
    </div>
</div>
<script type="module">
import { db, ZentryUI, ZentryAuth } from './zentry-core.js';
import {
    collection,
    onSnapshot,
    query,
    orderBy,
    doc
} from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

let uidAtual = "";
let transacoesCache = [];
let unsubUser = null;
let unsubTx = null;

// 🚀 INIT
async function init() {
    try {
        const user = await ZentryAuth.exigirLogin();

        if (!user) {
            window.location.href = "login.html";
            return;
        }

        uidAtual = user.uid;

        // salva ID (pra comprovante funcionar)
        localStorage.setItem("idUsuarioLogado", uidAtual);

        iniciarListenerSaldo();
        iniciarListenerTransacoes();

    } catch (e) {
        console.error("Erro ao iniciar extrato:", e);
        window.location.href = "login.html";
    }
}

// 💰 SALDO TEMPO REAL
function iniciarListenerSaldo() {

    if (unsubUser) unsubUser();

    unsubUser = onSnapshot(doc(db, "usuarios", uidAtual), (ds) => {
        if (!ds.exists()) return;

        const saldo = Number(ds.data().saldo || 0);

        const el = document.getElementById('txtSaldo');
        if (el) {
            el.innerText = ZentryUI.formatarMoeda(
                isNaN(saldo) ? 0 : saldo
            );
        }
    });
}

// 📊 TRANSAÇÕES TEMPO REAL
function iniciarListenerTransacoes() {

    if (unsubTx) unsubTx();

    const qTx = query(
        collection(db, "usuarios", uidAtual, "transacoes"),
        orderBy("timestamp", "desc")
    );

    unsubTx = onSnapshot(qTx, (snap) => {
        transacoesCache = snap.docs.map(d => ({
            id: d.id,
            ...d.data()
        }));

        renderizar("todos");
    }, (err) => {
        console.error("Erro ao buscar transações:", err);
    });
}

// 🎯 RENDER
function renderizar(filtro) {
    const lista = document.getElementById('listaExtrato');
    if (!lista) return;

    let filtradas = transacoesCache.filter(t => {
        if (filtro === "entrada") return t.tipo === "entrada";
        if (filtro === "saida") return t.tipo === "saida";
        return true;
    });

    if (filtradas.length === 0) {
        lista.innerHTML = `
            <div style="text-align:center; padding:40px; color:#6b7a99;">
                Nenhuma movimentação.
            </div>`;
        return;
    }

    lista.innerHTML = "";

    filtradas.forEach(t => {

        const ehEntrada = t.tipo === "entrada";

        let dataFinal = "Agora";
        let horaFinal = "";

        if (t.timestamp?.toDate) {
            const d = t.timestamp.toDate();
            dataFinal = d.toLocaleDateString('pt-BR');
            horaFinal = d.toLocaleTimeString('pt-BR', {
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        const valor = Number(t.valor) || 0;

        lista.innerHTML += `
            <div class="item" onclick="abrirComprovante('${t.id}')">
                <div style="display:flex; align-items:center; gap:12px;">
                    
                    <div class="icon-box" style="background: ${
                        ehEntrada ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)'
                    };">
                        ${ehEntrada ? '💚' : '💸'}
                    </div>

                    <div class="info">
                        <b>${t.descricao || 'Transação'}</b>
                        <span>${dataFinal} • ${horaFinal}</span>
                    </div>

                </div>

                <div style="text-align:right;">
                    <div class="val ${ehEntrada ? 'pos' : 'neg'}">
                        ${ehEntrada ? '+' : '-'} ${ZentryUI.formatarMoeda(valor)}
                    </div>
                </div>
            </div>
        `;
    });
}

// 🔎 ABRIR COMPROVANTE
window.abrirComprovante = (id) => {
    window.location.href = `comprovante.html?id=${id}`;
};

// 🎛️ FILTROS
function initFiltros() {
    document.querySelectorAll('.filter').forEach(btn => {
        btn.onclick = () => {
            document.querySelectorAll('.filter')
                .forEach(b => b.classList.remove('active'));

            btn.classList.add('active');

            renderizar(btn.dataset.type);
        };
    });
}

// 🔄 LIMPA LISTENERS
window.addEventListener("beforeunload", () => {
    if (unsubUser) unsubUser();
    if (unsubTx) unsubTx();
});

// 🚀 START
init();
initFiltros();

</script>

</body>
</html>
