<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <title>Extrato - ZENTRY</title>
    <style>
        :root {
            --primary: #cc0000; /* Vermelho Santander */
            --bg: #f4f5f7;      /* Cinza bem clarinho de fundo */
            --card: #ffffff;    /* Branco puro para os cards */
            --text-main: #1f2937;
            --text-sec: #6b7280;
            --success: #22C55E;
            --danger: #ef4444;
            --border: #e5e7eb;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body { 
            margin: 0; 
            font-family: 'Inter', sans-serif; 
            background-color: var(--bg); 
            color: var(--text-main); 
            padding: 20px;
            min-height: 100vh;
        }

        /* HEADER */
        .header { display: flex; align-items: center; margin-bottom: 25px; }
        .back-btn { 
            background: var(--card); 
            border: 1px solid var(--border); 
            border-radius: 50%; 
            width: 44px; height: 44px; 
            display: flex; align-items: center; justify-content: center; 
            cursor: pointer; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* SALDO ESTILO BANCO */
        .balance-card { 
            background: var(--card); 
            border-radius: 24px; 
            padding: 25px; 
            margin-bottom: 25px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
        }
        .balance-card small { color: var(--text-sec); font-weight: 600; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
        .balance-card h1 { margin: 8px 0 0; font-size: 32px; font-weight: 800; color: var(--text-main); letter-spacing: -1px; }

        /* FILTROS */
        .filters { display: flex; gap: 10px; margin-bottom: 25px; }
        .filter { 
            flex: 1; padding: 12px; border-radius: 14px; 
            border: 1px solid var(--border); background: var(--card); 
            color: var(--text-sec); font-size: 14px; font-weight: 700; 
            cursor: pointer; text-align: center; transition: 0.2s;
        }
        .filter.active { background: var(--primary); color: #fff; border-color: var(--primary); }

        /* LISTA DE TRANSAÇÕES */
        .item { 
            display: flex; justify-content: space-between; align-items: center; 
            background: var(--card); padding: 18px; border-radius: 20px; 
            margin-bottom: 12px; border: 1px solid var(--border);
            transition: 0.2s;
        }
        .item:active { transform: scale(0.98); background: #fafafa; }
        
        .left { display: flex; align-items: center; gap: 15px; }
        .icon { 
            width: 46px; height: 46px; border-radius: 14px; 
            background: #f9fafb; display: flex; align-items: center; 
            justify-content: center; font-size: 20px; border: 1px solid var(--border);
        }
        
        .info b { display: block; font-size: 15px; color: var(--text-main); font-weight: 700; }
        .info span { font-size: 12px; color: var(--text-sec); }
        
        .right { text-align: right; }
        .val { font-weight: 800; font-size: 16px; }
        .val.pos { color: var(--success); }
        .val.neg { color: var(--danger); }

        .empty { text-align: center; color: var(--text-sec); margin-top: 60px; font-weight: 500; }
    </style>
</head>
<body>

    <div class="header">
        <div class="back-btn" onclick="history.back()">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#1f2937" stroke-width="2.5"><path d="M15 18l-6-6 6-6"/></svg>
        </div>
        <b style="font-size: 20px; flex: 1; text-align: center; margin-right: 44px;">Extrato</b>
    </div>

    <div class="balance-card">
        <small>Saldo em conta</small>
        <h1 id="txtSaldo">R$ 0,00</h1>
    </div>

    <div class="filters">
        <div class="filter active" data-type="todos">Tudo</div>
        <div class="filter" data-type="entrada">Entradas</div>
        <div class="filter" data-type="saida">Saídas</div>
    </div>

    <div id="listaExtrato">
        <div class="empty">Buscando movimentações...</div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, doc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
            authDomain: "zentry-app-74275.firebaseapp.com",
            projectId: "zentry-app-74275",
            storageBucket: "zentry-app-74275.appspot.com",
            messagingSenderId: "571422826071",
            appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);

        let transacoesCache = [];

        onAuthStateChanged(auth, (user) => {
            if (user) {
                // Monitorar Saldo
                onSnapshot(doc(db, "usuarios", user.uid), (ds) => {
                    if(ds.exists()) {
                        const s = ds.data().saldo || 0;
                        document.getElementById('txtSaldo').innerText = s.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
                    }
                });

                // Monitorar Transações
                onSnapshot(collection(db, "transacoes"), (snap) => {
                    transacoesCache = [];
                    snap.forEach(d => {
                        const t = d.data();
                        // Aparece se eu enviei (userId) ou recebi (uidDestino)
                        if (t.userId === user.uid || t.uidDestino === user.uid) {
                            transacoesCache.push({ id: d.id, ...t });
                        }
                    });

                    transacoesCache.sort((a,b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                    renderizar("todos");
                });
            } else {
                window.location.href = "login.html";
            }
        });

        function renderizar(filtro) {
            const lista = document.getElementById('listaExtrato');
            lista.innerHTML = "";
            const me = auth.currentUser.uid;

            let filtradas = transacoesCache.filter(t => {
                if (filtro === "entrada") return t.uidDestino === me;
                if (filtro === "saida") return t.userId === me;
                return true;
            });

            if (filtradas.length === 0) {
                lista.innerHTML = `<div class="empty">Nenhuma transação disponível.</div>`;
                return;
            }

            filtradas.forEach(t => {
                const souEuRecebendo = t.uidDestino === me;
                const valorFormatado = t.valor;
                const nome = souEuRecebendo ? (t.nomeRemetente || "Pix Recebido") : (t.descricao || t.nomeDestino || "Enviado");
                
                const html = `
                    <div class="item" onclick="verComprovante('${t.id}')">
                        <div class="left">
                            <div class="icon">${souEuRecebendo ? '💰' : '💸'}</div>
                            <div class="info">
                                <b>${nome}</b>
                                <span>${t.data || 'Recentemente'}</span>
                            </div>
                        </div>
                        <div class="right">
                            <div class="val ${souEuRecebendo ? 'pos' : 'neg'}">
                                ${souEuRecebendo ? '+' : '-'} R$ ${valorFormatado}
                            </div>
                            <span style="font-size:11px; color:#9CA3AF; font-weight:600;">PIX</span>
                        </div>
                    </div>
                `;
                lista.innerHTML += html;
            });
        }

        window.verComprovante = (id) => {
            const transacao = transacoesCache.find(t => t.id === id);
            localStorage.setItem("comprovante_atual", JSON.stringify(transacao));
            window.location.href = "comprovante.html";
        };

        document.querySelectorAll('.filter').forEach(btn => {
            btn.onclick = () => {
                document.querySelectorAll('.filter').forEach(f => f.classList.remove('active'));
                btn.classList.add('active');
                renderizar(btn.dataset.type);
            };
        });
    </script>
</body>
</html>
