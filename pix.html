<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Tech Pay - Área Pix Premium</title>
  <style>
    :root { 
      --primary: #22C55E; /* Verde Neon TechPay */
       --bg: radial-gradient(circle at 20% 0%, #0f172a, #000 65%);
      --card-dark: #121826; 
      --border: #2A3441; 
      --text-sec: #9CA3AF; 
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    
    body {
  margin: 0;
  font-family: 'Inter', sans-serif;
  background: radial-gradient(circle at 20% 0%, #0f172a, #000 65%);
  color: white;
  overflow-x: hidden;
    }

    .btn-touch:active { transform: scale(0.96); opacity: 0.8; }
    .btn-touch { transition: 0.2s; cursor: pointer; }

    /* HEADER */
    .header { padding: 30px 20px 15px; position: sticky; top: 0; background: rgba(15, 23, 42, 0.6);
backdrop-filter: blur(20px);
border-bottom: 1px solid rgba(255,255,255,0.05);
    .nav-top { display: flex; align-items: center; justify-content: space-between; }
    .nav-left { display: flex; align-items: center; gap: 20px; }
    .back-btn { background: none; border: none; color: white; display: flex; align-items: center; }
    
    .header h2 { font-size: 22px; margin: 0; font-weight: 700; letter-spacing: -0.5px; }
    
    /* CAMPO DE SALDO */
    
      .balance-field {
  background: linear-gradient(145deg, #121826, #0f172a);
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      }
    .balance-small { color: var(--text-sec); font-size: 12px; text-transform: uppercase; letter-spacing: 0.5px; }
    .balance-value { font-size: 18px; font-weight: 700; margin-top: 4px; }
    .eye-btn { color: var(--text-sec); }

    .container { padding: 25px 20px; }

    /* GRID PIX - CARDS DARK COM ICONES VERDES */
    .pix-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 40px; }
    
.pix-item { 
  background: linear-gradient(145deg, #121826, #0f172a);
  border: 1px solid var(--border);
  border-radius: 22px; 
  padding: 24px 20px; 
  display: flex; 
  flex-direction: column; 
  gap: 15px;
  position: relative;
  overflow: hidden;
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  transition: 0.2s;
}

    .pix-item::after {
  content: '';
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 2px;

  background: linear-gradient(
    90deg,
    transparent,
    var(--primary),
    transparent
  );

  opacity: 0.4;
    }
             .pix-item:active {
  transform: scale(0.97);
             }
    
    .icon-wrapper { 
      width: 32px; height: 32px; 
      color: var(--primary); /* Ícone Verde */
      display: flex; align-items: center; justify-content: center; 
      text-shadow: 0 0 10px rgba(34,197,94,0.6);
    }
    .icon-wrapper svg { width: 28px; height: 28px; stroke-width: 2; }
    
    .pix-item b { font-size: 16px; color: #FFF; font-weight: 600; }
    .pix-item span { font-size: 11px; color: var(--text-sec); line-height: 1.3; }

    /* RECENTES */
    .section-title { font-size: 13px; font-weight: 700; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 20px; color: var(--primary); display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex-grow: 1; height: 1px; background: var(--border); }

    .recent-list { display: flex; gap: 20px; overflow-x: auto; padding-bottom: 15px; scrollbar-width: none; }
    .recent-list::-webkit-scrollbar { display: none; }
    .recent-user { display: flex; flex-direction: column; align-items: center; gap: 10px; min-width: 70px; }
    .user-thumb { 
        width: 58px; height: 58px; 
        background: #1A1F2E; 
        border: 1.5px solid var(--border); 
        border-radius: 50%; 
        display: flex; align-items: center; justify-content: center; 
        font-size: 15px; font-weight: 600; color: var(--primary);
    }

    /* GESTÃO */
    .manage-card { background: var(--card-dark); border-radius: 24px; border: 1px solid var(--border); padding: 5px 20px; margin-top: 10px; }
    .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
    .manage-item:last-child { border: none; }
    .manage-info b { font-size: 15px; color: #FFF; font-weight: 500; }
    
    svg { fill: none; stroke: currentColor; stroke-width: 1.8; }
    .chevron { color: var(--primary); }

  </style>
</head>
<body>

<header class="header">
  <div class="nav-top">
    <div class="nav-left">
      <button class="back-btn btn-touch" onclick="location.href='home.html'">
        <svg width="24" height="24" viewBox="0 0 24 24">
          <path d="M19 12H5M12 19l-7-7 7-7"/>
        </svg>
      </button>

      <div style="display:flex; flex-direction:column;">
        <h2>Área Pix</h2>
        <span style="
          color: var(--primary);
          font-size:10px;
          background: rgba(34,197,94,0.1);
          padding: 3px 8px;
          border-radius: 8px;
          font-weight: 600;
          width: fit-content;
        ">
          ⚡ Pix ativo
        </span>
      </div>

    </div>
  </div>
</header>
    
    <div class="balance-field btn-touch" onclick="toggleSaldo()">
      <div>
        <div class="balance-small">Seu Saldo</div>
        <div class="balance-value" id="saldo-txt">R$ 1.250,00</div>
      </div>
      <div class="eye-btn">
        <svg id="eye-icon" width="22" height="22" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </div>
    </div>
  </header>

  <div class="container">
    <div class="pix-grid">
      <div class="pix-item btn-touch" onclick="location.href='transferir.html'">
        <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M12 19V5m-7 7l7-7 7 7"/></svg></div>
        <b>Transferir</b><span>Envie dinheiro em segundos</span>
      </div>

      <div class="pix-item btn-touch" onclick="location.href='copia_cola.html'">
        <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1"/></svg></div>
        <b>Copia e Cola</b><span>Códigos Pix</span>
      </div>

      <div class="pix-item btn-touch" onclick="location.href='pagar.html'">
        <div class="icon-wrapper"><svg viewBox="0 0 24 24"><path d="M3 7V5a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v2m0 10v2a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-2M7 7h10v10H7z"/></svg></div>
        <b>Ler QR Code</b><span>Escanear fatura</span>
      </div>

      <div class="pix-item btn-touch" onclick="location.href='agendar.html'">
        <div class="icon-wrapper"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18"/></svg></div>
        <b>Programar</b><span>Pagamentos futuros</span>
      </div>
    </div>

    <div class="section-title">Contatos Recentes</div>
    <div class="recent-list">
      <div class="recent-user"><div class="user-thumb">AM</div><span>Ana</span></div>
      <div class="recent-user"><div class="user-thumb">JR</div><span>João</span></div>
      <div class="recent-user"><div class="user-thumb">LC</div><span>Lucas</span></div>
      <div class="recent-user"><div class="user-thumb">BT</div><span>Bia</span></div>
      <div class="recent-user"><div class="user-thumb">GL</div><span>Gabi</span></div>
    </div>

    <div class="section-title" style="margin-top:30px">Gerenciar</div>
    <div class="manage-card">
        <div class="manage-item btn-touch" onclick="location.href='pix_chaves.html'">
          <div class="manage-info"><b>Minhas chaves</b></div>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="manage-item btn-touch" onclick="location.href='relatorios.html'">
          <div class="manage-info"><b>Histórico de envios</b></div>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </div>
        <div class="manage-item btn-touch" onclick="location.href='pix_limites.html'">
          <div class="manage-info"><b>Ajustar limites Pix</b></div>
          <svg class="chevron" width="18" height="18" viewBox="0 0 24 24"><path d="M9 18l6-6-6-6"/></svg>
        </div>
    </div>
  </div>

  <script>
    const saldoSalvo = localStorage.getItem("saldo") || "1250.00";
    const saldoReal = parseFloat(saldoSalvo).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
    
    let saldoVisivel = true;
    const txt = document.getElementById('saldo-txt');
    txt.innerText = saldoReal;

    function toggleSaldo() {
      saldoVisivel = !saldoVisivel;
      txt.innerText = saldoVisivel ? saldoReal : "••••••••";
      document.getElementById('eye-icon').style.opacity = saldoVisivel ? "1" : "0.4";
    }
  </script>
</body>
</html>
