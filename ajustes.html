<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary:#22c55e;
    --border:rgba(255,255,255,0.1);
}

body {
    margin:0;
    font-family:'Inter',sans-serif;
    background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
    color:#fff;
    padding:20px;
}

.back {
    margin-bottom:20px;
    display:block;
    color:#fff;
    text-decoration:none;
}

.section { margin-bottom:25px; }

.title {
    font-size:12px;
    color:#888;
    margin-bottom:10px;
}

/* ITEM */
.item {
    background:#111827;
    border-radius:15px;
    padding:15px;
    margin-bottom:10px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    border:1px solid var(--border);
}

.item:active {
    transform:scale(0.97);
    background:rgba(255,255,255,0.05);
}

.input {
    background:none;
    border:none;
    color:#fff;
    text-align:right;
}

/* SWITCH */
.switch {
    width:40px;
    height:22px;
    background:#333;
    border-radius:20px;
    position:relative;
    cursor:pointer;
}

.switch::after {
    content:"";
    width:18px;
    height:18px;
    background:#fff;
    position:absolute;
    top:2px;
    left:2px;
    border-radius:50%;
    transition:0.3s;
}

.switch.active {
    background:var(--primary);
}

.switch.active::after {
    left:20px;
}
</style>
</head>

<body>

<a href="perfil.html" class="back">← Voltar</a>

<h2>Ajustes</h2>

<!-- CONTA -->
<div class="section">
<div class="title">Conta</div>

<div class="item">
<span>Nome</span>
<input class="input" id="nome">
</div>

<div class="item">
<span>Email</span>
<input class="input" id="email">
</div>
</div>

<!-- PAGAMENTOS -->
<div class="section">
<div class="title">Pagamentos</div>

<div class="item">
<span>Notificações</span>
<div class="switch" onclick="toggle(this,'notif')"></div>
</div>

<div class="item">
<span>Som</span>
<div class="switch" onclick="toggle(this,'som')"></div>
</div>
</div>

<!-- APARÊNCIA -->
<div class="section">
<div class="title">Aparência</div>

<div class="item">
<span>Cor do App</span>
<input type="color" id="cor">
</div>
</div>

<!-- SEGURANÇA -->
<div class="section">
<div class="title">Segurança</div>

<div class="item">
<span>Bloqueio</span>
<div class="switch" onclick="toggle(this,'lock')"></div>
</div>
</div>

<script>
function toggle(el,key){
    el.classList.toggle("active");
    localStorage.setItem(key, el.classList.contains("active"));
}

function carregar(){
    document.getElementById("nome").value = localStorage.getItem("nome") || "";
    document.getElementById("email").value = localStorage.getItem("email") || "";

    ["notif","som","lock"].forEach(k=>{
        if(localStorage.getItem(k) === "true"){
            document.querySelector(`[onclick="toggle(this,'${k}')"]`).classList.add("active");
        }
    });

    const cor = localStorage.getItem("cor") || "#22c55e";
    document.getElementById("cor").value = cor;
    document.documentElement.style.setProperty('--primary', cor);
}

document.getElementById("nome").oninput = e=>{
    localStorage.setItem("nome", e.target.value);
};

document.getElementById("email").oninput = e=>{
    localStorage.setItem("email", e.target.value);
};

document.getElementById("cor").oninput = e=>{
    const cor = e.target.value;
    localStorage.setItem("cor", cor);
    document.documentElement.style.setProperty('--primary', cor);
};

carregar();
</script>

</body>
</html>
