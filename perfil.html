<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentry - Perfil</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { 
            --primary: #22c55e; 
            --bg-card: rgba(255, 255, 255, 0.05); 
            --border: rgba(255, 255, 255, 0.08); 
            --text-sec: #94a3b8;
            --danger: #ef4444;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            margin: 0; font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            color: #fff; min-height: 100vh;
        }
        .container { padding: 25px; max-width: 450px; margin: auto; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .back-nav {
            display: inline-flex; align-items: center; justify-content: center;
            width: 45px; height: 45px; background: var(--bg-card);
            border-radius: 50%; color: #fff; text-decoration: none;
            margin-bottom: 20px; border: 1px solid var(--border);
        }

        .profile-header { text-align: center; margin-bottom: 35px; }
        .avatar-wrapper { position: relative; width: 110px; height: 110px; margin: 0 auto 15px; }
        .avatar {
            width: 100%; height: 100%; border-radius: 50%;
            background: #1e293b; border: 3px solid var(--primary);
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; box-shadow: 0 0 30px rgba(34, 197, 94, 0.2);
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .profile-header h2 { font-size: 24px; font-weight: 800; margin: 0; letter-spacing: -1px; }

        .menu-group { display: flex; flex-direction: column; gap: 12px; }
        .menu-item {
            background: var(--bg-card); backdrop-filter: blur(15px);
            border-radius: 20px; border: 1px solid var(--border);
            padding: 18px; display: flex; align-items: center; gap: 15px;
            text-decoration: none; color: #fff; transition: 0.2s;
        }
        .menu-item:active { transform: scale(0.97); background: rgba(255, 255, 255, 0.08); }
        .icon-box {
            width: 42px; height: 42px; background: rgba(255, 255, 255, 0.03);
            border-radius: 12px; display: flex; align-items: center; justify-content: center;
            color: var(--text-sec);
        }
        .item-info { flex: 1; }
        .item-info b { display: block; font-size: 15px; }
        .item-info span { font-size: 12px; color: var(--text-sec); }
    </style>
</head>
<body>

<div class="container">
    <a href="home.html" class="back-nav"><i data-lucide="chevron-left"></i></a>

    <div class="profile-header">
        <div class="avatar-wrapper">
            <div class="avatar" id="avatar-image"><i data-lucide="user" size="40"></i></div>
        </div>
        <h2 id="nomeUser">Carregando...</h2>
    </div>

    <div class="menu-group">
        <a href="meus-dados.html" class="menu-item">
            <div class="icon-box"><i data-lucide="user-cog"></i></div>
            <div class="item-info"><b>Meus Dados</b><span>CPF, e-mail e telefone</span></div>
            <i data-lucide="chevron-right" size="18" style="opacity:0.3"></i>
        </a>

        <a href="configuracoes.html" class="menu-item">
            <div class="icon-box"><i data-lucide="settings"></i></div>
            <div class="item-info"><b>Configurações</b><span>Segurança e notificações</span></div>
            <i data-lucide="chevron-right" size="18" style="opacity:0.3"></i>
        </a>

        <a href="ajuda.html" class="menu-item">
            <div class="icon-box"><i data-lucide="help-circle"></i></div>
            <div class="item-info"><b>Ajuda</b><span>Suporte e dúvidas</span></div>
            <i data-lucide="chevron-right" size="18" style="opacity:0.3"></i>
        </a>

        <div class="menu-item" onclick="confirmarSair()" style="margin-top: 10px; border-color: rgba(239, 68, 68, 0.2);">
            <div class="icon-box" style="color: var(--danger);"><i data-lucide="log-out"></i></div>
            <div class="item-info"><b style="color: var(--danger);">Sair da conta</b></div>
        </div>
    </div>
</div>
    <script type="module">
    // Importando o padrão Zentry para acabar com a bagunça
    import { auth, ZentryAuth, ZentryUser } from './zentry-core.js';

    // Inicializa os ícones do Lucide
    lucide.createIcons();

    async function initPerfil() {
        try {
            // 1. Valida se o usuário está logado usando o Core
            const user = await ZentryAuth.exigirLogin();

            // 2. Escuta os dados do usuário em tempo real
            ZentryUser.escutar(user.uid, (dados) => {
                if (dados) {
                    // Atualiza o nome na tela
                    document.getElementById("nomeUser").innerText = dados.nome || "Usuário Zentry";
                    
                    // Se você tiver um campo 'foto' no Firestore, pode carregar aqui:
                    if (dados.foto) {
                        document.getElementById("avatar-image").innerHTML = `<img src="${dados.foto}" alt="Avatar">`;
                    } else {
                        // Caso contrário, gera uma inicial ou mantém o ícone
                        const inicial = dados.nome ? dados.nome.charAt(0).toUpperCase() : "";
                        document.getElementById("avatar-image").innerHTML = `<span style="font-size: 40px; font-weight: 800; color: var(--primary)">${inicial}</span>`;
                    }
                }
            });
        } catch (error) {
            console.error("Erro ao carregar perfil:", error);
        }
    }

    // Função de Sair (Logout)
    window.confirmarSair = async () => {
        // Um simples confirm do navegador para evitar cliques acidentais
        if (confirm("Deseja realmente sair da sua conta?")) {
            try {
                await auth.signOut();
                localStorage.clear(); // Limpa dados temporários
                window.location.replace("login.html");
            } catch (error) {
                alert("Erro ao sair. Tente novamente.");
            }
        }
    };

    // Rodar a inicialização
    initPerfil();
    </script>
    

</body>
</html>
