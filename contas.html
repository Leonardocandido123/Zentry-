<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Tech Pay - Minhas Contas</title>
  <style>
    :root { 
        --primary: #22c55e; 
        --bg-card: #111827;
        --border: rgba(255, 255, 255, 0.15); 
        --text-secondary: #9CA3AF; 
    }
    
    body {
  margin:0;
  font-family:'Inter',sans-serif;
  background: linear-gradient(180deg, #000000 0%, #020617 40%, #000000 100%);
  color: #fff;
  padding: 20px;
  padding-bottom: 100px;
    }
    
    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
    .back-btn { background: var(--bg-card); border: 1px solid var(--border); color: #fff; border-radius: 12px; padding: 10px; cursor: pointer; display: flex; }

    .add-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 30px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .input-group input { 
        width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
        border-radius: 12px; padding: 12px; color: #fff; font-size: 14px; box-sizing: border-box;
    }
    .btn-add { width: 100%; background: #fff; color: #000; border: none; border-radius: 12px; padding: 14px; font-weight: 700; cursor: pointer; }

    .lista-contas { display: flex; flex-direction: column; gap: 12px; }
    .conta-item { background: var(--bg-card); border: 1px solid var(--border); padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--primary); }
    .vencida { border-left-color: #ef4444; }
    
    .btn-pay { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: 600; cursor: pointer; }
    .btn-pay.pago { background: var(--primary); color: #000; border: none; opacity: 0.5; }

    /* MODAL DE PAGAMENTO */
    .modal-overlay { position: fixed; top:0; left:0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; z-index: 1000; }
    .modal-content { background: #111827; width: 100%; padding: 30px 20px 40px; border-radius: 30px 30px 0 0; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

    .pay-option { background: rgba(255,255,255,0.05); border: 1px solid var(--border); border-radius: 15px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; gap: 15px; cursor: pointer; }
    .pay-option:active { background: var(--primary); color: #000; }
    .pay-option b { font-size: 14px; }
    .hoje {
  border-left-color: #f59e0b;
}

.vencida {
  border-left-color: #ef4444;
}
  </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='home.html'"><svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button>
    <h2 style="margin:0; font-size: 18px;">Minhas Contas</h2>
</div>

<div class="add-card">
    <div class="input-group"><label>Descrição</label><input type="text" id="desc-conta" placeholder="Ex: Internet"></div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group"><label>Valor</label><input type="text" id="valor-conta" placeholder="R$ 0,00" oninput="mascaraMoeda(this)"></div>
        <div class="input-group"><label>Vencimento</label><input type="date" id="data-conta"></div>
    </div>
    <button class="btn-add" onclick="salvarConta()">Adicionar Conta</button>
</div>

<div id="lista-contas" class="lista-contas"></div>

<div class="modal-overlay" id="modalPay">
    <div class="modal-content">
        <h3 style="margin-top:0;">Como deseja pagar?</h3>
        <p id="info-pagamento" style="color: var(--text-secondary); font-size: 13px; margin-bottom: 20px;"></p>
        
        <div class="pay-option" onclick="confirmarPagamento('Pix (Saldo)')">
            <div style="font-size: 20px;">⚡</div>
            <div><b>Pix / Saldo Tech Pay</b><br><small>Desconta do seu saldo na hora</small></div>
        </div>

        <div class="pay-option" onclick="confirmarPagamento('Cartão de Crédito')">
            <div style="font-size: 20px;">💳</div>
            <div><b>Cartão de Crédito</b><br><small>Pagar usando cartão cadastrado</small></div>
        </div>

        <button class="btn-add" style="background: transparent; color: #ef4444; margin-top: 10px;" onclick="fecharModal()">Cancelar</button>
    </div>
</div>
  <script>
let contaSendoPaga = null;

// ================= SALVAR =================
function salvarConta() {
    const desc = document.getElementById('desc-conta').value;
    const valor = document.getElementById('valor-conta').value;
    const data = document.getElementById('data-conta').value;

    if(!desc || valor === "R$ 0,00" || !data) return alert("Preencha tudo!");

    let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");

    contas.push({
        id: Date.now(),
        descricao: desc,
        valor: valor,
        data: data,
        pago: false
    });

    localStorage.setItem("minhasContas", JSON.stringify(contas));
    renderizarContas();
}

// ================= LISTAR =================
function renderizarContas() {
    const container = document.getElementById('lista-contas');
    let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");

    const hoje = new Date().toISOString().split('T')[0];

    contas = contas.sort((a,b)=> new Date(a.data) - new Date(b.data));

    container.innerHTML = contas.map(c => {

        let classe = "";
        if (!c.pago && c.data < hoje) classe = "vencida";
        else if (!c.pago && c.data === hoje) classe = "hoje";

        return `
        <div class="conta-item ${classe}">
            <div>
                <b>${c.descricao}</b>
                <span>Vence ${c.data.split('-').reverse().join('/')} • ${c.valor}</span>
            </div>
            <button class="btn-pay ${c.pago ? 'pago' : ''}" onclick="abrirPagamento(${c.id})">
                ${c.pago ? 'Pago ✓' : 'Pagar'}
            </button>
        </div>
        `;
    }).join('');
}

// ================= PAGAMENTO =================
function abrirPagamento(id) {
    let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");

    contaSendoPaga = contas.find(c => c.id === id);
    if(contaSendoPaga.pago) return;

    document.getElementById('info-pagamento').innerText =
        `Pagando ${contaSendoPaga.descricao} - ${contaSendoPaga.valor}`;

    document.getElementById('modalPay').style.display = 'flex';
}

function fecharModal() {
    document.getElementById('modalPay').style.display = 'none';
}

// ================= CONFIRMAR =================
function confirmarPagamento() {
    let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");

    contas = contas.map(c => {
        if(c.id === contaSendoPaga.id) c.pago = true;
        return c;
    });

    localStorage.setItem("minhasContas", JSON.stringify(contas));

    // 🔥 ATUALIZA SALDO
    let saldo = parseFloat(localStorage.getItem("saldo") || "0");

    let valor = parseFloat(
        contaSendoPaga.valor.replace("R$ ", "").replace(/\./g, "").replace(",", ".")
    );

    saldo -= valor;
    localStorage.setItem("saldo", saldo);

    // 🔥 SALVA NO HISTÓRICO
    let transacoes = JSON.parse(localStorage.getItem("transacoes") || "[]");

    transacoes.unshift({
        id: Date.now(),
        tipo: "saida",
        valor: contaSendoPaga.valor,
        descricao: contaSendoPaga.descricao,
        data: new Date().toLocaleString()
    });

    localStorage.setItem("transacoes", JSON.stringify(transacoes));

    alert("Pagamento realizado ✅");

    fecharModal();
    renderizarContas();
}

window.onload = renderizarContas;
  </script>



</body>
</html>
