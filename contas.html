<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>Tech Pay - Minhas Contas</title>
  <style>
    :root { 
        --primary: #22c55e; 
        --bg-card: #111827;
        --border: rgba(255, 255, 255, 0.15); 
        --text-secondary: #9CA3AF; 
        --danger: #ef4444;
        --warning: #f59e0b;
    }
    
    body { margin:0; font-family:'Inter',sans-serif; background: #000; color: #fff; padding: 20px; padding-bottom: 100px; }
    
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; }
    .back-btn { background: var(--bg-card); border: 1px solid var(--border); color: #fff; border-radius: 12px; padding: 10px; cursor: pointer; display: flex; }

    /* CARD DE CADASTRO */
    .add-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 24px; padding: 20px; margin-bottom: 30px; }
    .input-group { margin-bottom: 15px; }
    .input-group label { display: block; font-size: 11px; color: var(--text-secondary); margin-bottom: 5px; }
    .input-group input { 
        width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--border); 
        border-radius: 12px; padding: 12px; color: #fff; font-size: 14px; box-sizing: border-box;
    }
    .btn-add { 
        width: 100%; background: #fff; color: #000; border: none; 
        border-radius: 12px; padding: 14px; font-weight: 700; cursor: pointer;
    }

    /* LISTA DE CONTAS */
    .lista-contas { display: flex; flex-direction: column; gap: 12px; }
    .conta-item { 
        background: var(--bg-card); border: 1px solid var(--border); 
        padding: 16px; border-radius: 20px; display: flex; justify-content: space-between; align-items: center;
        transition: 0.3s;
    }
    .info b { display: block; font-size: 15px; margin-bottom: 4px; }
    .info span { font-size: 12px; color: var(--text-secondary); }
    
    .status-vencido { border-left: 4px solid var(--danger); }
    .status-hoje { border-left: 4px solid var(--warning); }
    .status-ok { border-left: 4px solid var(--primary); }

    .btn-pay { background: rgba(255,255,255,0.1); border: 1px solid var(--border); color: #fff; padding: 8px 12px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
    .btn-pay.pago { background: var(--primary); color: #000; border: none; }

  </style>
</head>
<body>

<div class="header">
    <button class="back-btn" onclick="location.href='home.html'">
        <svg width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2 style="margin:0; font-size: 18px;">Minhas Contas</h2>
    <div style="width: 40px;"></div>
</div>

<div class="add-card">
    <div style="margin-bottom: 15px; font-weight: 700; font-size: 14px;">Nova Conta</div>
    <div class="input-group">
        <label>Descrição</label>
        <input type="text" id="desc-conta" placeholder="Ex: Aluguel, Luz, Internet">
    </div>
    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px;">
        <div class="input-group">
            <label>Valor</label>
            <input type="text" id="valor-conta" placeholder="R$ 0,00" oninput="mascaraMoeda(this)">
        </div>
        <div class="input-group">
            <label>Vencimento</label>
            <input type="date" id="data-conta">
        </div>
    </div>
    <button class="btn-add" onclick="salvarConta()">Adicionar Conta</button>
</div>

<div id="lista-contas" class="lista-contas">
    </div>

<script>
function mascaraMoeda(i) {
    let v = i.value.replace(/\D/g,'');
    v = (v/100).toFixed(2) + '';
    v = v.replace(".", ",");
    v = v.replace(/(\d)(\d{3})(\d{3}),/g, "$1.$2.$3,");
    v = v.replace(/(\d)(\d{3}),/g, "$1.$2,");
    i.value = "R$ " + v;
}

function salvarConta() {
    const desc = document.getElementById('desc-conta').value;
    const valor = document.getElementById('valor-conta').value;
    const data = document.getElementById('data-conta').value;

    if(!desc || valor === "R$ 0,00" || !data) {
        alert("Preencha todos os campos!");
        return;
    }

    const novaConta = {
        id: Date.now(),
        descricao: desc,
        valor: valor,
        data: data,
        pago: false
    };

    let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");
    contas.push(novaConta);
    localStorage.setItem("minhasContas", JSON.stringify(contas));

    // Limpar campos
    document.getElementById('desc-conta').value = "";
    document.getElementById('valor-conta').value = "R$ 0,00";
    document.getElementById('data-conta').value = "";

    renderizarContas();
}

function renderizarContas() {
    const container = document.getElementById('lista-contas');
    const contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");
    const hoje = new Date().toISOString().split('T')[0];

    if(contas.length === 0) {
        container.innerHTML = '<p style="text-align:center; color:gray; font-size:12px;">Nenhuma conta cadastrada.</p>';
        return;
    }

    // Ordenar por data
    contas.sort((a, b) => new Date(a.data) - new Date(b.data));

    container.innerHTML = contas.map(c => {
        let statusClass = "status-ok";
        if (!c.pago) {
            if (c.data < hoje) statusClass = "status-vencido";
            else if (c.data === hoje) statusClass = "status-hoje";
        }

        return `
            <div class="conta-item ${statusClass}">
                <div class="info">
                    <b>${c.descricao}</b>
                    <span>Vence em: ${c.data.split('-').reverse().join('/')} • ${c.valor}</span>
                </div>
                <button class="btn-pay ${c.pago ? 'pago' : ''}" onclick="marcarPago(${c.id})">
                    ${c.pago ? 'Pago ✓' : 'Pagar'}
                </button>
            </div>
        `;
    }).join('');
}

function marcarPago(id) {
    let contas = JSON.parse(localStorage.getItem("minhasContas") || "[]");
    contas = contas.map(c => {
        if(c.id === id) c.pago = !c.pago;
        return c;
    });
    localStorage.setItem("minhasContas", JSON.stringify(contas));
    renderizarContas();
}

window.onload = renderizarContas;
</script>

</body>
</html>
