<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ZENTRY - Minhas Chaves</title>
  <style>
    :root { --bg: #000; --card: #121826; --border: #2A3441; --accent: #22C55E; --text-sec: #9CA3AF; --danger: #EF4444; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; padding: 20px; overflow-x: hidden; }

    .header { display: flex; align-items: center; gap: 15px; margin-bottom: 35px; }
    .back-btn { width: 40px; height: 40px; border-radius: 50%; background: var(--card); display: flex; align-items: center; justify-content: center; border: 1px solid var(--border); cursor: pointer; }
    .back-btn svg { stroke: var(--accent); width: 20px; fill: none; stroke-width: 3; }

    .key-card { background: var(--card); border: 1px solid var(--border); border-radius: 20px; padding: 20px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; animation: fadeIn 0.3s ease; }
    .key-info b { display: block; font-size: 11px; text-transform: uppercase; color: var(--text-sec); margin-bottom: 5px; }
    .key-info span { font-size: 16px; font-weight: 600; color: #fff; }
    
    .btn-delete { background: rgba(239, 68, 68, 0.1); border: none; padding: 10px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
    .btn-delete:active { transform: scale(0.9); background: rgba(239, 68, 68, 0.2); }
    .btn-delete svg { stroke: var(--danger); width: 20px; height: 20px; }

    .btn-add { width: 100%; padding: 18px; border-radius: 16px; border: 1px dashed var(--accent); background: rgba(34, 197, 94, 0.05); color: var(--accent); font-weight: 600; cursor: pointer; margin-top: 20px; font-size: 16px; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 100; align-items: flex-end; backdrop-filter: blur(4px); }
    .modal-content { width: 100%; background: var(--card); border-top: 2px solid var(--accent); border-radius: 30px 30px 0 0; padding: 30px; animation: slideUp 0.3s ease-out; }
    
    .input-premium { width: 100%; padding: 16px; background: #000; border: 1px solid var(--border); border-radius: 14px; color: white; margin-bottom: 20px; font-size: 16px; outline: none; }
    .input-premium:focus { border-color: var(--accent); }
    .btn-confirm { width: 100%; padding: 18px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-weight: 700; font-size: 16px; }

    #zModalGlobal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px); }
    .z-content { background:#121826; border:1px solid #2A3441; border-radius:28px; width:100%; max-width:340px; padding:25px; text-align:center; }

    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
  </style>
</head>
<body>

  <div id="zModalGlobal">
    <div class="z-content">
      <div id="zIcon" style="font-size:40px; margin-bottom:15px;">⚠️</div>
      <h3 id="zTitle" style="margin:0; font-size:18px;">Aviso</h3>
      <p id="zText" style="color:#9CA3AF; font-size:14px; margin: 10px 0 20px;"></p>
      <button id="zBtnClose" style="width:100%; padding:15px; border-radius:14px; background:#22C55E; border:none; color:#000; font-weight:700;">Entendido</button>
    </div>
  </div>

  <div class="header">
    <div class="back-btn" onclick="location.href='pix.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M15 18l-6-6 6-6"/></svg>
    </div>
    <b style="font-size: 18px;">Minhas chaves</b>
  </div>

  <div id="lista-chaves">
    </div>

  <button class="btn-add" id="btnAbrirModal">+ Cadastrar nova chave</button>

  <div class="modal-overlay" id="modalCadastro">
    <div class="modal-content">
      <h3 style="margin: 0 0 10px 0;">Nova Chave Pix</h3>
      <p style="color: var(--text-sec); font-size: 13px; margin-bottom: 20px;">Escolha o tipo e digite sua chave abaixo.</p>
      
      <select class="input-premium" id="tipoChave">
        <option value="cpf">CPF</option>
        <option value="cel">Celular</option>
        <option value="email">E-mail</option>
      </select>
      
      <input type="text" class="input-premium" id="valorChave" placeholder="Digite a chave...">
      
      <button class="btn-confirm" id="btnSalvar">Confirmar Cadastro</button>
      <button style="width:100%; background:none; border:none; color:#9CA3AF; margin-top:15px; font-weight: 500;" id="btnFecharModal">Cancelar</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
      authDomain: "zentry-app-74275.firebaseapp.com",
      projectId: "zentry-app-74275",
      storageBucket: "zentry-app-74275.appspot.com",
      messagingSenderId: "571422826071",
      appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    function showZModal(titulo, texto, icon) {
        document.getElementById('zModalGlobal').style.display = 'flex';
        document.getElementById('zTitle').innerText = titulo;
        document.getElementById('zText').innerText = texto;
        document.getElementById('zIcon').innerText = icon;
    }
    document.getElementById('zBtnClose').onclick = () => document.getElementById('zModalGlobal').style.display = 'none';

    // Monitora a chave do usuário
    onAuthStateChanged(auth, (user) => {
      if (user) {
        onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
          const container = document.getElementById('lista-chaves');
          const btnAdd = document.getElementById('btnAbrirModal');
          
          if (docSnap.exists()) {
            const data = docSnap.data();
            const chave = data.chavepix; // Usando 'chavepix' minúsculo para padrão

            if (chave && chave !== "") {
              container.innerHTML = `
                <div class="key-card">
                  <div class="key-info">
                    <b>Chave Pix Ativa</b>
                    <span>${chave}</span>
                  </div>
                  <button class="btn-delete" id="btnExcluirChave">
                    <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                  </button>
                </div>`;
              btnAdd.style.display = "none"; // Esconde botão de adicionar se já tem chave

              // Lógica de Deletar
              document.getElementById('btnExcluirChave').onclick = async () => {
                if(confirm("Deseja realmente excluir sua chave Pix?")) {
                  try {
                    await updateDoc(doc(db, "usuarios", user.uid), { chavepix: "" });
                    showZModal("Sucesso", "Chave excluída!", "🗑️");
                  } catch(e) { showZModal("Erro", "Falha ao excluir.", "❌"); }
                }
              };
            } else {
              container.innerHTML = `<p style="text-align:center; color:var(--text-sec); font-size:14px; margin:40px 0;">Você ainda não possui chaves cadastradas.</p>`;
              btnAdd.style.display = "block";
            }
          }
        });
      }
    });

    // Modal
    document.getElementById('btnAbrirModal').onclick = () => document.getElementById('modalCadastro').style.display = 'flex';
    document.getElementById('btnFecharModal').onclick = () => document.getElementById('modalCadastro').style.display = 'none';

    // Salvar nova chave
    document.getElementById('btnSalvar').onclick = async () => {
        const inputVal = document.getElementById('valorChave').value;
        const tipo = document.getElementById('tipoChave').value;
        
        if(!inputVal) { showZModal("Atenção", "Informe o valor da chave.", "⚠️"); return; }
        
        // Se for CPF ou Celular, salva apenas os números no banco
        let valorFinal = inputVal;
        if(tipo === 'cpf' || tipo === 'cel') {
            valorFinal = inputVal.replace(/\D/g, "");
        }

        try {
            // SALVA COMO 'chavepix' (Tudo minúsculo para bater com a tela de transferência)
            await updateDoc(doc(db, "usuarios", auth.currentUser.uid), { 
                chavepix: valorFinal 
            });
            showZModal("Sucesso", "Chave Pix ativa!", "✅");
            document.getElementById('modalCadastro').style.display = 'none';
            document.getElementById('valorChave').value = "";
        } catch(e) { 
            showZModal("Erro", "Erro ao salvar no banco.", "❌"); 
        }
    };
  </script>
</body>
</html>
