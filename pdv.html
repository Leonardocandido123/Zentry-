<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENTRY - PDV Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e; /* Verde Zentry */
            --bg-dark: #000;
            --bg-card: #111827;
            --border: rgba(255, 255, 255, 0.1);
            --text-secondary: #9CA3AF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        /* Simulação da tela da maquininha dentro do navegador */
        .screen {
            width: 100%;
            max-width: 400px;
            background-color: transparent;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Status Bar */
        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            font-size: 12px;
            color: var(--text-secondary);
            letter-spacing: 1px;
        }

        /* Cabeçalho igual à foto */
        .header {
            text-align: center;
            padding: 30px 20px;
        }

        .brand-name {
            color: var(--primary);
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .cnpj-info {
            font-size: 12px;
            color: var(--text-secondary);
            margin-bottom: 5px;
        }

        .owner-name {
            font-size: 13px;
            color: #fff;
            opacity: 0.9;
            font-weight: 500;
            padding: 0 40px;
            text-transform: uppercase;
        }

        /* Grid de Botões Principais */
        .main-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .btn-large {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 14px;
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-large:active { transform: scale(0.95); background: #1f2937; }

        /* Seção Destaques */
        .highlights-section {
            padding: 10px 20px;
            flex-grow: 1;
        }

        .highlights-title {
            color: var(--primary);
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 15px;
        }

        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        .highlight-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .icon-box {
            font-size: 24px;
            margin-bottom: 8px;
            color: #fff;
        }

        /* Barra de Navegação Android */
        .nav-bar {
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-back { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-right: 12px solid #555; }
        .nav-circle { width: 16px; height: 16px; border: 2px solid #555; border-radius: 50%; }
        .nav-square { width: 14px; height: 14px; border: 2px solid #555; border-radius: 2px; }

    </style>
</head>
<body>

    <div class="screen">
        <div class="status-bar">
            <span>4G 📶 🔋 10:19</span>
        </div>

        <div class="header">
            <div class="brand-name" id="display-empresa">ZENTRY PDV</div>
            <div class="cnpj-info" id="display-cnpj">CNPJ: 00.000.000/0001-00</div>
            <div class="owner-name" id="display-dono">CARREGANDO DADOS...</div>
        </div>

        <div class="main-actions">
            <button class="btn-large" onclick="location.href='home.html'">🏠 Início</button>
            <button class="btn-large" onclick="processarCobranca()" style="border-color: var(--primary);">💳 Pagamento</button>
        </div>

        <div class="highlights-section">
            <div class="highlights-title">Destaques</div>
            <div class="highlights-grid">
                <div class="highlight-card" onclick="alert('Relatórios em breve')">
                    <span class="icon-box">📋</span>
                    Relatórios
                </div>
                <div class="highlight-card" onclick="processarCobranca()">
                    <span class="icon-box">💳</span>
                    Pagamento
                </div>
                <div class="highlight-card">
                    <span class="icon-box">➕</span>
                    Personalizar
                </div>
            </div>
        </div>

        <div class="nav-bar" onclick="location.href='home.html'">
            <div class="nav-back"></div>
            <div class="nav-circle"></div>
            <div class="nav-square"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './zentry-core.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const uid = localStorage.getItem("uid");

        // 1. Busca dados do dono para preencher a tela igual à foto
        async function carregarDadosPDV() {
            if (!uid) return;
            const docRef = doc(db, "usuarios", uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                document.getElementById('display-dono').innerText = `${uid.substring(0,8)} ${data.nome}`.toUpperCase();
                // Se você tiver CNPJ no banco, pode trocar aqui:
                // document.getElementById('display-cnpj').innerText = data.cnpj;
            }
        }

        // 2. Função de Cobrança (Aumenta o saldo na Home)
        window.processarCobranca = async () => {
            const valor = prompt("Digite o valor da venda:", "10.00");
            
            if (valor && !isNaN(valor)) {
                const valorNumerico = parseFloat(valor);
                
                try {
                    const userRef = doc(db, "usuarios", uid);
                    
                    // Adiciona o valor ao saldo atual no Firebase
                    await updateDoc(userRef, {
                        saldo: increment(valorNumerico)
                    });

                    alert(`Venda de R$ ${valorNumerico.toFixed(2)} aprovada!`);
                    window.location.href = 'home.html'; // Volta para a home com saldo atualizado
                    
                } catch (e) {
                    alert("Erro ao processar venda.");
                    console.error(e);
                }
            }
        };

        carregarDadosPDV();
    </script>
</body>
</html>
