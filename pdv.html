<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentap Pro - PDV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg: #F6F7F9;
            --card: #FFFFFF;
            --text-main: #1A1D23;
            --text-sec: #717680;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; }

        /* CONTROLE DE TELAS */
        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* CABEÇALHO PADRÃO TELAS SECUNDÁRIAS */
        .sub-header { padding: 20px; display: flex; align-items: center; gap: 20px; background: #fff; border-bottom: 1px solid var(--border); }
        .back-btn { color: var(--primary); font-size: 24px; cursor: pointer; border: none; background: none; font-weight: bold; }
        .sub-title { font-size: 18px; font-weight: 700; }

        /* TELA 1: DASHBOARD */
        .header-main { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
        .dashboard-card { background: var(--card); margin: 0 20px 25px; padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-bottom: 30px; }
        .grid-btn { background: var(--card); border: 1px solid var(--border); height: 120px; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; cursor: pointer; }
        .grid-btn span { font-weight: 700; font-size: 14px; }

        /* TELA 2: TECLADO (VENDA RÁPIDA) */
        .display-valor { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 56px; font-weight: 800; color: var(--text-main); }
        .teclado-container { background: #fff; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; border-top: 1px solid var(--border); }
        .key { height: 70px; display: flex; align-items: center; justify-content: center; font-size: 24px; font-weight: 600; cursor: pointer; border-radius: 12px; transition: 0.1s; }
        .key:active { background: #f0f0f0; }
        .btn-confirm { 
            grid-column: span 3; height: 65px; background: var(--primary); color: #000; 
            border-radius: 16px; display: flex; align-items: center; justify-content: center; 
            font-size: 28px; margin-top: 5px; opacity: 0.3; pointer-events: none; transition: 0.3s;
        }
        .btn-confirm.active { opacity: 1; pointer-events: all; }

        /* TELA 3: MODALIDADES */
        .valor-resumo { padding: 40px 20px; text-align: center; font-size: 36px; font-weight: 800; }
        .list-modalidades { padding: 0 20px; }
        .item-modalidade { 
            background: #fff; padding: 20px; border-radius: 18px; margin-bottom: 12px; 
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
            font-weight: 700; cursor: pointer;
        }
        .item-modalidade .icon-box { display: flex; align-items: center; gap: 15px; }
        .item-modalidade .arrow { color: var(--primary); font-weight: bold; }

        /* COMPLEMENTOS */
        .quick-actions { padding: 0 20px; }
        .actions-row { display: flex; justify-content: space-between; gap: 10px; }
        .action-item { display: flex; flex-direction: column; align-items: center; gap: 8px; flex: 1; }
        .action-circle { width: 55px; height: 55px; background: var(--card); border: 1px solid var(--border); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    </style>
</head>
<body>

    <div id="screen-dash" class="screen active">
        <header class="header-main">
            <div class="user-info" style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar" id="userInitial">L</div>
                <div class="user-name" style="font-weight: 600;">Olá, <span id="userName">Leonardo</span></div>
            </div>
            <div class="notif">🔔</div>
        </header>

        <div class="dashboard-card">
            <div style="color: var(--text-sec); font-size: 13px; margin-bottom: 5px;">Vendas de hoje</div>
            <div style="font-size: 28px; font-weight: 800; display: flex; justify-content: space-between; align-items: center;">
                R$ 1.250,00
                <span style="color: var(--primary); font-size: 12px;">VER MAIS</span>
            </div>
        </div>

        <div class="grid-menu">
            <div class="grid-btn"><span>📊 Extrato</span></div>
            <div class="grid-btn" onclick="nav('screen-teclado')" style="border-color: var(--primary);"><span>💸 Venda Rápida</span></div>
        </div>

        <div class="quick-actions">
            <div style="font-size: 14px; font-weight: 600; color: var(--text-sec); margin-bottom: 15px;">Serviços</div>
            <div class="actions-row">
                <div class="action-item"><div class="action-circle">🔗</div><span style="font-size:11px">Link</span></div>
                <div class="action-item"><div class="action-circle">📄</div><span style="font-size:11px">Boleto</span></div>
                <div class="action-item"><div class="action-circle">👤</div><span style="font-size:11px">Cliente</span></div>
                <div class="action-item"><div class="action-circle">⚙️</div><span style="font-size:11px">Ajustes</span></div>
            </div>
        </div>
    </div>

    <div id="screen-teclado" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-dash')">←</button>
            <span class="sub-title">Valor</span>
        </div>
        <div class="display-valor" id="display">R$ 0,00</div>
        <div class="teclado-container">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" onclick="press('00')">00</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="limpar()">⌫</div>
            <div class="btn-confirm" id="btnProximo" onclick="confirmarValor()">➜</div>
        </div>
    </div>

    <div id="screen-modal" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-teclado')">←</button>
            <span class="sub-title">Modalidade</span>
        </div>
        <div class="valor-resumo" id="valorFinal">R$ 0,00</div>
        <div class="list-modalidades">
            <div class="item-modalidade" onclick="alert('Iniciando Pix...')">
                <div class="icon-box">⚡ <span>Pix Zentry</span></div>
                <span class="arrow">→</span>
            </div>
            <div class="item-modalidade">
                <div class="icon-box">💳 <span>Cartão de Crédito</span></div>
                <span class="arrow">→</span>
            </div>
            <div class="item-modalidade">
                <div class="icon-box">🏦 <span>Transferência</span></div>
                <span class="arrow">→</span>
            </div>
        </div>
    </div>

    <script>
        let valorString = "";

        // NAVEGAÇÃO
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        // LÓGICA DO TECLADO
        function press(n) {
            if (valorString.length >= 8) return;
            valorString += n;
            atualizarDisplay();
        }

        function limpar() {
            valorString = valorString.slice(0, -1);
            atualizarDisplay();
        }

        function atualizarDisplay() {
            let num = parseFloat(valorString || 0) / 100;
            let formatado = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            document.getElementById('display').innerText = formatado;
            
            const btn = document.getElementById('btnProximo');
            if (num > 0) {
                btn.classList.add('active');
            } else {
                btn.classList.remove('active');
            }
        }

        function confirmarValor() {
            let num = parseFloat(valorString || 0) / 100;
            document.getElementById('valorFinal').innerText = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            nav('screen-modal');
        }

        // INIT
        window.onload = () => {
            const name = localStorage.getItem("usuarioNome") || "Leonardo";
            document.getElementById('userName').innerText = name;
            document.getElementById('userInitial').innerText = name.charAt(0).toUpperCase();
        };
    </script>
</body>
</html>
