<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentap Pro PDV</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#22c55e;
--bg:#F6F7F9;
--card:#fff;
--text:#1A1D23;
--sec:#717680;
--border:#E5E7EB;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:Inter;}
body{background:var(--bg);overflow:hidden;height:100vh;}

.screen{display:none;position:absolute;width:100%;height:100%;flex-direction:column;background:var(--bg);}
.screen.active{display:flex;}

.sub-header{
height:55px;
background:#fff;
display:grid;
grid-template-columns:50px 1fr 50px;
align-items:center;
border-bottom:1px solid var(--border);
padding:0 10px;
}

.back-btn{background:none;border:none;font-size:18px;color:var(--primary)}

.title{text-align:center;font-weight:700}

.display{
flex:1;
display:flex;
align-items:center;
justify-content:center;
font-size:48px;
font-weight:800;
}

.bottom{
position:fixed;
bottom:0;
width:100%;
background:#fff;
padding:10px;
border-top:1px solid var(--border);
}

.grid{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:5px;
margin-bottom:10px;
}

.key{
height:50px;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
font-weight:600;
}

.btn{
width:100%;
height:55px;
background:var(--primary);
border:none;
border-radius:12px;
font-weight:700;
opacity:.3;
}

.btn.active{opacity:1;}

.item{
background:#fff;
padding:15px;
margin:10px;
border-radius:12px;
border:1px solid var(--border);
font-weight:600;
}

.success{
text-align:center;
padding:40px;
}

.qr{
width:150px;
height:150px;
background:#ddd;
margin:20px auto;
display:flex;
align-items:center;
justify-content:center;
}
</style>
</head>

<body>

<!-- DASH -->
<div id="dash" class="screen active">
<div class="sub-header">
<div></div>
<div class="title">Dashboard</div>
<div></div>
</div>

<div class="item" onclick="nav('valor')">💰 Receber Pagamento</div>
</div>

<!-- VALOR -->
<div id="valor" class="screen">
<div class="sub-header">
<button class="back-btn" onclick="nav('dash')">←</button>
<div class="title">Valor</div>
<div></div>
</div>

<div class="display" id="display">R$ 0,00</div>

<div class="bottom">
<div class="grid">
<div class="key" onclick="add(1)">1</div>
<div class="key" onclick="add(2)">2</div>
<div class="key" onclick="add(3)">3</div>
<div class="key" onclick="add(4)">4</div>
<div class="key" onclick="add(5)">5</div>
<div class="key" onclick="add(6)">6</div>
<div class="key" onclick="add(7)">7</div>
<div class="key" onclick="add(8)">8</div>
<div class="key" onclick="add(9)">9</div>
</div>

<button class="btn" id="btn" onclick="irMetodo()">PRÓXIMO</button>
</div>
</div>

<!-- METODO -->
<div id="metodo" class="screen">
<div class="sub-header">
<button class="back-btn" onclick="nav('valor')">←</button>
<div class="title">Pagamento</div>
<div></div>
</div>

<div class="item" onclick="pix()">PIX</div>
<div class="item" onclick="debito()">DÉBITO</div>
<div class="item" onclick="credito()">CRÉDITO</div>
</div>

<!-- PIX -->
<div id="pix" class="screen">
<div class="sub-header">
<button class="back-btn" onclick="nav('metodo')">←</button>
<div class="title">PIX</div>
<div></div>
</div>

<div class="display" id="pixVal"></div>

<div class="qr">QR CODE</div>

<div class="item" onclick="processar()">Confirmar pagamento</div>
</div>

<!-- CREDITO -->
<div id="credito" class="screen">
<div class="sub-header">
<button class="back-btn" onclick="nav('metodo')">←</button>
<div class="title">Crédito</div>
<div></div>
</div>

<div class="display" id="credVal"></div>

<div id="parcelas"></div>
</div>

<!-- DEBITO -->
<div id="debito" class="screen">
<div class="sub-header">
<button class="back-btn" onclick="nav('metodo')">←</button>
<div class="title">Débito</div>
<div></div>
</div>

<div class="display" id="debVal"></div>

<div class="item" onclick="processar()">Aproximar cartão</div>
</div>

<!-- PROCESSANDO -->
<div id="process" class="screen">
<div class="success">
<h2>Processando pagamento...</h2>
</div>
</div>

<!-- SUCESSO -->
<div id="ok" class="screen">
<div class="success">
<h2>APROVADO ✔</h2>
<div id="res"></div>

<div class="item" onclick="nav('dash')">Nova venda</div>
<div class="item" onclick="alert('Compartilhar comprovante')">Compartilhar</div>
<div class="item" onclick="nav('recibo')">Ver comprovante</div>
</div>
</div>

<!-- RECIBO -->
<div id="recibo" class="screen">
<div class="sub-header">
<button class="back-btn" onclick="nav('ok')">←</button>
<div class="title">Comprovante</div>
<div></div>
</div>

<div class="item" id="comp"></div>
</div>

<script>
let valor="";

function nav(id){
document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function add(n){
valor+=n;
update();
}

function update(){
let v=parseFloat(valor||0)/100;
document.getElementById('display').innerText=v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
document.getElementById('btn').classList.toggle('active',v>0);
}

function irMetodo(){
nav('metodo');
}

function setVals(){
let v=parseFloat(valor||0)/100;
pixVal.innerText=credVal.innerText=debVal.innerText=v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
}

function pix(){setVals();nav('pix');}
function debito(){setVals();nav('debito');processar();}
function credito(){
setVals();
nav('credito');

let v=parseFloat(valor||0)/100;
let html="";
for(let i=1;i<=12;i++){
html+=`<div class="item" onclick="parcelar(${i})">${i}x de ${(v/i).toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}</div>`;
}
parcelas.innerHTML=html;
}

function parcelar(i){
processar();
}

function processar(){
nav('process');

setTimeout(()=>{
nav('ok');
let v=parseFloat(valor||0)/100;
res.innerText=v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'});
comp.innerHTML=`
Valor: ${v.toLocaleString('pt-BR',{style:'currency',currency:'BRL'})}<br>
Método: pagamento<br>
ID: ZT${Math.floor(Math.random()*999999)}<br>
Status: aprovado
`;
},2000);
}
</script>

</body>
</html>
