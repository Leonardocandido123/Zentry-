<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentap Pro - PDV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg: #F6F7F9;
            --card: #FFFFFF;
            --text-main: #1A1D23;
            --text-sec: #717680;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }

        body { background-color: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); }
        .screen.active { display: flex; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* HEADER CENTRALIZADO */
        .sub-header { 
            padding: 15px 20px; 
            display: grid; 
            grid-template-columns: 40px 1fr 40px; 
            align-items: center; 
            background: #fff; 
            border-bottom: 1px solid var(--border); 
        }
        .back-btn { color: var(--primary); font-size: 20px; cursor: pointer; border: none; background: none; display: flex; justify-content: flex-start; }
        .sub-title { font-size: 16px; font-weight: 700; text-align: center; }

        /* TELA 1: DASHBOARD */
        .header-main { padding: 25px 20px; display: flex; align-items: center; justify-content: space-between; }
        .avatar { width: 45px; height: 45px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #000; }
        .dashboard-card { background: var(--card); margin: 0 20px 25px; padding: 20px; border-radius: 24px; border: 1px solid var(--border); }
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 0 20px; margin-bottom: 30px; }
        .grid-btn { background: var(--card); border: 1px solid var(--border); height: 110px; border-radius: 24px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; cursor: pointer; }
        .grid-btn span { font-weight: 700; font-size: 14px; }

        /* TELA 2: TECLADO AJUSTADO */
        .display-valor { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 52px; font-weight: 800; color: var(--text-main); }
        .teclado-container { background: #fff; padding: 10px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; border-top: 1px solid var(--border); padding-bottom: 25px; }
        .key { height: 60px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; cursor: pointer; border-radius: 12px; }
        .key:active { background: #f0f0f0; }
        .btn-confirm { 
            grid-column: span 3; height: 60px; background: var(--primary); color: #000; 
            border-radius: 18px; display: flex; align-items: center; justify-content: center; 
            font-size: 24px; margin-top: 10px; opacity: 0.2; pointer-events: none; transition: 0.3s;
        }
        .btn-confirm.active { opacity: 1; pointer-events: all; }

        /* TELA 3: MODALIDADES LIMPAS */
        .valor-resumo { padding: 30px 20px; text-align: center; font-size: 40px; font-weight: 800; }
        .list-modalidades { padding: 0 20px; }
        .item-modalidade { 
            background: #fff; padding: 18px; border-radius: 20px; margin-bottom: 12px; 
            border: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between;
            font-weight: 700; cursor: pointer;
        }
        .item-modalidade img { width: 24px; height: 24px; object-fit: contain; }
        .item-modalidade .icon-box { display: flex; align-items: center; gap: 12px; }
        .arrow-bank { width: 18px; height: 18px; border-top: 3px solid var(--primary); border-right: 3px solid var(--primary); transform: rotate(45deg); opacity: 0.8; }

        /* SVG PIX LOGO */
        .pix-logo { width: 22px; height: 22px; fill: #32BCAD; }
    </style>
</head>
<body>

    <div id="screen-dash" class="screen active">
        <header class="header-main">
            <div class="user-info" style="display: flex; align-items: center; gap: 12px;">
                <div class="avatar" id="userInitial">L</div>
                <div class="user-name" style="font-weight: 600;">Olá, <span id="userName">Leonardo</span></div>
            </div>
            <div class="notif">🔔</div>
        </header>
        <div class="dashboard-card">
            <div style="color: var(--text-sec); font-size: 13px; margin-bottom: 5px;">Vendas de hoje</div>
            <div style="font-size: 28px; font-weight: 800; display: flex; justify-content: space-between; align-items: center;">
                R$ 1.250,00
                <span style="color: var(--primary); font-size: 12px; font-weight: 700;">VER MAIS</span>
            </div>
        </div>
        <div class="grid-menu">
            <div class="grid-btn"><span>📊 Extrato</span></div>
            <div class="grid-btn" onclick="nav('screen-teclado')" style="border-color: var(--primary);"><span>💸 Venda Rápida</span></div>
        </div>
    </div>

    <div id="screen-teclado" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-dash')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span class="sub-title">Valor</span>
            <div></div>
        </div>
        <div class="display-valor" id="display">R$ 0,00</div>
        <div class="teclado-container">
            <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
            <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
            <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
            <div class="key" onclick="press('00')">00</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="limpar()">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 4H8l-7 8 7 8h13a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2zM18 9l-6 6M12 9l6 6"/></svg>
            </div>
            <div class="btn-confirm" id="btnProximo" onclick="confirmarValor()">
                <svg width="30" height="30" viewBox="0 0 24 24" fill="none" stroke="black" stroke-width="3"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
            </div>
        </div>
    </div>

    <div id="screen-modal" class="screen">
        <div class="sub-header">
            <button class="back-btn" onclick="nav('screen-teclado')">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
            </button>
            <span class="sub-title">Modalidade</span>
            <div></div>
        </div>
        <div class="valor-resumo" id="valorFinal">R$ 0,00</div>
        <div class="list-modalidades">
            <div class="item-modalidade" onclick="alert('Iniciando Pix...')">
                <div class="icon-box">
                    <svg class="pix-logo" viewBox="0 0 512 512"><path d="M344.4 256L256 344.4l-88.4-88.4L256 167.6 344.4 256zm27.4-115.8l-88.4-88.4c-15.1-15.1-39.7-15.1-54.8 0l-88.4 88.4c-15.1 15.1-15.1 39.7 0 54.8l88.4 88.4 88.4-88.4c15.1-15.1 15.1-39.7 0-54.8zm-115.8 243.6l-88.4 88.4c-15.1 15.1-39.7 15.1-54.8 0l-88.4-88.4c-15.1-15.1-15.1-39.7 0-54.8l88.4-88.4 88.4 88.4c15.1 15.1 15.1 39.7 0 54.8z"/></svg>
                    <span>Pix Zentry</span>
                </div>
                <div class="arrow-bank"></div>
            </div>
            <div class="item-modalidade">
                <div class="icon-box">💳 <span>Crédito</span></div>
                <div class="arrow-bank"></div>
            </div>
            <div class="item-modalidade">
                <div class="icon-box">💳 <span>Débito</span></div>
                <div class="arrow-bank"></div>
            </div>
        </div>
    </div>

    <script>
        let valorString = "";
        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }
        function press(n) {
            if (valorString.length >= 8) return;
            valorString += n;
            atualizarDisplay();
        }
        function limpar() {
            valorString = valorString.slice(0, -1);
            atualizarDisplay();
        }
        function atualizarDisplay() {
            let num = parseFloat(valorString || 0) / 100;
            let formatado = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            document.getElementById('display').innerText = formatado;
            const btn = document.getElementById('btnProximo');
            if (num > 0) btn.classList.add('active');
            else btn.classList.remove('active');
        }
        function confirmarValor() {
            let num = parseFloat(valorString || 0) / 100;
            document.getElementById('valorFinal').innerText = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            nav('screen-modal');
        }
        window.onload = () => {
            const name = localStorage.getItem("usuarioNome") || "Leonardo";
            document.getElementById('userName').innerText = name;
            document.getElementById('userInitial').innerText = name.charAt(0).toUpperCase();
        };
    </script>
</body>
    </html>
