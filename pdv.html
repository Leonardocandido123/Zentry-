<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZENTRY - PDV Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e; 
            --bg-dark: #000;
            --bg-card: #111827;
            --border: rgba(255, 255, 255, 0.1);
            --text-secondary: #9CA3AF;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: radial-gradient(circle at 20% 0%, #0f172a, #000 60%);
            color: #fff;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        .screen {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        .status-bar {
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            font-size: 12px;
            color: var(--text-secondary);
        }

        /* 1. FOCO NO NOME (ESTILO BANCO) */
        .header {
            text-align: center;
            padding: 40px 20px 10px;
        }

        .owner-name {
            font-size: 26px; /* Tamanho de destaque */
            color: #fff;
            font-weight: 700;
            letter-spacing: -0.5px;
            line-height: 1.2;
        }

        /* 2. CENTRALIZAÇÃO DO CONTEÚDO */
        .main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center; /* Joga tudo pro meio */
            padding-bottom: 60px; /* Ajuste para não colar no fundo */
        }

        /* 3. BOTÕES PRINCIPAIS MAIORES */
        .main-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            padding: 20px;
        }

        .btn-large {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 35px 20px; /* Aumentado o padding vertical */
            display: flex;
            flex-direction: column; /* Ícone em cima do texto */
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-size: 16px; /* Texto maior */
            font-weight: 600;
            color: #fff;
            cursor: pointer;
            transition: 0.2s;
        }

        .btn-large:active { transform: scale(0.95); background: #1f2937; }
        .btn-large span { font-size: 28px; } /* Ícone maior */

        /* 4. DESTAQUES MENORES */
        .highlights-section {
            padding: 0 20px;
        }

        .highlights-title {
            color: var(--primary);
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 12px;
            text-align: center;
        }

        .highlights-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }

        .highlight-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 15px 5px; /* Menor que os principais */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            text-align: center;
            color: var(--text-secondary);
            cursor: pointer;
        }

        .icon-small {
            font-size: 18px;
            margin-bottom: 5px;
            color: #fff;
        }

        .nav-bar {
            height: 60px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: 10px;
        }

        .nav-back { width: 0; height: 0; border-top: 8px solid transparent; border-bottom: 8px solid transparent; border-right: 12px solid #555; }
        .nav-circle { width: 16px; height: 16px; border: 2px solid #555; border-radius: 50%; }
        .nav-square { width: 14px; height: 14px; border: 2px solid #555; border-radius: 2px; }

    </style>
</head>
<body>

        <div class="header">
            <div class="owner-name" id="display-dono">CARREGANDO...</div>
        </div>

        <div class="main-content">
            <div class="main-actions">
                <button class="btn-large" onclick="location.href='home.html'">
                    <span>🏠</span> Início
                </button>
                <button class="btn-large" onclick="processarCobranca()" style="border-color: var(--primary);">
                    <span>💳</span> Pagamento
                </button>
            </div>

            <div class="highlights-section">
                <div class="highlights-title">Outras opções</div>
                <div class="highlights-grid">
                    <div class="highlight-card" onclick="alert('Relatórios em breve')">
                        <span class="icon-small">📋</span>
                        Relatórios
                    </div>
                    <div class="highlight-card" onclick="processarCobranca()">
                        <span class="icon-small">💳</span>
                        Pagamento
                    </div>
                    <div class="highlight-card">
                        <span class="icon-small">⚙️</span>
                        Ajustes
                    </div>
                </div>
            </div>
        </div>

        <div class="nav-bar" onclick="location.href='home.html'">
            <div class="nav-back"></div>
            <div class="nav-circle"></div>
            <div class="nav-square"></div>
        </div>
    </div>

    <script type="module">
        import { db } from './zentry-core.js';
        import { doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const uid = localStorage.getItem("uid");

        async function carregarDadosPDV() {
            if (!uid) return;
            const docRef = doc(db, "usuarios", uid);
            const docSnap = await getDoc(docRef);

            if (docSnap.exists()) {
                const data = docSnap.data();
                // Mostra apenas o nome com destaque
                document.getElementById('display-dono').innerText = data.nome || "USUÁRIO";
            }
        }

        window.processarCobranca = async () => {
            const valor = prompt("Digite o valor da venda:", "0.00");
            if (valor && !isNaN(valor)) {
                const valorNumerico = parseFloat(valor);
                try {
                    const userRef = doc(db, "usuarios", uid);
                    await updateDoc(userRef, { saldo: increment(valorNumerico) });
                    alert(`Venda de R$ ${valorNumerico.toFixed(2)} aprovada!`);
                    window.location.href = 'home.html';
                } catch (e) {
                    alert("Erro ao processar.");
                }
            }
        };

        carregarDadosPDV();
    </script>
</body>
</html>
