<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentap Pro</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
:root{
  --primary:#22c55e;
  --bg:#060910;
  --card:#0f1623;
  --border:rgba(255,255,255,0.08);
}

html, body {
  height: 100%;
  width: 100%;
  background: var(--bg);
  color: #fff;
  font-family: sans-serif;
  overflow: hidden;
}

.screen {
  position: fixed;
  inset: 0;
  display: none;
  flex-direction: column;
  padding: 20px;
}

.screen.ativa { display: flex; }

.top-bar {
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 20px;
}

.top-bar span { color: var(--primary); }

.valor {
  font-size: 60px;
  text-align: center;
  margin-top: 40px;
}

.btn {
  height: 60px;
  border-radius: 16px;
  border: none;
  margin-top: 20px;
  font-size: 18px;
}

.btn-green {
  background: var(--primary);
  color: #000;
}

.btn-outline {
  background: transparent;
  border: 1px solid var(--border);
  color: #fff;
}

.metodo {
  padding: 18px;
  border-radius: 16px;
  background: var(--card);
  margin-bottom: 12px;
  border: 1px solid var(--border);
  cursor: pointer;
}

.qr {
  display: flex;
  justify-content: center;
  margin-top: 30px;
}

.timer {
  text-align: center;
  margin-top: 10px;
  color: #fbbf24;
}

.status {
  text-align: center;
  margin-top: 20px;
}

.loader {
  width: 60px;
  height: 60px;
  border-radius: 50%;
  border: 4px solid var(--border);
  border-top: 4px solid var(--primary);
  animation: spin 1s linear infinite;
  margin: 30px auto;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}
</style>
</head>

<body>

<!-- TELA VALOR -->
<div id="t1" class="screen ativa">
  <div class="top-bar">ZEN<span>TAP</span></div>

  <div class="valor" id="valor">R$ 10,00</div>

  <button class="btn btn-green" onclick="ir(2)">Continuar</button>
</div>

<!-- MÉTODO -->
<div id="t2" class="screen">
  <h2>Forma de pagamento</h2>

  <div class="metodo" onclick="abrirPix()">⚡ Pix</div>

  <button class="btn btn-outline" onclick="ir(1)">Voltar</button>
</div>

<!-- PIX -->
<div id="t3" class="screen">
  <h2>Pix</h2>

  <div class="qr" id="qr"></div>

  <div class="timer" id="timer">Expira em 05:00</div>

  <div class="status">
    <div>Aguardando pagamento</div>
    <div style="opacity:.6">Escaneie o QR Code</div>
  </div>

  <div class="loader"></div>

  <button class="btn btn-outline" onclick="ir(2)">Voltar</button>
</div>

</body>

<script>
let valor = 10.00;
let txid = null;
let intervalo = null;

/* NAV */
function ir(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('ativa'))
  document.getElementById('t'+n).classList.add('ativa')
}

/* PIX REAL */
async function abrirPix(){
  ir(3);

  try {
    const res = await fetch("/.netlify/functions/criarPix", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ valor })
    });

    const data = await res.json();

    txid = data.txid;

    document.getElementById("qr").innerHTML = "";

    new QRCode(document.getElementById("qr"), {
      text: data.qr,
      width: 260,
      height: 260
    });

    iniciarTimer();
    verificarPagamento();

  } catch(e){
    alert("Erro ao gerar Pix");
    console.error(e);
  }
}

/* POLLING (APENAS VISUAL) */
function verificarPagamento(){
  intervalo = setInterval(async () => {
    const res = await fetch(`/.netlify/functions/statusPix?txid=${txid}`);
    const data = await res.json();

    if(data.pago){
      clearInterval(intervalo);
      window.location.href = "comprovante_pdv.html?id=" + txid;
    }
  }, 3000);
}

/* TIMER */
let t = 300;

function iniciarTimer(){
  const el = document.getElementById("timer");

  const i = setInterval(()=>{
    t--;

    let m = Math.floor(t/60);
    let s = t % 60;

    el.innerText = `Expira em ${m}:${s.toString().padStart(2,'0')}`;

    if(t <= 0){
      clearInterval(i);
      clearInterval(intervalo);
      alert("Pix expirado");
      ir(2);
    }
  },1000);
}
</script>

</html>
