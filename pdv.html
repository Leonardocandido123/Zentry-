<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Zentap Pro - PDV</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #22c55e;
            --bg: #F8F9FB;
            --card-dark: #1A1D23;
            --text-main: #1A1D23;
            --text-sec: #717680;
            --border: #E5E7EB;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); overflow: hidden; height: 100vh; width: 100vw; }

        .screen { display: none; height: 100vh; width: 100vw; flex-direction: column; position: absolute; top: 0; left: 0; background: var(--bg); z-index: 10; }
        .screen.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* HEADER HOME */
        .dash-header { padding: 20px; display: flex; align-items: center; justify-content: space-between; }
        .user-box { display: flex; align-items: center; gap: 10px; }
        .avatar-circle { width: 40px; height: 40px; background: #EEE; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; color: #666; }
        .user-name { font-size: 14px; font-weight: 700; color: #333; }

        /* CARD DE SALDO ESTILO MÁQUINA */
        .balance-container { background: var(--card-dark); margin: 0 20px 20px; padding: 25px; border-radius: 24px; color: #fff; position: relative; }
        .balance-label { font-size: 13px; opacity: 0.7; margin-bottom: 5px; font-weight: 500; }
        .balance-value { font-size: 28px; font-weight: 800; }
        .btn-eye { position: absolute; top: 25px; right: 25px; font-size: 18px; }

        /* ATALHOS REDONDOS */
        .quick-nav { display: flex; justify-content: space-around; padding: 0 10px 25px; }
        .nav-item { display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; }
        .nav-icon { width: 55px; height: 55px; background: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 22px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .nav-text { font-size: 11px; font-weight: 700; color: var(--text-sec); text-transform: uppercase; }

        /* SEÇÃO DESTAQUE */
        .destaque-section { padding: 0 20px; }
        .destaque-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .destaque-header span { font-weight: 800; font-size: 13px; color: var(--primary); letter-spacing: 1px; }
        .destaque-line { flex: 1; height: 2px; background: var(--primary); border-radius: 2px; }

        .services-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .service-card { background: #fff; border: 2px solid var(--primary); border-radius: 18px; padding: 15px 5px; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; gap: 8px; }
        .service-card div { font-size: 24px; }
        .service-card span { font-size: 10px; font-weight: 800; line-height: 1.2; }

        /* TECLADO */
        .sub-header { padding: 10px 20px; display: grid; grid-template-columns: 44px 1fr 44px; align-items: center; background: #fff; border-bottom: 1px solid var(--border); height: 55px; }
        .display-valor { flex: 1; display: flex; align-items: center; justify-content: center; font-size: 56px; font-weight: 800; }
        .bottom-container { position: fixed; bottom: 0; width: 100%; background: #fff; padding: 15px; border-top: 1px solid var(--border); }
        .teclado-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 15px; }
        .key { height: 50px; display: flex; align-items: center; justify-content: center; font-size: 22px; font-weight: 600; }
        .btn-confirm { width: 100%; height: 55px; background: var(--primary); border: none; border-radius: 14px; font-weight: 800; font-size: 16px; opacity: 0.2; pointer-events: none; color: #000; }
        .btn-confirm.active { opacity: 1; pointer-events: all; }

        /* BARRA INFERIOR */
        .tab-bar { display: flex; justify-content: space-around; padding: 12px; background: #fff; border-top: 1px solid var(--border); position: fixed; bottom: 0; width: 100%; }
        .tab-item { text-align: center; font-size: 10px; font-weight: 700; color: var(--text-sec); }
        .tab-item.active { color: var(--primary); }
    </style>
</head>
<body>

    <div id="screen-dash" class="screen active">
        <div class="dash-header">
            <div class="user-box">
                <div class="avatar-circle">L</div>
                <span class="user-name">Leonardo Candido...</span>
            </div>
            <div style="font-size: 20px;">🔔</div>
        </div>

        <div class="balance-container">
            <div class="balance-label">Saldo disponível</div>
            <div class="balance-value">R$ 1.250,00</div>
            <div class="btn-eye">👁️</div>
        </div>

        <div class="quick-nav">
            <div class="nav-item">
                <div class="nav-icon">📊</div>
                <span class="nav-text">Extrato</span>
            </div>
            <div class="nav-item" onclick="nav('screen-teclado')">
                <div class="nav-icon" style="background: var(--primary); color: #000;">💸</div>
                <span class="nav-text" style="color: var(--primary);">Venda</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">💳</div>
                <span class="nav-text">Cartões</span>
            </div>
            <div class="nav-item">
                <div class="nav-icon">➕</div>
                <span class="nav-text">Mais</span>
            </div>
        </div>

        <div class="destaque-section">
            <div class="destaque-header">
                <span>DESTAQUE</span>
                <div class="destaque-line"></div>
            </div>
            <div class="services-grid">
                <div class="service-card">
                    <div>🔗</div>
                    <span>LINK DE<br>PAGAMENTO</span>
                </div>
                <div class="service-item service-card">
                    <div>👤</div>
                    <span>NOVO<br>CLIENTE</span>
                </div>
                <div class="service-card">
                    <div>⚙️</div>
                    <span>AJUSTES DO<br>SISTEMA</span>
                </div>
            </div>
        </div>

        <div class="tab-bar">
            <div class="tab-item active">🏠<br>Início</div>
            <div class="tab-item">📉<br>Vendas</div>
            <div class="tab-item">👤<br>Perfil</div>
        </div>
    </div>

    <div id="screen-teclado" class="screen">
        <div class="sub-header">
            <button style="border:none; background:none; color:var(--primary); font-size:20px;" onclick="nav('screen-dash')">←</button>
            <span style="font-weight:700;">VALOR</span>
            <div></div>
        </div>
        <div class="display-valor" id="display">R$ 0,00</div>
        <div class="bottom-container">
            <div class="teclado-grid">
                <div class="key" onclick="press(1)">1</div><div class="key" onclick="press(2)">2</div><div class="key" onclick="press(3)">3</div>
                <div class="key" onclick="press(4)">4</div><div class="key" onclick="press(5)">5</div><div class="key" onclick="press(6)">6</div>
                <div class="key" onclick="press(7)">7</div><div class="key" onclick="press(8)">8</div><div class="key" onclick="press(9)">9</div>
                <div class="key" onclick="press('00')">00</div><div class="key" onclick="press(0)">0</div><div class="key" onclick="limpar()">⌫</div>
            </div>
            <button class="btn-confirm" id="btnProximo" onclick="confirmarValor()">PRÓXIMO</button>
        </div>
    </div>

    <div id="screen-modal" class="screen">
        <div class="sub-header">
            <button style="border:none; background:none; color:var(--primary); font-size:20px;" onclick="nav('screen-teclado')">←</button>
            <span style="font-weight:700;">MÉTODO</span>
            <div></div>
        </div>
        <div style="text-align: center; padding: 40px; font-size: 42px; font-weight: 800;" id="valorFinal">R$ 0,00</div>
        <div style="padding: 20px; display: flex; flex-direction: column; gap: 15px;">
            <div onclick="finalizar()" style="background: #fff; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); font-weight: 800; display: flex; justify-content: space-between;">PIX <span>❯</span></div>
            <div onclick="finalizar()" style="background: #fff; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); font-weight: 800; display: flex; justify-content: space-between;">DÉBITO <span>❯</span></div>
            <div onclick="finalizar()" style="background: #fff; padding: 25px; border-radius: 20px; border: 2px solid var(--primary); font-weight: 800; display: flex; justify-content: space-between;">CRÉDITO <span>❯</span></div>
        </div>
    </div>

    <div id="screen-sucesso" class="screen" style="align-items: center; justify-content: center; text-align: center; padding: 20px;">
        <div style="width: 80px; height: 80px; background: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin-bottom: 20px;">✓</div>
        <h2 style="font-weight: 800; margin-bottom: 10px;">APROVADO!</h2>
        <div id="valorSucesso" style="font-size: 40px; font-weight: 800; margin-bottom: 40px;">R$ 0,00</div>
        <button onclick="location.reload()" style="width: 100%; height: 60px; background: var(--primary); border: none; border-radius: 18px; font-weight: 800;">NOVA VENDA</button>
    </div>

    <script>
        let valorString = "";

        function nav(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function press(n) {
            if (valorString.length >= 8) return;
            valorString += n;
            atualizar();
        }

        function limpar() {
            valorString = valorString.slice(0, -1);
            atualizar();
        }

        function atualizar() {
            let num = parseFloat(valorString || 0) / 100;
            let fmt = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            document.getElementById('display').innerText = fmt;
            document.getElementById('btnProximo').classList.toggle('active', num > 0);
        }

        function confirmarValor() {
            let num = parseFloat(valorString) / 100;
            let fmt = num.toLocaleString('pt-BR', { minimumFractionDigits: 2, style: 'currency', currency: 'BRL' });
            document.getElementById('valorFinal').innerText = fmt;
            document.getElementById('valorSucesso').innerText = fmt;
            nav('screen-modal');
        }

        function finalizar() {
            nav('screen-sucesso');
        }
    </script>
</body>
    </html>
