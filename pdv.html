<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentap Pro</title>

<style>
:root{
  --primary:#22c55e;
  --bg:#060910;
  --card:#0f1623;
  --border:rgba(255,255,255,0.08);
}
html, body {
  height: 100%;
  width: 100%;
  background: #060910;
  color: #fff;
  font-family: 'Sora', sans-serif;
  overflow: hidden;
}

.screen {
  position: fixed;
  inset: 0;
  width: 100%;
  height: 100%;
  display: none;
  flex-direction: column;
  padding: 20px;
}

.screen.ativa {
  display: flex;
}

/* HEADER NOVO */
.top-bar {
  width: 100%;
  text-align: center;
  font-size: 22px;
  font-weight: 800;
  margin-bottom: 10px;
}

.top-bar span {
  color: #22c55e;
}

/* VALOR CENTRAL */
.valor-num {
  font-size: 64px;
  font-weight: 800;
}

/* TECLADO MAIS ALTO */
.key {
  height: 70px;
  border-radius: 20px;
  font-size: 24px;
}

/* BOTÃO FULL */
.btn-continuar,
.btn-sec {
  height: 60px;
  border-radius: 18px;
  font-size: 18px;
  }

/* MÉTODOS */
.metodo{
  display:flex;
  align-items:center;
  gap:14px;
  padding:18px;
  border-radius:18px;
  background:var(--card);
  margin-bottom:12px;
  border:1px solid var(--border);
}

/* STATUS PIX */
.status{
  text-align:center;
  margin-top:20px;
}

.status .title{
  font-size:20px;
  font-weight:700;
}

.status .sub{
  font-size:14px;
  opacity:.6;
}

/* LOADER */
.loader{
  width:60px;
  height:60px;
  border-radius:50%;
  border:4px solid var(--border);
  border-top:4px solid var(--primary);
  animation:spin 1s linear infinite;
  margin:30px auto;
}

@keyframes spin{
  to{transform:rotate(360deg)}
}

/* QR */
.qr-wrap {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 20px;
}

/* TIMER */
.timer{
  text-align:center;
  margin-top:10px;
  font-size:14px;
  color:#fbbf24;
}
  body {
  display: block !important;
  }
</style>
</head>

<body>

<!-- TELA VALOR -->
<div class="top-bar">
  ZEN<span>TAP</span>
</div>

  <div class="valor" id="valor">R$ 0,00</div>

  <button class="btn btn-green" onclick="ir(2)">Continuar</button>
</div>

<!-- MÉTODO -->
<div id="t2" class="screen">
  <h2>Forma de pagamento</h2>

  <div class="metodo" onclick="abrirPix()">⚡ Pix</div>
  <div class="metodo" onclick="simular()">💳 Débito</div>
  <div class="metodo" onclick="simular()">💳 Crédito</div>

  <button class="btn btn-outline" onclick="ir(1)">Voltar</button>
</div>

<!-- PIX -->
<div id="t3" class="screen">
  <h2>Pix</h2>

  <div class="qr" id="qr"></div>

  <div class="timer" id="timer">Expira em 05:00</div>

  <div class="status">
    <div class="title">Aguardando pagamento</div>
    <div class="sub">Escaneie o QR Code</div>
  </div>

  <div class="loader"></div>

  <button class="btn btn-outline" onclick="ir(2)">Voltar</button>
</div>

<!-- SUCESSO -->
<div id="t4" class="screen">
  <div class="status">
    <div class="title">Pagamento recebido ✅</div>
    <div class="sub">Valor confirmado com sucesso</div>
  </div>

  <button class="btn btn-green" onclick="ir(1)">Nova venda</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<script>
function ir(n){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('ativa'))
  document.getElementById('t'+n).classList.add('ativa')
}

/* PIX */
window.irParaPix = async function () {
  document.getElementById('valorTopoPix').textContent = valorFmt();

  try {
    const res = await fetch("/.netlify/functions/criarPix", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ valor: parseInt(valorRaw) })
    });

    const data = await res.json();

    const qrContainer = document.getElementById('qrBoxContainer');
    qrContainer.innerHTML = "";

    new QRCode(qrContainer, {
      text: data.qr,
      width: 260,
      height: 260
    });

    // começa verificar pagamento
    
function verificarPagamento(txid) {
  const intervalo = setInterval(async () => {
    const res = await fetch(`/.netlify/functions/statusPix?txid=${txid}`);
    const data = await res.json();

    if (data.pago) {
      clearInterval(intervalo);
      window.location.href = "comprovante_pdv.html?id=" + txid;
    }
  }, 2000);
}
    irPara('tela-pix');

  } catch (e) {
    alert("Erro ao gerar Pix");
    console.error(e);
  }
};

  iniciarTimer()

  // 🔥 SIMULA CONFIRMAÇÃO (depois você liga no webhook real)
  setTimeout(()=>{
    ir(4)
  },6000)
}

/* TIMER */
let t=300
function iniciarTimer(){
  const el=document.getElementById("timer")
  const i=setInterval(()=>{
    t--
    let m=Math.floor(t/60)
    let s=t%60
    el.innerText=`Expira em ${m}:${s.toString().padStart(2,'0')}`
    if(t<=0) clearInterval(i)
  },1000)
}

function simular(){
  alert("Pagamento simulado")
}
</script>

</body>
</html>
