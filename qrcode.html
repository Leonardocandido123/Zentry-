<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <title>ZENTRY - Pagar</title>
  <style>
    :root { --primary: #22C55E; --bg: #000000; --card: #121826; --border: #2A3441; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
    .back-btn { background: var(--card); border: 1px solid var(--border); color: white; cursor: pointer; padding: 10px; border-radius: 50%; display: flex; }
    .header h2 { font-size: 20px; font-weight: 600; margin: 0; }

    .content { flex: 1; padding: 20px; display: flex; flex-direction: column; }

    /* SCANNER REALISTA */
    .scanner-container {
      width: 100%;
      height: 300px;
      background: #050505;
      border-radius: 28px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
    }

    .corner { position: absolute; width: 40px; height: 40px; border: 4px solid var(--primary); z-index: 5; }
    .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
    .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
    .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
    .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }

    .scanner-line {
      position: absolute;
      width: 85%;
      height: 3px;
      background: var(--primary);
      box-shadow: 0 0 25px var(--primary);
      top: 20px;
      animation: scan 2s infinite ease-in-out;
      z-index: 4;
    }

    @keyframes scan {
      0%, 100% { top: 30px; opacity: 0.5; }
      50% { top: 260px; opacity: 1; }
    }

    /* MENSAGEM DE STATUS */
    #status-msg { text-align: center; color: var(--primary); font-size: 13px; font-weight: 600; margin-bottom: 20px; letter-spacing: 1px; }

    /* OPÇÕES */
    .options-label { font-size: 11px; color: #4B5563; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; display: block; }

    .pay-option {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 22px;
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 15px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: 0.2s;
    }

    .pay-option:active { transform: scale(0.97); background: #1a2233; }

    .icon-box {
      width: 44px; height: 44px;
      background: rgba(34, 197, 94, 0.1);
      border-radius: 14px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--primary);
    }

    .info b { display: block; font-size: 15px; color: #FFF; }
    .info span { font-size: 12px; color: #9CA3AF; }

    /* OVERLAY DE SUCESSO (SIMULAÇÃO) */
    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: none;
      flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }

    .loader {
      width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--primary);
      border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
    }

    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <span class="loader"></span>
    <p id="loader-text" style="margin-top: 20px; font-weight: 600;">Processando Leitura...</p>
  </div>

  <div class="header">
    <button class="back-btn" onclick="location.href='pix.html'">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2>Pagar</h2>
  </div>

  <div class="content">
    <div class="scanner-container">
      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>
      <div class="scanner-line"></div>
      <svg style="opacity: 0.1; width: 100px;" viewBox="0 0 24 24"><path d="M3 11V3h8v8H3zm0 10v-8h8v8H3zM13 3h8v8h-8V3zm0 10h8v8h-8v-8z"/></svg>
    </div>

    <div id="status-msg">AGUARDANDO CÓDIGO...</div>

    <span class="options-label">Opções de Pagamento</span>

    <div class="pay-option" onclick="iniciarLeitura('QR Code Pix', 'R$ 85,90', 'Supermercado Tech')">
      <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M12 3l3.8 3.8L12 10.6 8.2 6.8 12 3zM21 12l-3.8 3.8L13.4 12l3.8-3.8L21 12zM12 21l-3.8-3.8L12 13.4l3.8 3.8L12 21zM3 12l3.8-3.8L10.6 12l-3.8 3.8L3 12z"/></svg></div>
      <div class="info"><b>Escanear QR Code</b><span>Pagar via Pix Instantâneo</span></div>
    </div>

    <div class="pay-option" onclick="iniciarLeitura('Boleto Bancário', 'R$ 240,00', 'Energia Elétrica S.A.')">
      <div class="icon-box" style="color: #6366F1;"><svg viewBox="0 0 24 24"><path d="M4 7V4a2 2 0 0 1 2-2h2m10 0h2a2 2 0 0 1 2 2v3m0 10v3a2 2 0 0 1-2 2h-2M7 21H5a2 2 0 0 1-2-2v-3M7 7h10v10H7z"/></svg></div>
      <div class="info"><b>Boleto Bancário</b><span>Água, Luz, Telefone e outros</span></div>
    </div>
  </div>
<script type="module">
    // 1. IMPORTAÇÕES FIREBASE
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userLogado = null;

    // Monitora login
    onAuthStateChanged(auth, (user) => {
        if (user) userLogado = user;
        else window.location.href = 'login.html';
    });

    // 2. FUNÇÃO DE LEITURA (SIMULADA MAS COM DADOS REAIS)
    window.iniciarLeitura = (tipo, valorStr, recebedor) => {
        const overlay = document.getElementById('loading-overlay');
        const loaderText = document.getElementById('loader-text');
        
        overlay.style.display = 'flex';
        loaderText.innerText = "Escaneando " + tipo + "...";

        // Simula o tempo da câmera focando
        setTimeout(() => {
            loaderText.innerText = "Consultando Banco Central...";
            setTimeout(() => {
                overlay.style.display = 'none';
                confirmarPagamento(tipo, valorStr, recebedor);
            }, 1200);
        }, 1500);
    }

    async function confirmarPagamento(tipo, valorStr, recebedor) {
        const valorNum = parseFloat(valorStr.replace('R$ ', '').replace('.', '').replace(',', '.'));
        
        const confirmacao = confirm(`PAGAMENTO IDENTIFICADO\n\nDestino: ${recebedor}\nValor: ${valorStr}\n\nDeseja confirmar o débito?`);
        
        if (confirmacao) {
            processarPagamentoReal(valorNum, valorStr, recebedor, tipo);
        }
    }

    async function processarPagamentoReal(valorNum, valorStr, recebedor, tipo) {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        document.getElementById('loader-text').innerText = "Finalizando Débito...";

        try {
            const userRef = doc(db, "usuarios", userLogado.uid);
            const snap = await getDoc(userRef);
            const saldoAtual = snap.data().saldo || 0;

            if (saldoAtual < valorNum) {
                alert("Saldo Insuficiente no Firestore!");
                overlay.style.display = 'none';
                return;
            }

            // 3. ATUALIZAÇÃO NO FIREBASE (SAÍDA REAL)
            await updateDoc(userRef, {
                saldo: increment(-valorNum),
                saida: increment(valorNum)
            });

            // 4. PREPARA DADOS PARA O COMPROVANTE
            const transacaoPendente = {
                nomeDestino: recebedor,
                valor: valorStr,
                valorNumerico: valorNum,
                chavePix: "QR Code / Boleto",
                bancoDestino: "Liquidado via Zentry",
                uidDestino: "externo_qrcode",
                data: new Date().toLocaleString('pt-BR')
            };

            localStorage.setItem("transacao_pendente", JSON.stringify(transacaoPendente));
            
            // Redireciona
            window.location.href = "comprovante.html";

        } catch (error) {
            console.error(error);
            alert("Erro ao processar pagamento no servidor.");
            overlay.style.display = 'none';
        }
    }
</script>
  
</body>
</html>
