<!DOCTYPE html><html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ZENTRY - Pagar</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/html5-qrcode"></script><style>
:root { --primary:#22C55E; --bg:#000; --card:#121826; --border:#2A3441; }
* { box-sizing:border-box; font-family:'Inter'; }

body { margin:0; background:var(--bg); color:white; }

.header { padding:20px; display:flex; align-items:center; gap:15px; }
.back-btn { background:var(--card); border:none; padding:10px; border-radius:50%; color:white; }

.scanner-container {
  height:320px;
  margin:20px;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  border:2px solid var(--border);
  background:#000;
}

#reader { width:100%; height:100%; }
#reader video { width:100%; height:100%; object-fit:cover; }

.scan-line {
  position:absolute;
  left:50%; transform:translateX(-50%);
  width:90%; height:3px;
  background:var(--primary);
  box-shadow:0 0 20px var(--primary);
  z-index:10;
  animation: scan 2.5s infinite ease-in-out;
}

@keyframes scan {
  0% { top: 10%; }
  50% { top: 90%; }
  100% { top: 10%; }
}

.status { text-align:center; color:var(--primary); font-size:13px; margin:10px; }

.confirm-box {
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
  display:none;
}

.btn {
  width:100%;
  padding:15px;
  border:none;
  border-radius:15px;
  background:var(--primary);
  color:#000;
  font-weight:bold;
  margin-top:15px;
}
</style></head><body><div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pagar</h2>
</div><div class="scanner-container">
  <div id="reader"></div>
  <div class="scan-line"></div>
</div><div class="status" id="status">Carregando câmera...</div><!-- TELA DE CONFIRMAÇÃO --><div class="confirm-box" id="confirmBox">
  <p><b>Nome:</b> <span id="nome"></span></p>
  <p><b>Valor:</b> R$ <span id="valor"></span></p>
  <p><b>Saldo:</b> R$ <span id="saldo"></span></p><button class="btn" onclick="confirmarPagamento()">Concluir pagamento</button>

</div><script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment, addDoc, collection } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "SUA_KEY_AQUI",
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userLogado = null;
let html5QrCode = null;
let dadosPix = null;
let saldoAtual = 0;

onAuthStateChanged(auth, async (user) => {
  const status = document.getElementById("status");

  if (!user) {
    status.innerText = "Sessão expirada...";
    setTimeout(() => window.location.href = "login.html", 1500);
    return;
  }

  userLogado = user;
  iniciarScanner();
});

async function iniciarScanner() {
  const status = document.getElementById("status");

  html5QrCode = new Html5Qrcode("reader");

  await html5QrCode.start(
    { facingMode: "environment" },
    { fps: 15, qrbox: { width: 250, height: 250 } },
    async (text) => {
      html5QrCode.stop();
      navigator.vibrate?.(150);

      try {
        dadosPix = JSON.parse(text);

        const ref = doc(db, "usuarios", userLogado.uid);
        const snap = await getDoc(ref);
        saldoAtual = snap.data()?.saldo || 0;

        document.getElementById("nome").innerText = dadosPix.nome;
        document.getElementById("valor").innerText = dadosPix.valor;
        document.getElementById("saldo").innerText = saldoAtual;

        document.getElementById("confirmBox").style.display = "block";
        document.getElementById("status").innerText = "Confirme o pagamento";

      } catch {
        alert("QR inválido");
        location.reload();
      }
    }
  );

  status.innerText = "Aponte para o QR Code";
}

window.confirmarPagamento = async () => {
  if (!dadosPix) return;

  if (saldoAtual < dadosPix.valor) {
    alert("Saldo insuficiente");
    return;
  }

  const ref = doc(db, "usuarios", userLogado.uid);

  await updateDoc(ref, {
    saldo: increment(-dadosPix.valor)
  });

  const transacao = {
    valor: dadosPix.valor,
    nome: dadosPix.nome,
    data: new Date().toLocaleString(),
    user: userLogado.uid
  };

  await addDoc(collection(db, "transacoes"), transacao);

  localStorage.setItem("comprovante", JSON.stringify(transacao));

  window.location.href = "comprovante.html";
};

</script></body>
</html>
