<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>ZENTRY - Pagar</title>
  <style>
    :root { --primary: #22C55E; --bg: #000000; --card: #121826; --border: #2A3441; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
    .back-btn { background: var(--card); border: 1px solid var(--border); color: white; cursor: pointer; padding: 10px; border-radius: 50%; display: flex; }
    .header h2 { font-size: 20px; font-weight: 600; margin: 0; }

    .content { flex: 1; padding: 20px; display: flex; flex-direction: column; }

    .scanner-container {
      width: 100%; height: 300px; background: #050505; border-radius: 28px;
      border: 1px solid var(--border); position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center; margin-bottom: 25px;
    }

    #reader { width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover !important; }

    .corner { position: absolute; width: 40px; height: 40px; border: 4px solid var(--primary); z-index: 5; pointer-events: none; }
    .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
    .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
    .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
    .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }

    .scanner-line {
      position: absolute; width: 85%; height: 3px; background: var(--primary);
      box-shadow: 0 0 25px var(--primary); top: 20px;
      animation: scan 2s infinite ease-in-out; z-index: 4; pointer-events: none;
    }

    @keyframes scan { 0%, 100% { top: 30px; opacity: 0.5; } 50% { top: 260px; opacity: 1; } }

    #status-msg { text-align: center; color: var(--primary); font-size: 13px; font-weight: 600; margin-bottom: 20px; letter-spacing: 1px; }

    .pay-option {
      background: var(--card); border: 1px solid var(--border); border-radius: 22px;
      padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
      cursor: pointer; transition: 0.2s;
    }

    .icon-box {
      width: 44px; height: 44px; background: rgba(34, 197, 94, 0.1);
      border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary);
    }

    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: none;
      flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }

    .loader {
      width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--primary);
      border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
    }

    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    @keyframes popIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
    svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; }
  </style>
</head>
<body>
  <div id="zentryModalGlobal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); z-index:9999; align-items:center; justify-content:center; padding:20px; backdrop-filter: blur(5px);">
    <div style="background:#121826; border:1px solid #2A3441; border-radius:28px; width:100%; max-width:340px; padding:25px; text-align:center; animation: popIn 0.2s ease-out;">
      <div id="zIcon" style="font-size:40px; margin-bottom:15px;">⚠️</div>
      <h3 id="zTitle" style="margin:0 0 10px; font-size:18px; color:#fff; font-weight:700;">Aviso</h3>
      <p id="zText" style="color:#9CA3AF; font-size:14px; margin-bottom:20px; line-height:1.5;"></p>
      
      <input type="text" id="zInput" placeholder="R$ 0,00" inputmode="decimal" style="display:none; width:100%; padding:15px; background:#050505; border:1px solid #2A3441; border-radius:12px; color:#22C55E; text-align:center; font-size:24px; font-weight:700; margin-bottom:20px; outline:none;">
      
      <div style="display:flex; gap:10px;">
          <button id="zBtnCancel" style="display:none; flex:1; padding:15px; border-radius:14px; background:transparent; border:1px solid #2A3441; color:#fff; font-weight:600;">Voltar</button>
          <button id="zBtnOk" style="flex:1; padding:15px; border-radius:14px; background:#22C55E; border:none; color:#000; font-weight:700;">Confirmar</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userLogado = null;
    let html5QrCode = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userLogado = user;
            iniciarScanner(); 
        } else {
            window.location.href = 'login.html';
        }
    });

    // --- MÁSCARA DE MOEDA EM TEMPO REAL ---
    const inputMoeda = document.getElementById('zInput');
    inputMoeda.addEventListener('input', (e) => {
        let v = e.target.value.replace(/\D/g, '');
        v = (v / 100).toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        e.target.value = v;
    });

    function limparParaNumero(valorStr) {
        return parseFloat(valorStr.replace(/[^\d,]/g, '').replace(',', '.'));
    }

    // --- MODAIS ATUALIZADOS ---
    window.zAlert = (titulo, msg, icon = "⚠️") => {
        return new Promise(res => {
            document.getElementById('zIcon').innerText = icon;
            document.getElementById('zTitle').innerText = titulo;
            document.getElementById('zText').innerText = msg;
            document.getElementById('zInput').style.display = 'none';
            document.getElementById('zBtnCancel').style.display = 'none';
            document.getElementById('zentryModalGlobal').style.display = 'flex';
            document.getElementById('zBtnOk').onclick = () => { document.getElementById('zentryModalGlobal').style.display = 'none'; res(); };
        });
    };

    window.zPrompt = (titulo, msg) => {
        return new Promise(res => {
            document.getElementById('zIcon').innerText = "💰";
            document.getElementById('zTitle').innerText = titulo;
            document.getElementById('zText').innerText = msg;
            const input = document.getElementById('zInput');
            input.style.display = 'block';
            input.value = ""; // Começa vazio para a máscara agir
            document.getElementById('zBtnCancel').style.display = 'block';
            document.getElementById('zentryModalGlobal').style.display = 'flex';
            
            document.getElementById('zBtnOk').onclick = () => { 
                const valorFinal = input.value;
                document.getElementById('zentryModalGlobal').style.display = 'none'; 
                res(valorFinal); 
            };
            document.getElementById('zBtnCancel').onclick = () => { 
                document.getElementById('zentryModalGlobal').style.display = 'none'; 
                res(null); 
            };
        });
    };

    function iniciarScanner() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            if (navigator.vibrate) navigator.vibrate(100);
            html5QrCode.stop();
            processarDadosLidos(decodedText);
        }).catch(err => {
            document.getElementById('status-msg').innerText = "ERRO: CÂMERA NÃO DETECTADA";
        });
    }

    async function processarDadosLidos(texto) {
        let valorNum = 0;
        let nome = "Recebedor Externo";
        try {
            if(texto.includes("59")) {
                const parteNome = texto.split('59')[1];
                const tam = parseInt(parteNome.substring(0, 2));
                nome = parteNome.substring(2, 2 + tam);
            }
            if(texto.includes("5405")) valorNum = parseFloat(texto.split('5405')[1].substring(0, 5));
        } catch(e) {}

        if (valorNum <= 0) {
            const digitado = await zPrompt("Valor do Pagamento", `Informe o valor para ${nome}:`);
            if (digitado && digitado !== "") {
                valorNum = limparParaNumero(digitado);
            } else { 
                location.reload(); 
                return; 
            }
        }

        const valorStr = valorNum.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        abrirModalConfirmacao(nome, valorStr, valorNum);
    }

    function abrirModalConfirmacao(nome, valorStr, valorNum) {
        document.getElementById('zIcon').innerText = "✅";
        document.getElementById('zTitle').innerText = "Revisar Pagamento";
        document.getElementById('zText').innerHTML = `Para: <b>${nome}</b><br>Valor: <b style="color:#22C55E">${valorStr}</b>`;
        document.getElementById('zInput').style.display = 'none';
        document.getElementById('zBtnCancel').style.display = 'block';
        document.getElementById('zentryModalGlobal').style.display = 'flex';
        
        document.getElementById('zBtnOk').onclick = () => {
            document.getElementById('zentryModalGlobal').style.display = 'none';
            executarDebitoReal(valorNum, valorStr, nome);
        };
        document.getElementById('zBtnCancel').onclick = () => { location.reload(); };
    }

    window.iniciarLeituraManual = (tipo, valorStr, recebedor) => {
        const valorNum = limparParaNumero(valorStr);
        abrirModalConfirmacao(recebedor, valorStr, valorNum);
    };

    async function executarDebitoReal(valorNum, valorStr, recebedor) {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';
        try {
            const userRef = doc(db, "usuarios", userLogado.uid);
            const snap = await getDoc(userRef);
            const saldoAtual = snap.data().saldo || 0;

            if (saldoAtual < valorNum) {
                overlay.style.display = 'none';
                await zAlert("Saldo Insuficiente", "Seu saldo é menor que o valor do pagamento.", "❌");
                location.reload(); 
                return;
            }

            await updateDoc(userRef, { 
                saldo: increment(-valorNum), 
                saida: increment(valorNum) 
            });

            localStorage.setItem("transacao_pendente", JSON.stringify({
                nomeDestino: recebedor, valor: valorStr, valorNumerico: valorNum,
                data: new Date().toLocaleString('pt-BR'), bancoDestino: "Zentry Bank",
                chavePix: "Leitura de Scanner", id: "SCAN" + Math.floor(100000 + Math.random() * 900000)
            }));
            window.location.href = "comprovante.html";
        } catch (error) {
            overlay.style.display = 'none';
            await zAlert("Erro de Conexão", "Não foi possível processar o débito.", "❌");
        }
    }
              </script>
  
</body>
</html>
