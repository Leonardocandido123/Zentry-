<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ZENTRY - Pagar</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
:root { --primary:#22C55E; --bg:#000; --card:#121826; --border:#2A3441; }

* { box-sizing:border-box; font-family:'Inter'; }

body {
  margin:0;
  background:var(--bg);
  color:white;
}

/* HEADER */
.header {
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
}

.back-btn {
  background:var(--card);
  border:none;
  padding:10px;
  border-radius:50%;
  color:white;
}

/* SCANNER */
.scanner-container {
  height:280px;
  margin:20px;
  border-radius:25px;
  overflow:hidden;
  position:relative;
  border:1px solid var(--border);
}

#reader {
  width:100%;
  height:100%;
}

#reader video {
  object-fit:cover;
}

/* LINHA */
.scan-line {
  position:absolute;
  width:90%;
  height:3px;
  background:var(--primary);
  box-shadow:0 0 20px var(--primary);
  animation:scan 2s infinite;
}

@keyframes scan {
  0% { top:10%; }
  100% { top:90%; }
}

/* TEXTO */
.status {
  text-align:center;
  color:var(--primary);
  font-size:13px;
}

/* BOTÃO */
.option {
  margin:20px;
  padding:20px;
  border-radius:20px;
  background:var(--card);
  border:1px solid var(--border);
}
</style>
</head>

<body>

<div class="header">
  <button class="back-btn" onclick="history.back()">←</button>
  <h2>Pagar</h2>
</div>

<div class="scanner-container">
  <div id="reader"></div>
  <div class="scan-line"></div>
</div>

<div class="status" id="status">Aponte para QR Code ou Código de Barras</div>

<div class="option" onclick="modoManual()">
  Digitar código manualmente
</div> 
  
  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSy...", 
  authDomain: "zentry-app-74275.firebaseapp.com",
  projectId: "zentry-app-74275"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let userLogado = null;
let html5QrCode = null;
let jaLeu = false;

/* --- PROTEÇÃO DE LOGIN --- */
onAuthStateChanged(auth, (user) => {
  if (user) {
    userLogado = user;
    // Pequeno delay para a página carregar 100%
    setTimeout(iniciarScanner, 800);
  } else {
    setTimeout(() => {
      if (!auth.currentUser) window.location.href = "login.html";
    }, 3000);
  }
});

/* --- SCANNER ÚNICO (NÍVEL BANCO) --- */
async function iniciarScanner() {
  const status = document.getElementById("status");
  
  // Se já existir um scanner rodando, ele para antes de começar
  if (html5QrCode) {
    await html5QrCode.stop().catch(() => {});
  }

  html5QrCode = new Html5Qrcode("reader");

  const config = { 
    fps: 20, 
    qrbox: { width: 250, height: 250 } 
  };

  try {
    await html5QrCode.start(
      { facingMode: "environment" },
      config,
      (text) => {
        if (jaLeu) return;
        jaLeu = true;

        vibrar();
        html5QrCode.stop(); // Desliga a câmera após a leitura
        
        status.innerText = "Código detectado! ✔";
        processarPagamento(text);
      }
    );
    status.innerText = "Aponte para o QR Code ou Código de Barras";
  } catch (err) {
    console.error("Erro ao abrir câmera:", err);
    status.innerText = "Erro na câmera. Verifique as permissões.";
  }
}

/* --- PROCESSAMENTO --- */
async function processarPagamento(codigoLido) {
  try {
    let valorPrompt = prompt("Código detectado!\n\nDigite o valor do pagamento:");
    if (!valorPrompt) {
        location.reload();
        return;
    }

    const valorFinal = parseFloat(valorPrompt.replace(".", "").replace(",", "."));
    
    if (isNaN(valorFinal) || valorFinal <= 0) {
        alert("Valor inválido!");
        location.reload();
        return;
    }

    // Busca saldo real no Firebase
    const userRef = doc(db, "usuarios", userLogado.uid);
    const snap = await getDoc(userRef);
    const saldoAtual = snap.data().saldo || 0;

    if (saldoAtual < valorFinal) {
        alert("Saldo insuficiente!");
        location.reload();
        return;
    }

    // Debita o valor
    await updateDoc(userRef, {
        saldo: increment(-valorFinal)
    });

    // Salva para o comprovante
    localStorage.setItem("transacao", JSON.stringify({
        valor: valorFinal,
        data: new Date().toLocaleString(),
        codigo: codigoLido
    }));

    window.location.href = "comprovante.html";

  } catch (e) {
    console.error(e);
    alert("Erro ao processar.");
    location.reload();
  }
}

function vibrar() {
  if (navigator.vibrate) navigator.vibrate(100);
}

window.modoManual = () => processarPagamento("DIGITADO_MANUAL");
  </script>
  
  
</body>
</html>
