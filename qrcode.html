<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <title>ZENTRY - Pagar</title>
  <style>
    :root { --primary: #22C55E; --bg: #000000; --card: #121826; --border: #2A3441; }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

    .header { padding: 20px; display: flex; align-items: center; gap: 15px; z-index: 10; }
    .back-btn { background: var(--card); border: 1px solid var(--border); color: white; cursor: pointer; padding: 10px; border-radius: 50%; display: flex; }
    .header h2 { font-size: 20px; font-weight: 600; margin: 0; }

    .content { flex: 1; padding: 20px; display: flex; flex-direction: column; }

    /* SCANNER REALISTA */
    .scanner-container {
      width: 100%;
      height: 300px;
      background: #050505;
      border-radius: 28px;
      border: 1px solid var(--border);
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 25px;
    }

    /* Ajuste para a câmera ocupar o espaço certo */
    #reader { width: 100% !important; height: 100% !important; }
    #reader video { object-fit: cover !important; }

    .corner { position: absolute; width: 40px; height: 40px; border: 4px solid var(--primary); z-index: 5; pointer-events: none; }
    .top-left { top: 20px; left: 20px; border-right: 0; border-bottom: 0; border-radius: 12px 0 0 0; }
    .top-right { top: 20px; right: 20px; border-left: 0; border-bottom: 0; border-radius: 0 12px 0 0; }
    .bottom-left { bottom: 20px; left: 20px; border-right: 0; border-top: 0; border-radius: 0 0 0 12px; }
    .bottom-right { bottom: 20px; right: 20px; border-left: 0; border-top: 0; border-radius: 0 0 12px 0; }

    .scanner-line {
      position: absolute;
      width: 85%;
      height: 3px;
      background: var(--primary);
      box-shadow: 0 0 25px var(--primary);
      top: 20px;
      animation: scan 2s infinite ease-in-out;
      z-index: 4;
      pointer-events: none;
    }

    @keyframes scan {
      0%, 100% { top: 30px; opacity: 0.5; }
      50% { top: 260px; opacity: 1; }
    }

    #status-msg { text-align: center; color: var(--primary); font-size: 13px; font-weight: 600; margin-bottom: 20px; letter-spacing: 1px; }

    .options-label { font-size: 11px; color: #4B5563; text-transform: uppercase; font-weight: 700; margin-bottom: 10px; display: block; }

    .pay-option {
      background: var(--card); border: 1px solid var(--border); border-radius: 22px;
      padding: 20px; display: flex; align-items: center; gap: 15px; margin-bottom: 12px;
      cursor: pointer; transition: 0.2s;
    }

    .icon-box {
      width: 44px; height: 44px; background: rgba(34, 197, 94, 0.1);
      border-radius: 14px; display: flex; align-items: center; justify-content: center; color: var(--primary);
    }

    .info b { display: block; font-size: 15px; color: #FFF; }
    .info span { font-size: 12px; color: #9CA3AF; }

    #loading-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.9); display: none;
      flex-direction: column; align-items: center; justify-content: center; z-index: 100;
    }

    .loader {
      width: 48px; height: 48px; border: 5px solid #FFF; border-bottom-color: var(--primary);
      border-radius: 50%; display: inline-block; animation: rotation 1s linear infinite;
    }

    @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    svg { width: 24px; height: 24px; fill: none; stroke: currentColor; stroke-width: 2.5; }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
  </style>
</head>
<body>

  <div id="loading-overlay">
    <span class="loader"></span>
    <p id="loader-text" style="margin-top: 20px; font-weight: 600;">Processando Débito...</p>
  </div>

  <div class="header">
    <button class="back-btn" onclick="location.href='pix.html'">
      <svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <h2>Pagar</h2>
  </div>

  <div class="content">
    <div class="scanner-container">
      <div id="reader"></div>
      
      <div class="corner top-left"></div>
      <div class="corner top-right"></div>
      <div class="corner bottom-left"></div>
      <div class="corner bottom-right"></div>
      <div class="scanner-line"></div>
    </div>

    <div id="status-msg">POSICIONE O CÓDIGO NA MOLDURA</div>

    <span class="options-label">Opções Rápidas (Simulação)</span>

    <div class="pay-option" onclick="simularLeitura('QR Code Pix', 'R$ 85,90', 'Supermercado Tech')">
      <div class="icon-box"><svg viewBox="0 0 24 24"><path d="M12 3l3.8 3.8L12 10.6 8.2 6.8 12 3zM21 12l-3.8 3.8L13.4 12l3.8-3.8L21 12zM12 21l-3.8-3.8L12 13.4l3.8 3.8L12 21zM3 12l3.8-3.8L10.6 12l-3.8 3.8L3 12z"/></svg></div>
      <div class="info"><b>Escanear Manualmente</b><span>Se a câmera falhar, clique aqui</span></div>
    </div>
  </div>
  <div id="modalPagamento" style="display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 200; align-items: flex-end;">
  <div style="background: #121826; width: 100%; padding: 30px; border-radius: 30px 30px 0 0; border-top: 1px solid #2A3441; animation: slideUp 0.3s ease-out;">
    <div style="width: 40px; height: 4px; background: #2A3441; margin: 0 auto 20px; border-radius: 10px;"></div>
    <h3 style="margin: 0 0 5px; color: #22C55E; font-size: 14px; text-transform: uppercase; letter-spacing: 1px;">Pagamento Identificado</h3>
    <p id="modalNome" style="font-size: 20px; font-weight: 700; margin: 10px 0; color: white;"></p>
    <p id="modalValor" style="font-size: 32px; font-weight: 800; margin: 10px 0; color: white;"></p>
    
    <div style="display: flex; gap: 12px; margin-top: 25px;">
      <button onclick="location.reload()" style="flex: 1; padding: 18px; border-radius: 16px; border: 1px solid #2A3441; background: transparent; color: white; font-weight: 600;">Cancelar</button>
      <button id="btnConfirmarModal" style="flex: 2; padding: 18px; border-radius: 16px; border: none; background: #22C55E; color: black; font-weight: 700;">Confirmar Pagamento</button>
    </div>
  </div>
  </div>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import { getFirestore, doc, getDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
        authDomain: "zentry-app-74275.firebaseapp.com",
        projectId: "zentry-app-74275",
        storageBucket: "zentry-app-74275.appspot.com",
        messagingSenderId: "571422826071",
        appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    let userLogado = null;
    let html5QrCode = null;

    onAuthStateChanged(auth, (user) => {
        if (user) {
            userLogado = user;
            iniciarScanner(); 
        } else {
            window.location.href = 'login.html';
        }
    });

    // --- FUNÇÕES DO MODAL PROFISSIONAL (ZENTRY MODAL) ---
    window.zAlert = (titulo, msg, icon = "⚠️") => {
        return new Promise(res => {
            document.getElementById('zIcon').innerText = icon;
            document.getElementById('zTitle').innerText = titulo;
            document.getElementById('zText').innerText = msg;
            document.getElementById('zInput').style.display = 'none';
            document.getElementById('zBtnCancel').style.display = 'none';
            document.getElementById('zentryModalGlobal').style.display = 'flex';
            document.getElementById('zBtnOk').onclick = () => { document.getElementById('zentryModalGlobal').style.display = 'none'; res(); };
        });
    };

    window.zPrompt = (titulo, msg) => {
        return new Promise(res => {
            document.getElementById('zIcon').innerText = "💰";
            document.getElementById('zTitle').innerText = titulo;
            document.getElementById('zText').innerText = msg;
            const input = document.getElementById('zInput');
            input.style.display = 'block';
            input.value = "";
            document.getElementById('zBtnCancel').style.display = 'block';
            document.getElementById('zentryModalGlobal').style.display = 'flex';
            document.getElementById('zBtnOk').onclick = () => { document.getElementById('zentryModalGlobal').style.display = 'none'; res(input.value); };
            document.getElementById('zBtnCancel').onclick = () => { document.getElementById('zentryModalGlobal').style.display = 'none'; res(null); };
        });
    };

    // --- MOTOR DA CÂMERA ---
    function iniciarScanner() {
        html5QrCode = new Html5Qrcode("reader");
        const config = { fps: 15, qrbox: { width: 250, height: 250 }, aspectRatio: 1.0 };

        html5QrCode.start({ facingMode: "environment" }, config, (decodedText) => {
            if (navigator.vibrate) navigator.vibrate(100);
            html5QrCode.stop();
            processarDadosLidos(decodedText);
        }).catch(err => {
            document.getElementById('status-msg').innerText = "ERRO: CÂMERA NÃO DETECTADA";
        });
    }

    // --- LÓGICA DE PROCESSAMENTO ---
    async function processarDadosLidos(texto) {
        let valor = 0;
        let nome = "Recebedor Externo";

        try {
            if(texto.includes("59")) {
                const parteNome = texto.split('59')[1];
                const tam = parseInt(parteNome.substring(0, 2));
                nome = parteNome.substring(2, 2 + tam);
            }
            if(texto.includes("5405")) valor = parseFloat(texto.split('5405')[1].substring(0, 5));
        } catch(e) {}

        // Se valor não for identificado no QR, usa o NOSSO PROMPT
        if (valor <= 0) {
            const digitado = await zPrompt("Valor pendente", `Digite o valor para pagar ${nome}:`);
            if (digitado) valor = parseFloat(digitado.replace(',', '.'));
            else { location.reload(); return; }
        }

        const valorStr = valor.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        
        // Abre o modal de confirmação final
        abrirModalConfirmacao(nome, valorStr, valor);
    }

    function abrirModalConfirmacao(nome, valorStr, valorNum) {
        // Reutilizamos o Modal Global para confirmar o pagamento
        document.getElementById('zIcon').innerText = "✅";
        document.getElementById('zTitle').innerText = "Confirmar Pagamento";
        document.getElementById('zText').innerHTML = `Destino: <b>${nome}</b><br>Valor: <b>${valorStr}</b>`;
        document.getElementById('zInput').style.display = 'none';
        document.getElementById('zBtnCancel').style.display = 'block';
        document.getElementById('zentryModalGlobal').style.display = 'flex';

        document.getElementById('zBtnOk').onclick = () => {
            document.getElementById('zentryModalGlobal').style.display = 'none';
            executarDebitoReal(valorNum, valorStr, nome);
        };
        document.getElementById('zBtnCancel').onclick = () => {
            location.reload();
        };
    }

    // Botão de Escanear Manualmente
    window.iniciarLeitura = (tipo, valorStr, recebedor) => {
        const valorNum = parseFloat(valorStr.replace('R$ ', '').replace('.', '').replace(',', '.'));
        abrirModalConfirmacao(recebedor, valorStr, valorNum);
    };

    // --- DÉBITO FINAL NO FIREBASE ---
    async function executarDebitoReal(valorNum, valorStr, recebedor) {
        const overlay = document.getElementById('loading-overlay');
        overlay.style.display = 'flex';

        try {
            const userRef = doc(db, "usuarios", userLogado.uid);
            const snap = await getDoc(userRef);
            const saldoAtual = snap.data().saldo || 0;

            if (saldoAtual < valorNum) {
                overlay.style.display = 'none';
                await zAlert("Saldo Insuficiente", "Você não tem saldo para realizar este pagamento.", "❌");
                location.reload();
                return;
            }

            await updateDoc(userRef, {
                saldo: increment(-valorNum),
                saida: increment(valorNum)
            });

            localStorage.setItem("transacao_pendente", JSON.stringify({
                nomeDestino: recebedor,
                valor: valorStr,
                valorNumerico: valorNum,
                data: new Date().toLocaleString('pt-BR'),
                bancoDestino: "Zentry Payments",
                chavePix: "Leitura de Scanner",
                id: "SCAN" + Math.floor(100000 + Math.random() * 900000)
            }));

            window.location.href = "comprovante.html";
        } catch (error) {
            overlay.style.display = 'none';
            await zAlert("Erro no Sistema", "Ocorreu uma falha ao processar o débito.", "❌");
        }
    }
  </script>
  
  
  </body>
</html>
