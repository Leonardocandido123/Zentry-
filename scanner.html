<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zentry Scanner</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body {
  margin:0;
  font-family: Inter, sans-serif;
  background:#000;
  color:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
}

.header {
  width:100%;
  padding:18px;
  text-align:center;
  font-weight:700;
  border-bottom:1px solid #222;
}

.card {
  width:92%;
  margin-top:20px;
  background:#111827;
  padding:20px;
  border-radius:20px;
  text-align:center;
}

#reader {
  width:100%;
  margin-top:15px;
  border-radius:15px;
  overflow:hidden;
}

.status {
  font-size:12px;
  color:#9ca3af;
  margin-top:10px;
}

button {
  margin-top:15px;
  padding:12px 18px;
  border:none;
  border-radius:12px;
  background:#22c55e;
  color:#fff;
  font-weight:700;
}

.scan-box {
  border:2px solid #22c55e;
  border-radius:15px;
}
</style>
</head>

<body>

<div class="header">Leitor de QR Code Pix</div>

<div class="card">
  <b>Escaneie para pagar</b>

  <p class="status" id="status">Clique para iniciar</p>

  <button onclick="iniciarScanner()">Abrir câmera</button>

  <div id="reader"></div>
</div>

<script>
let scanner;
let processando = false;

async function iniciarScanner() {

  document.getElementById("status").innerText = "Abrindo câmera...";

  const cameras = await Html5Qrcode.getCameras();

  if (!cameras || cameras.length === 0) {
    alert("Nenhuma câmera encontrada");
    return;
  }

  // 🔥 pega câmera traseira automaticamente
  let cameraId = cameras[0].id;

  for (let cam of cameras) {
    const label = cam.label.toLowerCase();
    if (
      label.includes("back") ||
      label.includes("traseira") ||
      label.includes("environment")
    ) {
      cameraId = cam.id;
      break;
    }
  }

  scanner = new Html5Qrcode("reader");

  scanner.start(
    cameraId,
    {
      fps: 10,
      qrbox: { width: 250, height: 250 }
    },
    async (text) => {

      if (processando) return;
      processando = true;

      console.log("QR:", text);

      try {

        await scanner.stop();

        document.getElementById("status").innerText =
          "QR detectado ✔";

        processarQR(text);

      } catch (e) {
        console.log(e);
        alert("Erro ao processar QR");
        processando = false;
      }

    },
    (err) => {
      // ignora erro de frame
    }

  ).catch(err => {
    console.log(err);
    alert("Erro ao abrir câmera");
  });
}

// 🔥 PROCESSAMENTO INTELIGENTE
function processarQR(text) {

  if (!text || text.length < 10) {
    alert("QR inválido ❌");
    processando = false;
    return;
  }

  document.getElementById("status").innerText =
    "Validando pagamento...";

  // 👉 Detecta Pix ou código genérico
  const isPix =
    text.toLowerCase().includes("pix") ||
    text.includes("brcode") ||
    text.length > 30;

  if (isPix) {

    alert("PIX detectado com sucesso ✔");

    // 👉 aqui você manda pro fluxo do seu app
    // exemplo:
    localStorage.setItem("qr_raw", text);
    window.location.href = "confirmar.html";

  } else {

    alert("QR não suportado ❌");
    processando = false;
  }
}
</script>

</body>
</html>
