<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }
  :root { --primary: #22C55E; --bg: #000000; --border-input: #2A3441; --card: #121826; }

  html, body { height: 100%; margin: 0; background: var(--bg); overflow-x: hidden; }
  body { font-family:'Inter', sans-serif; color:#FFF; padding: 20px; display: flex; flex-direction: column; }
  
  .header { display: flex; align-items: center; gap: 15px; margin-bottom: 30px; }
  .back-btn { background: none; border: none; color: white; cursor: pointer; padding: 0; display: flex; align-items: center; }
  
  .saldo-badge { 
    background: rgba(34, 197, 94, 0.15); 
    padding: 8px 15px; border-radius: 30px; 
    color: var(--primary); font-size: 13px; font-weight: 700; 
    display: inline-block; margin-bottom: 35px; 
  }

  .input-group { margin-bottom: 30px; }
  .label-input { color: #9CA3AF; font-size: 14px; display: block; margin-bottom: 8px; }
  
  input {
    background: transparent !important; border: none;
    border-bottom: 2px solid var(--border-input);
    color: #FFFFFF !important; font-size: 20px;
    font-weight: 500; padding: 12px 0; width: 100%;
    outline: none; border-radius: 0; -webkit-appearance: none;
  }
  input:focus { border-bottom-color: var(--primary); }
  
  #feedbackDestino { 
    display: none; background: #111827; padding: 15px; 
    border-radius: 12px; margin-top: -15px; margin-bottom: 25px; 
    border: 1px solid #1F2937; animation: slideIn 0.3s ease-out;
  }
  @keyframes slideIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

  .dest-name { display: block; font-weight: 700; color: #FFF; font-size: 15px; }
  .dest-bank { font-size: 11px; color: #6B7280; text-transform: uppercase; margin-top: 2px; }
  .valor-input { font-size: 42px !important; font-weight: 800 !important; color: var(--primary) !important; }

  .footer-action { padding: 20px 0; margin-top: auto; width: 100%; background: var(--bg); }

  .confirm-btn { 
    width: 100%; background: #27272a; color: #71717a; border: none; 
    padding: 18px; border-radius: 15px; font-weight: 700; font-size: 16px;
    transition: 0.3s; cursor: pointer;
  }
  .confirm-btn.active { background: var(--primary); color: #000; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.2); }

  /* MODAL BLINDADO */
  #zModalGlobal { 
    display:none; position:fixed; inset:0; background:rgba(0,0,0,0.85); 
    z-index:9999; align-items:center; justify-content:center; padding:20px; 
    backdrop-filter: blur(5px); 
  }
  .modal-content { 
    background:var(--card); border:1px solid var(--border-input); border-radius:28px; 
    width:100%; max-width:340px; padding:25px; text-align:center; 
    animation: popIn 0.2s ease-out; 
  }
  @keyframes popIn { from { transform:scale(0.8); opacity:0; } to { transform:scale(1); opacity:1; } }
</style>
</head>
<body>

<div id="zModalGlobal">
  <div class="modal-content">
    <div id="zIcon" style="font-size:40px; margin-bottom:15px;">⚠️</div>
    <h3 id="zTitle" style="margin:0 0 10px; font-size:18px; color:#fff; font-weight:700;">Aviso</h3>
    <p id="zText" style="color:#9CA3AF; font-size:14px; margin-bottom:20px; line-height:1.5;"></p>
    <button id="zBtnClose" style="width:100%; padding:15px; border-radius:14px; background:#22C55E; border:none; color:#000; font-weight:700; cursor:pointer;">Entendido</button>
  </div>
</div>

<div class="header">
  <button class="back-btn" onclick="location.href='pix.html'">
    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
  </button>
  <h2 style="margin:0; font-size:18px;">Transferir</h2>
</div>

<div class="saldo-badge">Saldo disponível: <span id="saldoAtual">R$ 0,00</span></div>

<div class="input-group">
  <span class="label-input">Chave Pix (CPF, Celular ou CNPJ)</span>
  <input type="text" id="chavePix" placeholder="000.000.000-00" inputmode="numeric">
</div>

<div id="feedbackDestino">
    <span class="dest-name">---</span>
    <span class="dest-bank">Zentry Bank - 001</span>
</div>

<div class="input-group">
  <span class="label-input">Valor do Pix</span>
  <input type="text" id="valorInput" class="valor-input" placeholder="R$ 0,00" inputmode="numeric">
</div>

<div class="footer-action">
    <button class="confirm-btn" id="btnProsseguir" disabled>Continuar</button>
</div>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyB4U7iIO3OVrrwyWPPI057jTqZWF6V1osU",
    authDomain: "zentry-app-74275.firebaseapp.com",
    projectId: "zentry-app-74275",
    storageBucket: "zentry-app-74275.appspot.com",
    messagingSenderId: "571422826071",
    appId: "1:571422826071:web:ba1ca6fea76e360bb80d12"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const chaveInput = document.getElementById("chavePix");
  const valorInput = document.getElementById("valorInput");
  const btn = document.getElementById("btnProsseguir");
  const feedback = document.getElementById("feedbackDestino");
  const saldoElement = document.getElementById("saldoAtual");

  let saldoDisponivel = 0;
  let destinoEncontrado = null;

  function showZModal(titulo, texto, icon) {
    document.getElementById('zModalGlobal').style.display = 'flex';
    document.getElementById('zTitle').innerText = titulo;
    document.getElementById('zText').innerText = texto;
    document.getElementById('zIcon').innerText = icon;
  }

  document.getElementById('zBtnClose').onclick = () => {
    document.getElementById('zModalGlobal').style.display = 'none';
  };

  onAuthStateChanged(auth, (user) => {
    if (user) {
      onSnapshot(doc(db, "usuarios", user.uid), (docSnap) => {
        if (docSnap.exists()) {
          saldoDisponivel = parseFloat(docSnap.data().saldo || 0);
          saldoElement.innerText = saldoDisponivel.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }
      });
    } else {
      window.location.href = "login.html";
    }
  });

  async function buscarDestinatario(limpo) {
    try {
      const colRef = collection(db, "usuarios");
      const q = query(colRef, where("chavepix", "==", limpo)); // Note: 'chavepix' em minúsculo conforme seu print do DB
      const snap = await getDocs(q);

      if (!snap.empty) {
        const userDoc = snap.docs[0];
        if (userDoc.id === auth.currentUser.uid) {
           showZModal("Ops!", "Você não pode transferir para si mesmo.", "👤");
           chaveInput.value = "";
           feedback.style.display = "none";
           return;
        }

        destinoEncontrado = { id: userDoc.id, ...userDoc.data() };
        document.querySelector(".dest-name").innerText = destinoEncontrado.nome;
        feedback.style.display = "block";
      } else {
        destinoEncontrado = null;
        feedback.style.display = "none";
      }
      validar();
    } catch (e) { 
      console.error(e);
    }
  }

  chaveInput.addEventListener("input", (e) => {
    let v = e.target.value.replace(/\D/g, "");
    
    // Lógica de Máscara Inteligente
    if (v.length <= 11) {
      // Se começar com DDD (ex: 11 a 99) e tiver 11 dígitos, é Celular
      if (v.length === 11 && parseInt(v.substring(0,2)) > 10) {
        v = v.replace(/^(\d{2})(\d{5})(\d{4})/, "($1) $2-$3");
      } else {
        // Caso contrário, trata como CPF
        v = v.replace(/(\d{3})(\d{3})(\d{3})(\d{2})/, "$1.$2.$3-$4");
      }
    } else {
      // CNPJ
      v = v.replace(/^(\d{2})(\d{3})(\d{3})(\d{4})(\d{2})/, "$1.$2.$3/$4-$5");
    }
    
    e.target.value = v;
    const limpo = v.replace(/\D/g, "");
    if (limpo.length === 11 || limpo.length === 14) {
      buscarDestinatario(limpo);
    } else {
      feedback.style.display = "none";
      destinoEncontrado = null;
      validar();
    }
  });

  valorInput.addEventListener("input", (e) => {
    let v = e.target.value.replace(/\D/g,'');
    v = (v/100).toFixed(2) + '';
    v = v.replace(".", ",");
    v = v.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    e.target.value = "R$ " + v;
    validar();
  });

  function validar() {
    const valorLimpo = valorInput.value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
    const valorNum = parseFloat(valorLimpo) || 0;

    // O botão só ativa se: houver destino AND valor > 0 AND valor <= saldo
    if (destinoEncontrado && valorNum > 0 && valorNum <= saldoDisponivel) {
      btn.disabled = false;
      btn.classList.add("active");
    } else {
      btn.disabled = true;
      btn.classList.remove("active");
    }
  }

  btn.addEventListener("click", () => {
    if (btn.disabled) return;

    const valorLimpo = valorInput.value.replace("R$ ", "").replace(/\./g, "").replace(",", ".");
    const dados = {
        valor: valorInput.value,
        valorNumerico: parseFloat(valorLimpo),
        nomeDestino: destinoEncontrado.nome,
        uidDestino: destinoEncontrado.id,
        bancoDestino: "Zentry Bank - 001",
        chavePix: chaveInput.value,
        tipo: "transferencia"
    };
    localStorage.setItem("transacao_pendente", JSON.stringify(dados));
    window.location.href = 'revisao.html';
  });
     </script>
 

</body>
</html>
